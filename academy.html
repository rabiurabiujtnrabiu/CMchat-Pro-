<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Academy Pro - Elite Learning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --p: #1A237E; --g: #FFD600; --danger: #FF5252;
            --success: #00E676; --white: #ffffff; --soft: #F4F7FE;
        }
        body { 
            margin: 0; background: var(--soft); font-family: 'Inter', 'Segoe UI', sans-serif; 
            color: #2D3436; overflow-x: hidden; padding-bottom: 50px;
        }
        
        .elite-header { 
            background: linear-gradient(135deg, var(--p), #303F9F); 
            padding: 35px 25px 50px; border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px; color: white;
            box-shadow: 0 10px 30px rgba(26, 35, 126, 0.2);
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .avatar-main { 
            width: 45px; height: 45px; background: rgba(255,255,255,0.2); 
            border-radius: 14px; display: flex; align-items: center; 
            justify-content: center; font-weight: 800; border: 1px solid rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        .instructor-nexus {
            background: var(--white); margin: -30px 20px 25px; padding: 20px;
            border-radius: 25px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06); border: 1px solid rgba(255,255,255,0.8);
        }
        .live-pulse {
            background: rgba(0, 230, 118, 0.1); color: var(--success);
            padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 800;
            display: flex; align-items: center; gap: 5px;
        }

        .section-title { padding: 0 25px; margin: 20px 0 12px; font-size: 13px; font-weight: 800; color: var(--p); letter-spacing: 0.5px; }

        .course-scroll { display: flex; gap: 15px; padding: 0 20px 10px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .course-card {
            min-width: 160px; background: white; padding: 15px; border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); text-align: center; border: 1px solid #f1f2f6;
        }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .grid-card {
            background: var(--white); padding: 22px 15px; border-radius: 25px;
            text-align: center; text-decoration: none; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.01);
        }
        .grid-card i { font-size: 26px; margin-bottom: 10px; display: block; color: var(--p); }
        .grid-card b { font-size: 14px; color: #1E272E; display: block; }
        .grid-card span { font-size: 10px; color: #A4B0BE; margin-top: 4px; display: block; }

        .full-width-card {
            grid-column: span 2; display: flex !important; align-items: center;
            justify-content: flex-start; gap: 18px; padding: 18px 25px !important;
            text-align: left !important;
        }

        .avatar-stack { display: flex; gap: 8px; overflow-x: auto; padding: 5px 25px; scrollbar-width: none; }
        .stack-item { 
            min-width: 42px; height: 42px; border-radius: 12px; 
            background: #DDE1F8; color: var(--p); display: flex; 
            align-items: center; justify-content: center; font-weight: 800; 
            border: 2px solid white; text-transform: uppercase;
        }

        .btn-hand-elite {
            margin: 20px; padding: 16px; border: none; border-radius: 20px;
            background: var(--danger); color: white; font-weight: 800; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px; width: calc(100% - 40px);
            box-shadow: 0 10px 20px rgba(255, 82, 82, 0.2); cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="elite-header">
        <div class="header-flex">
            <i class="fas fa-chevron-left" onclick="history.back()"></i>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar-main" id="initial">-</div>
                <div style="text-align: right;">
                    <small style="opacity: 0.8; font-size: 10px;">Elite Academy</small>
                    <div style="font-weight: 700; font-size: 16px;" id="uName">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="instructor-nexus">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-user-shield" style="color:var(--p); font-size:24px;"></i>
            <div>
                <b id="teacherName">...</b>
                <p style="margin:0; font-size: 11px; color:#888;">Live Classroom</p>
            </div>
        </div>
        <div class="live-pulse"><i class="fas fa-circle animate__flash animate__infinite"></i> ONLINE</div>
    </div>

    <div class="section-title">MY ENROLLED COURSES</div>
    <div class="course-scroll" id="myCoursesList">
        <p style="font-size: 11px; color: #999; padding-left: 25px;">Connecting to library...</p>
    </div>

    <div class="section-title">QUICK ACCESS</div>
    <div class="grid-container">
        <a href="Video-Portal.html" class="grid-card">
            <i class="fas fa-play-circle"></i>
            <b>Video Portal</b>
            <span>Live Stream</span>
        </a>
        <a href="Audio-Room.html" class="grid-card">
            <i class="fas fa-headset"></i>
            <b>Audio Room</b>
            <span>Voice Class</span>
        </a>
        <a href="Smartboard.html" class="grid-card">
            <i class="fas fa-chalkboard"></i>
            <b>Smart Board</b>
            <span>Notes</span>
        </a>
        <a href="Consol.html" class="grid-card">
            <i class="fas fa-cog"></i>
            <b>Console</b>
            <span>Settings</span>
        </a>
        <a href="CM-market.html" class="grid-card full-width-card">
            <i class="fas fa-store-alt" style="color: var(--g);"></i>
            <div>
                <b>CM Market</b>
                <span>Browse and buy elite global courses</span>
            </div>
            <i class="fas fa-angle-right" style="margin-left: auto; color: #ccc;"></i>
        </a>
    </div>

    <div style="padding: 25px 25px 10px; display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:#7F8C8D;">
        <span>STUDENTS ATTENDING</span>
        <span id="activeCount" style="color: var(--p);">0 ACTIVE</span>
    </div>
    <div class="avatar-stack" id="studentList"></div>

    <button class="btn-hand-elite" onclick="raiseHand()">
        <i class="fas fa-hand-sparkles"></i> RAISE HAND
    </button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const myName = localStorage.getItem('username') || "Elite Member";
        document.getElementById('uName').innerText = myName;
        document.getElementById('initial').innerText = myName.charAt(0);

        // SYNC ENROLLED COURSES (From Transactions)
        db.ref('transactions/' + myName).on('value', snap => {
            const list = document.getElementById('myCoursesList');
            list.innerHTML = "";
            let count = 0;
            
            if(!snap.exists()) {
                list.innerHTML = `<p style="font-size: 11px; color: #999; padding-left: 25px;">No courses purchased yet.</p>`;
                return;
            }

            snap.forEach(child => {
                const t = child.val();
                if (t.service && (t.service.includes("Market:") || t.service.includes("Purchase:"))) {
                    count++;
                    const courseTitle = t.service.split(":").pop().trim();
                    list.innerHTML += `
                    <div class="course-card animate__animated animate__fadeIn">
                        <div style="width:40px; height:40px; border-radius:12px; background:var(--soft); margin:0 auto 10px; display:flex; align-items:center; justify-content:center; color:var(--p);">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <b style="font-size:11px; display:block; height:32px; overflow:hidden;">${courseTitle}</b>
                        <button style="border:none; background:var(--p); color:white; border-radius:8px; font-size:10px; padding:7px; margin-top:8px; width:100%; font-weight:bold;" 
                            onclick="openCourse('${courseTitle}')">STUDY</button>
                    </div>`;
                }
            });
        });

        // ATTENDANCE & LIVE STATUS
        const attendanceRef = db.ref('academy/attendance/' + myName);
        attendanceRef.set({ status: 'online', lastSeen: Date.now() });
        attendanceRef.onDisconnect().remove();

        db.ref('academy/attendance').on('value', snap => {
            const list = document.getElementById('studentList');
            const countEl = document.getElementById('activeCount');
            list.innerHTML = "";
            let online = 0;
            snap.forEach(child => {
                online++;
                list.innerHTML += `<div class="stack-item">${child.key.charAt(0)}</div>`;
            });
            countEl.innerText = online + " ACTIVE";
        });

        // INSTRUCTOR NAME SYNC
        db.ref('academy/config/teacher').on('value', snap => {
            document.getElementById('teacherName').innerText = snap.val() || "Senior Instructor";
        });

        // ACTIONS
        function openCourse(title) {
            Swal.fire({
                title: 'Loading Course',
                text: `Opening: ${title}`,
                icon: 'info',
                timer: 1500,
                showConfirmButton: false,
                background: '#1e293b',
                color: '#fff'
            });
            // window.location.href = `Study-Player.html?course=${title}`;
        }

        function raiseHand() {
            db.ref('academy/notifications').push({
                user: myName,
                type: 'hand_raise',
                timestamp: Date.now()
            }).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Hand Raised',
                    text: 'Your instructor has been notified!',
                    background: '#1e293b',
                    color: '#fff',
                    confirmButtonColor: '#1A237E'
                });
            });
        }
    </script>
</body>
</html>
