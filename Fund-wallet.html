<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Funding | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://sdk.monnify.com/plugin/monnify.js"></script>
    
    <style>
        :root { --primary: #1A237E; --accent: #FFD600; --bg: #F4F7FE; --white: #ffffff; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1c1c1e; }

        header { background: var(--primary); padding: 25px 20px; display: flex; align-items: center; color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header i { font-size: 20px; cursor: pointer; margin-right: 15px; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* VIRTUAL BANK CARD */
        .bank-card {
            background: linear-gradient(135deg, var(--primary) 0%, #3949AB 100%);
            color: white; padding: 30px 25px; border-radius: 35px;
            margin-bottom: 25px; box-shadow: 0 15px 35px rgba(26, 35, 126, 0.2);
            position: relative; overflow: hidden;
        }
        .bank-card::after { content: ''; position: absolute; bottom: -30px; right: -30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; }

        .card-label { font-size: 11px; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        .acc-number { font-size: 30px; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .bank-info { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 20px; }

        .card { background: var(--white); border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        input { width: 100%; padding: 20px; border-radius: 20px; border: 2px solid #F0F2F8; outline: none; font-size: 18px; font-weight: 800; background: #F9F9FB; box-sizing: border-box; }
        
        .btn-pay { width: 100%; padding: 20px; border: none; border-radius: 22px; background: var(--primary); color: white; font-weight: 800; font-size: 16px; margin-top: 15px; cursor: pointer; box-shadow: 0 10px 25px rgba(26, 35, 126, 0.2); }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <b>Add Funds</b>
    </header>

    <div class="container">
        
        <div class="bank-card animate__animated animate__fadeInDown">
            <span class="card-label">Automatic Bank Transfer</span>
            <div class="acc-number">
                <span id="accNum">9034567812</span>
                <i class="far fa-copy" onclick="copyAcc()" style="cursor:pointer; font-size:20px;"></i>
            </div>
            <div class="bank-info">Wema Bank / Monnify</div>
            <div style="font-size: 12px; font-weight: 700; opacity: 0.9;" id="accName">Account Name: CM-PRO-LOADING...</div>
        </div>

        <p style="font-size: 11px; font-weight: 800; color: #8e8e93; margin: 0 0 15px 10px; text-transform: uppercase;">Pay via Card or USSD</p>
        <div class="card animate__animated animate__fadeInUp">
            <input type="number" id="fundAmt" placeholder="Enter Amount (₦)">
            <button class="btn-pay" onclick="payWithMonnify()">
                <i class="fas fa-shield-alt" style="margin-right:8px;"></i> INITIALIZE SECURE PAYMENT
            </button>
        </div>

        <div style="background: rgba(26, 35, 126, 0.05); padding: 20px; border-radius: 20px; font-size: 12px; color: var(--primary); margin-top: 25px; border: 1px dashed var(--primary); line-height: 1.6;">
            <i class="fas fa-info-circle"></i> Wallet funding is instant. Ensure you use the provided reference for all manual transfers.
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";

        // Monnify Configs
        const API_KEY = "MK_TEST_9F678K5DKM";
        const CONTRACT_CODE = "1727805127";

        document.getElementById('accName').innerText = "Account Name: CM-PRO-" + myName.toUpperCase();

        function copyAcc() {
            const num = document.getElementById('accNum').innerText;
            navigator.clipboard.writeText(num).then(() => {
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copied!', showConfirmButton: false, timer: 1500 });
            });
        }

        function payWithMonnify() {
            const amt = document.getElementById('fundAmt').value;
            if(!amt || amt < 100) return Swal.fire('Warning', 'Minimum funding is ₦100', 'warning');

            const transRef = "CM-" + Date.now() + "-" + Math.floor(Math.random() * 1000);

            MonnifySDK.initialize({
                amount: amt,
                currency: "NGN",
                reference: transRef,
                customerFullName: myName,
                customerEmail: myName.replace(/\s+/g, '') + "@cmchat.pro",
                apiKey: API_KEY,
                contractCode: CONTRACT_CODE,
                paymentDescription: "Wallet Top-up for " + myName,
                isTestMode: true,
                onComplete: function(response) {
                    if(response.status === "SUCCESS") {
                        creditWallet(amt, response.transactionReference);
                    } else {
                        Swal.fire('Failed', 'Payment not successful', 'error');
                    }
                },
                onClose: function(data) { console.log("SDK Closed"); }
            });
        }

        function creditWallet(amt, ref) {
            Swal.fire({ title: 'Verifying...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const walletRef = db.ref('users/' + myName + '/wallet');
            walletRef.once('value', snap => {
                const current = parseFloat(snap.val()) || 0;
                walletRef.set(current + parseFloat(amt)).then(() => {
                    db.ref('transactions/' + myName).push({
                        type: 'credit',
                        service: 'Monnify Funding',
                        amount: amt,
                        reference: ref,
                        time: Date.now(),
                        status: 'Verified'
                    });
                    
                    Swal.fire('Success!', `₦${Number(amt).toLocaleString()} added to your wallet.`, 'success')
                    .then(() => window.location.href = "Wallet.html");
                });
            });
        }
    </script>
</body>
</html>
