<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Market | CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root { --p: #1A237E; --g: #FFD600; --bg: #f4f7f6; --white: #ffffff; --green: #00a884; }
        
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; padding-bottom: 110px; overflow-x: hidden; }

        /* Modern Navigation Header */
        .market-nav {
            background: var(--p); color: white; padding: 18px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Professional Ads Banner */
        .ads-container {
            margin: 15px; height: 130px; background: #e0e4e8; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; border: 1px solid rgba(0,0,0,0.05);
        }
        .ads-container img { width: 100%; height: 100%; object-fit: cover; }
        .ads-tag { position: absolute; top: 12px; right: 15px; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 3px 10px; border-radius: 6px; font-weight: bold; }

        /* Market Content UI */
        .market-title { margin: 15px 20px; font-size: 20px; font-weight: 800; color: var(--p); display: flex; align-items: center; gap: 8px; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 15px; }
        
        .item-card {
            background: var(--white); border-radius: 22px; overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.04); transition: transform 0.2s ease;
            border: 1px solid #f0f0f0;
        }
        .item-card:active { transform: scale(0.96); }
        .item-card img { width: 100%; height: 150px; object-fit: cover; }
        .item-data { padding: 12px; }
        .item-data b { font-size: 15px; color: #2c3e50; display: block; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-data .price-tag { color: var(--green); font-weight: 800; font-size: 17px; }

        /* Contact via CMchat Button */
        .btn-chat-seller {
            background: var(--p); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 14px; margin-top: 10px;
            font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer;
        }

        /* Modern Floating Action Button */
        .btn-add-item {
            position: fixed; bottom: 35px; right: 25px; background: var(--g);
            color: var(--p); width: 68px; height: 68px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; box-shadow: 0 10px 30px rgba(255, 214, 0, 0.4); z-index: 1001;
            cursor: pointer;
        }

        /* Post Item Modal (Slide Up) */
        #postModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal-sheet {
            background: white; position: absolute; bottom: 0; width: 100%;
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            padding: 35px 25px; box-sizing: border-box; animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Gallery Selector UI */
        .gallery-box {
            width: 100%; height: 200px; border: 3px dashed #eaedf0; border-radius: 28px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; margin-bottom: 25px; color: #95a5a6; overflow: hidden; position: relative;
            background: #fbfcfc;
        }
        .gallery-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .input-wrap { margin-bottom: 20px; }
        .input-wrap label { font-size: 12px; font-weight: 700; color: #7f8c8d; margin-left: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .field-input {
            width: 100%; padding: 16px; background: #f0f3f5; border: 2px solid transparent;
            border-radius: 18px; box-sizing: border-box; font-size: 16px; outline: none; margin-top: 5px;
            transition: 0.3s;
        }
        .field-input:focus { border-color: var(--p); background: white; }

        .btn-main-post {
            background: var(--p); color: white; width: 100%; padding: 18px;
            border: none; border-radius: 22px; font-weight: 800; font-size: 17px; margin-top: 15px;
            box-shadow: 0 6px 20px rgba(26, 35, 126, 0.3);
        }

        /* Global English UI Settings */
        .toast-english {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 25px; border-radius: 25px;
            font-size: 14px; z-index: 5000; display: none;
        }
    </style>
</head>
<body>

    <div class="market-nav">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <span style="font-weight: 900; font-size: 18px;">ELITE MARKET</span>
        <i class="fas fa-ellipsis-v"></i>
    </div>

    <div class="ads-container">
        <span class="ads-tag">ADS</span>
        <img src="https://via.placeholder.com/600x250?text=Promote+Your+Brand+Live" alt="Banner">
    </div>

    <div class="market-title">Recent Listings <i class="fas fa-shopping-bag"></i></div>
    <div style="padding: 0 20px; margin-top: -10px; margin-bottom: 20px; font-size: 12px; color: #7f8c8d;">
        All items are live for 48 hours.
    </div>

    <div class="market-grid" id="liveMarket">
        </div>

    <div class="btn-add-item" onclick="showModal()">
        <i class="fas fa-plus"></i>
    </div>

    <div id="postModal">
        <div class="modal-sheet">
            <div style="width: 50px; height: 6px; background: #e0e0e0; border-radius: 10px; margin: -10px auto 25px;"></div>
            <h2 style="margin: 0 0 30px; text-align: center; color: var(--p); font-weight: 900;">Sell an Item</h2>
            
            <div class="gallery-box" onclick="document.getElementById('hiddenFile').click()">
                <div id="uploadPlaceholder" style="text-align: center; padding: 20px;">
                    <i class="fas fa-camera-retro" style="font-size: 50px; color: var(--p); margin-bottom: 15px;"></i>
                    <p style="margin: 0; font-weight: 700; color: #34495e;">Select Product Photo</p>
                    <small>High quality photos sell faster</small>
                </div>
                <img id="itemPreview" style="display: none;">
            </div>

            <input type="file" id="hiddenFile" accept="image/*" style="display: none;" onchange="handleFileSelect(this)">

            <div class="input-wrap">
                <label>Product Title</label>
                <input type="text" id="pTitle" class="field-input" placeholder="What are you selling?">
            </div>

            <div class="input-wrap">
                <label>Price (₦)</label>
                <input type="number" id="pCost" class="field-input" placeholder="Set your price">
            </div>

            <button class="btn-main-post" onclick="startPublish()">PUBLISH TO MARKET</button>
            <p onclick="hideModal()" style="text-align: center; color: #e74c3c; margin-top: 25px; font-weight: 700; cursor: pointer;">Discard</p>
        </div>
    </div>

    <div id="toast" class="toast-english"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", 
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com", 
            projectId: "cmchat-pro" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let capturedImage = "";

        // UI Controllers
        window.showModal = () => document.getElementById('postModal').style.display = 'block';
        window.hideModal = () => {
            document.getElementById('postModal').style.display = 'none';
            capturedImage = "";
            document.getElementById('itemPreview').style.display = 'none';
            document.getElementById('uploadPlaceholder').style.display = 'block';
        };

        // Live Gallery Integration
        window.handleFileSelect = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                capturedImage = e.target.result;
                const prev = document.getElementById('itemPreview');
                prev.src = capturedImage;
                prev.style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };

        // Live Publishing Logic
        window.startPublish = async () => {
            const title = document.getElementById('pTitle').value;
            const cost = document.getElementById('pCost').value;
            const seller = localStorage.getItem('username') || "CM Member";

            if(!title || !cost || !capturedImage) {
                return notify("Please fill all details!");
            }

            const marketRef = ref(db, 'market');
            await push(marketRef, {
                title,
                cost,
                image: capturedImage,
                seller,
                createdAt: serverTimestamp()
            });

            hideModal();
            notify("Item is now LIVE!");
        };

        // Automatic 48H Clean & Live Feed
        onValue(ref(db, 'market'), (snapshot) => {
            const grid = document.getElementById('liveMarket');
            grid.innerHTML = '';
            const currentTime = Date.now();
            const lifespan = 48 * 60 * 60 * 1000; // 48 Hours Expiry

            snapshot.forEach(item => {
                const val = item.val();
                if (currentTime - val.createdAt < lifespan) {
                    const cardHtml = `
                        <div class="item-card animate__animated animate__zoomIn">
                            <img src="${val.image}">
                            <div class="item-data">
                                <b>${val.title}</b>
                                <div class="price-tag">₦${Number(val.cost).toLocaleString()}</div>
                                <button class="btn-chat-seller" onclick="openSellerChat('${val.seller}')">
                                    <i class="fas fa-comment-dots"></i> CONTACT
                                </button>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('afterbegin', cardHtml);
                }
            });
        });

        // Chat Link Logic
        window.openSellerChat = (seller) => {
            localStorage.setItem('chattingWith', seller);
            window.location.href = 'Chats.html'; // Connecting Buyer to Seller
        };

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
