<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Marketplace | Professional Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        :root { --accent: #1877f2; --bg: #f2f4f7; --card-radius: 18px; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* PROFESSIONAL TOP BAR */
        .header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-title { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
        .sell-btn { 
            background: var(--accent); color: white; border: none; padding: 10px 22px; 
            border-radius: 30px; font-weight: 700; font-size: 14px; 
            box-shadow: 0 4px 15px rgba(24,119,242,0.3); transition: 0.3s;
        }

        /* GRID SYSTEM */
        .market-grid { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card { 
            background: #ffffff; border-radius: var(--card-radius); overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04); transition: 0.3s; position: relative;
        }
        .product-card:active { transform: scale(0.96); }
        .product-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; background: #eee; }
        
        .p-details { padding: 14px; }
        .p-name { font-size: 14px; font-weight: 600; color: #1c1e21; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-price { font-size: 16px; font-weight: 800; color: var(--accent); margin: 6px 0; }
        .p-seller { font-size: 11px; color: #65676b; display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }

        .chat-seller-btn {
            width: 100%; border: none; background: #f0f2f5; color: #1c1e21;
            padding: 10px; border-radius: 12px; font-weight: 700; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s;
        }
        .chat-seller-btn:hover { background: var(--accent); color: white; }

        /* UPLOAD MODAL */
        #sellModal { 
            position: fixed; inset: 0; background: white; z-index: 2000; 
            display: none; flex-direction: column; animation: slideIn 0.4s cubic-bezier(0, 0.55, 0.45, 1);
        }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-body { padding: 25px; flex: 1; overflow-y: auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: #444; margin-bottom: 8px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 15px; 
            box-sizing: border-box; outline: none; font-size: 15px; background: #f9f9f9; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--accent); background: white; }

        /* LOADER */
        #loader {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">Marketplace</div>
        <button class="sell-btn" onclick="toggleModal(true)">
            <i class="fas fa-plus-circle"></i> SELL ITEM
        </button>
    </div>

    <div class="market-grid" id="marketPlace">
        </div>

    <div id="sellModal">
        <div class="header">
            <i class="fas fa-times-circle" onclick="toggleModal(false)" style="font-size: 24px; color: #999;"></i>
            <b style="font-size: 18px;">List New Product</b>
            <span style="width: 24px;"></span>
        </div>
        <div class="modal-body">
            <div onclick="document.getElementById('imgInput').click()" style="width: 100%; height: 180px; background: #f0f2f5; border: 2.5px dashed #ccc; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 25px; transition: 0.3s;">
                <i class="fas fa-camera-retro" style="font-size: 45px; color: var(--accent);"></i>
                <p id="fileStatus" style="margin-top: 12px; color: #65676b; font-weight: 600;">Upload Product Photo</p>
            </div>
            <input type="file" id="imgInput" hidden onchange="updateStatus(this)">
            
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="pName" placeholder="What are you selling?">
            </div>
            <div class="form-group">
                <label>Price (₦)</label>
                <input type="number" id="pPrice" placeholder="Enter amount">
            </div>
            <div class="form-group">
                <label>CMchat Pro Username</label>
                <input type="text" id="pUser" placeholder="Your CMchat Pro ID (e.g. @Adam123)">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="pDesc" rows="3" placeholder="Describe the condition, location, etc..."></textarea>
            </div>

            <button class="sell-btn" style="width: 100%; padding: 20px; border-radius: 18px; font-size: 16px;" onclick="uploadProduct()">
                POST PRODUCT NOW
            </button>
        </div>
    </div>

    <div id="loader">
        <i class="fas fa-spinner fa-spin" style="font-size: 50px; color: var(--accent);"></i>
        <h3 style="margin-top: 20px; font-weight: 300;">Listing to Marketplace...</h3>
    </div>

    <script>
        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            projectId: "cmchat-pro",
            storageBucket: "cmchat-pro.firebasestorage.app",
            messagingSenderId: "227572132170",
            appId: "1:227572132170:web:cc39de4627d4da01c7f9b3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function toggleModal(show) { document.getElementById('sellModal').style.display = show ? 'flex' : 'none'; }
        function updateStatus(input) { if(input.files[0]) document.getElementById('fileStatus').innerText = "Selected: " + input.files[0].name; }

        // POSTING LOGIC
        async function uploadProduct() {
            const file = document.getElementById('imgInput').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const username = document.getElementById('pUser').value;
            const desc = document.getElementById('pDesc').value;

            if(!file || !name || !price || !username) return alert("Please fill all required fields!");

            document.getElementById('loader').style.display = 'flex';
            try {
                const ref = storage.ref('marketplace/' + Date.now() + "_" + file.name);
                await ref.put(file);
                const url = await ref.getDownloadURL();

                await db.collection('market').add({
                    name, price, username, url, desc,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Product listed successfully!");
                location.reload();
            } catch (e) { 
                console.error(e); 
                document.getElementById('loader').style.display = 'none'; 
            }
        }

        // LOAD LIVE PRODUCTS
        db.collection('market').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const container = document.getElementById('marketPlace');
            container.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.url}">
                        <div class="p-details">
                            <p class="p-name">${p.name}</p>
                            <p class="p-price">₦${Number(p.price).toLocaleString()}</p>
                            <div class="p-seller">
                                <i class="fas fa-user-circle"></i> ${p.username}
                            </div>
                            <button class="chat-seller-btn" onclick="window.location.href='/chat?user=${p.username.replace('@','')}'">
                                <i class="fas fa-comment-dots"></i> Message Seller
                            </button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
