<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f172a; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 20px; color: white; overflow: hidden; }

        .caller-info { text-align: center; margin-top: 40px; }
        .avatar-container { position: relative; width: 150px; height: 150px; margin-bottom: 20px; }
        .caller-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.1); position: relative; z-index: 2; }
        
        .pulse { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0062ff; border-radius: 50%; opacity: 0.5; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }

        .call-status { color: #94a3b8; font-size: 14px; margin-top: 10px; letter-spacing: 2px; text-transform: uppercase; }

        .call-actions { display: flex; gap: 30px; margin-bottom: 40px; }
        .btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.3s; border: none; color: white; }
        .mute { background: rgba(255,255,255,0.1); }
        .end { background: #ef4444; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
        .speaker { background: rgba(255,255,255,0.1); }
        .btn:active { transform: scale(0.9); }
        
        .active-action { background: #0062ff !important; }
    </style>
</head>
<body>

    <div class="caller-info">
        <div class="avatar-container">
            <div class="pulse" id="pulseEffect"></div>
            <img src="https://via.placeholder.com/150" id="callAvatar" class="caller-avatar">
        </div>
        <h2 id="callName">Elite User</h2>
        <p class="call-status" id="callStatusText">CONNECTING...</p>
    </div>

    <div class="call-actions">
        <button class="btn mute" id="muteBtn" onclick="toggleMute()"><i class="fas fa-microphone" id="muteIcon"></i></button>
        <button class="btn end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        <button class="btn speaker" id="speakerBtn" onclick="toggleSpeaker()"><i class="fas fa-volume-up"></i></button>
    </div>

    <audio id="ringtone" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // --- FIREBASE & AGORA CONFIG ---
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const APP_ID = "546f11a86ed8404ba1f7ec460e55c7fa";
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        const urlParams = new URLSearchParams(window.location.search);
        const partnerUID = urlParams.get('uid');
        const myUID = localStorage.getItem('user_uid');
        const mode = urlParams.get('mode'); // 'caller' ko 'receiver'
        
        let localTracks = { audioTrack: null };
        let isMuted = false;
        let isSpeakerOn = true;

        // --- INITIALIZE CALL ---
        async function startCall() {
            // Sanya sunan da hoton mutum
            const name = urlParams.get('name') || "Elite User";
            const photo = urlParams.get('photo');
            document.getElementById('callName').innerText = name;
            if(photo) document.getElementById('callAvatar').src = photo;

            const ringtone = document.getElementById('ringtone');

            if (mode === 'receiver') {
                document.getElementById('callStatusText').innerText = "INCOMING CALL...";
                ringtone.play(); 
            } else {
                document.getElementById('callStatusText').innerText = "RINGING...";
                // Tura sako ga abokin hira cewa ana kiran sa
                database.ref('calls/' + partnerUID).set({
                    callerID: myUID,
                    callerName: localStorage.getItem('username') || "Friend",
                    callerPhoto: localStorage.getItem('profilePhoto') || "",
                    status: 'ringing'
                });
            }

            // Haɗa Agora Channel
            const channelName = myUID < partnerUID ? myUID + "_" + partnerUID : partnerUID + "_" + myUID;
            await client.join(APP_ID, channelName, null, null);

            localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            await client.publish(localTracks.audioTrack);

            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "audio") {
                    ringtone.pause();
                    document.getElementById('callStatusText').innerText = "CONNECTED";
                    user.audioTrack.play();
                }
            });
        }

        // --- CONTROLS ---
        function toggleMute() {
            isMuted = !isMuted;
            localTracks.audioTrack.setEnabled(!isMuted);
            const icon = document.getElementById('muteIcon');
            icon.className = isMuted ? "fas fa-microphone-slash" : "fas fa-microphone";
            document.getElementById('muteBtn').classList.toggle('active-action');
        }

        function toggleSpeaker() {
            isSpeakerOn = !isSpeakerOn;
            // Wannan yana sarrafa fitar sauti a wayar (demo)
            document.getElementById('speakerBtn').classList.toggle('active-action');
        }

        async function endCall() {
            if(localTracks.audioTrack) {
                localTracks.audioTrack.stop();
                localTracks.audioTrack.close();
            }
            await client.leave();
            database.ref('calls/' + partnerUID).remove();
            history.back();
        }

        // Idan ɗayan ya kashe kiran
        database.ref('calls/' + myUID).on('value', snap => {
            if (!snap.exists() && mode === 'receiver') {
                history.back();
            }
        });

        document.addEventListener('DOMContentLoaded', startCall);
    </script>
</body>
</html>
