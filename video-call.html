<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Call - CMchat Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    
    <style>
        :root {
            --danger: #ef4444;
            --success: #22c55e;
            --bg-dark: #0b141a;
            --glass: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); height: 100vh; overflow: hidden; position: relative; color: white; }

        /* Remote Video (Partner) */
        #remote-player { 
            width: 100%; height: 100%; background: #1e293b; 
            position: absolute; top:0; left:0; z-index: 1;
            display: flex; align-items: center; justify-content: center;
        }

        /* Local Video (Kai) */
        #local-player { 
            position: absolute; top: 120px; right: 20px; width: 110px; height: 160px; 
            background: #2a3942; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2);
            z-index: 100; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .call-info { 
            position: absolute; top: 45px; left: 25px; 
            z-index: 150; text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
        }

        #vStatus {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 5px;
            display: inline-block;
            color: #38bdf8;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Top Actions (Switch Camera & Speaker) */
        .top-actions {
            position: absolute; top: 45px; right: 25px; display: flex; gap: 15px; z-index: 200;
        }
        .small-btn {
            width: 45px; height: 45px; border-radius: 50%; background: var(--glass);
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }

        /* Bottom Controls */
        .video-controls { 
            position: absolute; bottom: 50px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 25px; z-index: 200;
        }

        .v-btn { 
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 22px; 
            color: white; cursor: pointer; backdrop-filter: blur(15px);
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .v-end { background: var(--danger); border: none; font-size: 26px; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        .active-red { color: var(--danger); background: rgba(239, 68, 68, 0.2); border-color: var(--danger); }
    </style>
</head>
<body>

    <div class="call-info">
        <h3 id="vName">Connecting...</h3>
        <p id="vStatus">Starting Camera...</p>
    </div>

    <div class="top-actions">
        <div class="small-btn" onclick="switchCamera()"><i class="fas fa-camera-rotate"></i></div>
        <div class="small-btn" id="speakerBtn" onclick="toggleSpeaker()"><i class="fas fa-volume-high" id="speakerIcon"></i></div>
    </div>

    <div id="remote-player">
        <i class="fas fa-user-circle" style="font-size: 100px; color: rgba(255,255,255,0.05);"></i>
    </div>
    
    <div id="local-player"></div>

    <div class="video-controls">
        <div class="v-btn" id="micBtn" onclick="toggleAudio()"><i class="fas fa-microphone" id="micIcon"></i></div>
        <div class="v-btn v-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></div>
        <div class="v-btn" id="camBtn" onclick="toggleVideo()"><i class="fas fa-video" id="camIcon"></i></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const APP_ID = "546f11a86ed8404ba1f7ec460e55c7fa";
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        const urlParams = new URLSearchParams(window.location.search);
        let partnerUID = urlParams.get('uid');
        const myUID = localStorage.getItem('user_uid') || localStorage.getItem('uid');

        let localTracks = { videoTrack: null, audioTrack: null };
        let isFrontCamera = true;
        let isSpeakerOn = true;

        function checkPartner() {
            if (partnerUID) {
                database.ref('users/' + partnerUID.trim()).on('value', snap => {
                    if (snap.exists()) document.getElementById('vName').innerText = snap.val().username;
                });
            }
        }

        async function initCall() {
            checkPartner();

            try {
                // Kunna Camera da Mic
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();

                // Nuna hotonka
                await localTracks.videoTrack.play("local-player");
                document.getElementById('vStatus').innerText = "Connecting...";

                if (partnerUID) {
                    const channelName = myUID < partnerUID ? myUID + "_" + partnerUID : partnerUID + "_" + myUID;
                    await client.join(APP_ID, channelName, null, null);
                    await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                    document.getElementById('vStatus').innerText = "Ringing...";
                }

                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    document.getElementById('vStatus').innerText = "Live";
                    if (mediaType === "video") {
                        document.getElementById('remote-player').innerHTML = ""; 
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });

            } catch (err) {
                console.warn("Camera check:", err);
                if (!localTracks.videoTrack) {
                    document.getElementById('vStatus').innerText = "Check Permissions!";
                } else {
                    document.getElementById('vStatus').innerText = "Connecting...";
                }
            }
        }

        async function switchCamera() {
            if (!localTracks.videoTrack) return;
            const devices = await AgoraRTC.getCameras();
            if (devices.length > 1) {
                isFrontCamera = !isFrontCamera;
                const newCameraId = isFrontCamera ? devices[0].deviceId : devices[1].deviceId;
                await localTracks.videoTrack.setDevice(newCameraId);
            }
        }

        function toggleSpeaker() {
            isSpeakerOn = !isSpeakerOn;
            const icon = document.getElementById('speakerIcon');
            const btn = document.getElementById('speakerBtn');
            icon.className = isSpeakerOn ? "fas fa-volume-high" : "fas fa-volume-low";
            btn.classList.toggle('active-red', !isSpeakerOn);
            if(client.remoteUsers.length > 0) {
                client.remoteUsers.forEach(user => {
                    if(user.audioTrack) user.audioTrack.setVolume(isSpeakerOn ? 100 : 25);
                });
            }
        }

        async function toggleVideo() {
            const isEnabled = localTracks.videoTrack.enabled;
            await localTracks.videoTrack.setEnabled(!isEnabled);
            document.getElementById('camIcon').className = !isEnabled ? "fas fa-video" : "fas fa-video-slash";
            document.getElementById('camBtn').classList.toggle('active-red', isEnabled);
        }

        async function toggleAudio() {
            const isEnabled = localTracks.audioTrack.enabled;
            await localTracks.audioTrack.setEnabled(!isEnabled);
            document.getElementById('micIcon').className = !isEnabled ? "fas fa-microphone" : "fas fa-microphone-slash";
            document.getElementById('micBtn').classList.toggle('active-red', isEnabled);
        }

        async function endCall() {
            if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            if(localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            await client.leave();
            database.ref('calls/' + myUID).remove();
            window.location.href = "Chatting.html?uid=" + partnerUID;
        }

        window.onload = initCall;
    </script>
</body>
</html>
