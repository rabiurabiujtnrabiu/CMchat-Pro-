<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Call - CMchat Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    
    <style>
        :root {
            --danger: #ef4444;
            --success: #22c55e;
            --bg-dark: #0b141a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg-dark); height: 100vh; overflow: hidden; position: relative; }

        /* Remote Video (Wanda kake kira) - Full Screen */
        #remote-player { 
            width: 100%; height: 100%; background: #1e293b; 
            position: absolute; top:0; left:0; z-index: 1;
            display: flex; align-items: center; justify-content: center;
        }

        /* Local Video (Kai) - Karamin box dake yawo */
        #local-player { 
            position: absolute; top: 40px; right: 20px; width: 120px; height: 180px; 
            background: #2a3942; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);
            z-index: 100; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Info a kai */
        .call-info { 
            position: absolute; top: 45px; left: 25px; color: white; 
            z-index: 150; text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
        }
        .call-info h3 { font-size: 24px; font-weight: 600; }
        .timer-box { font-size: 14px; color: #38bdf8; display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .live-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1s infinite; }

        /* Control Buttons */
        .video-controls { 
            position: absolute; bottom: 50px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 25px; z-index: 200;
        }

        .v-btn { 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 22px; 
            color: white; cursor: pointer; backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .v-end { background: var(--danger); border: none; font-size: 26px; }
        .muted-btn { background: rgba(239, 68, 68, 0.4); color: var(--danger); }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="call-info">
        <h3 id="vName">Elite User</h3>
        <div class="timer-box">
            <div class="live-dot"></div>
            <span id="vStatus">Connecting...</span>
        </div>
    </div>

    <div id="remote-player">
        <i class="fas fa-user-circle" style="font-size: 100px; color: rgba(255,255,255,0.1);"></i>
    </div>
    <div id="local-player"></div>

    <div class="video-controls">
        <div class="v-btn" id="micBtn" onclick="toggleAudio()"><i class="fas fa-microphone" id="micIcon"></i></div>
        <div class="v-btn v-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></div>
        <div class="v-btn" id="camBtn" onclick="toggleVideo()"><i class="fas fa-video" id="camIcon"></i></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Configuration
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const APP_ID = "546f11a86ed8404ba1f7ec460e55c7fa";
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        const urlParams = new URLSearchParams(window.location.search);
        const partnerUID = urlParams.get('uid');
        const partnerName = urlParams.get('name') || "Elite User";
        const myUID = localStorage.getItem('user_uid');

        document.getElementById('vName').innerText = partnerName;

        let localTracks = { videoTrack: null, audioTrack: null };
        let isVideoMuted = false;
        let isAudioMuted = false;

        async function joinCall() {
            if(!myUID || !partnerUID) return;

            // Channel Name Logic (Dole ya zama iri daya ga Caller da Receiver)
            const channelName = myUID < partnerUID ? myUID + "_" + partnerUID : partnerUID + "_" + myUID;

            try {
                // Join Agora
                await client.join(APP_ID, channelName, null, null);

                // Fara amfani da Mic da Camera
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();

                // Nuna hotonka a cikin karamin box
                localTracks.videoTrack.play("local-player");

                // Tura bayanan ga abokin hira
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                document.getElementById('vStatus').innerText = "Ringing...";

                // Lokacin da dayan ya shigo
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    document.getElementById('vStatus').innerText = "Live";

                    if (mediaType === "video") {
                        document.getElementById('remote-player').innerHTML = ""; // Cire loading icon
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                    }
                });

                // Idan dayan ya fita
                client.on("user-unpublished", () => {
                    document.getElementById('vStatus').innerText = "Partner left";
                    setTimeout(endCall, 2000);
                });

            } catch (err) {
                console.error(err);
                alert("Please allow camera and mic access.");
            }
        }

        // Functions na Controls
        async function toggleVideo() {
            isVideoMuted = !isVideoMuted;
            await localTracks.videoTrack.setEnabled(!isVideoMuted);
            document.getElementById('camIcon').className = isVideoMuted ? "fas fa-video-slash" : "fas fa-video";
            document.getElementById('camBtn').classList.toggle('muted-btn', isVideoMuted);
        }

        async function toggleAudio() {
            isAudioMuted = !isAudioMuted;
            await localTracks.audioTrack.setEnabled(!isAudioMuted);
            document.getElementById('micIcon').className = isAudioMuted ? "fas fa-microphone-slash" : "fas fa-microphone";
            document.getElementById('micBtn').classList.toggle('muted-btn', isAudioMuted);
        }

        async function endCall() {
            // Kashe duka tracks
            if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            if(localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            
            await client.leave();

            // Sanar da Firebase
            database.ref('calls/' + myUID).remove();
            database.ref('calls/' + partnerUID).remove();

            // Koma shafin Chat
            window.location.href = `Chatting.html?uid=${partnerUID}`;
        }

        // Firebase Signaling (Listener)
        database.ref('calls/' + myUID).on('value', snap => {
            if (snap.exists() && snap.val().status === 'ended') {
                endCall();
            }
        });

        // Initialize Call
        window.onload = joinCall;
    </script>
</body>
</html>
