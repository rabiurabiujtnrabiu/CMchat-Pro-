<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Call - CMchat Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    
    <style>
        :root {
            --danger: #ef4444;
            --success: #22c55e;
            --bg-dark: #0b141a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg-dark); height: 100vh; overflow: hidden; position: relative; }

        /* Remote Video - Full Screen */
        #remote-player { 
            width: 100%; height: 100%; background: #1e293b; 
            position: absolute; top:0; left:0; z-index: 1;
            display: flex; align-items: center; justify-content: center;
        }

        /* Local Video - Floating Box */
        #local-player { 
            position: absolute; top: 40px; right: 20px; width: 120px; height: 180px; 
            background: #2a3942; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2);
            z-index: 100; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .call-info { 
            position: absolute; top: 45px; left: 25px; color: white; 
            z-index: 150; text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
        }

        .video-controls { 
            position: absolute; bottom: 50px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 25px; z-index: 200;
        }

        .v-btn { 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 22px; 
            color: white; cursor: pointer; backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .v-end { background: var(--danger); border: none; font-size: 26px; }
        .muted-active { background: rgba(239, 68, 68, 0.4); color: var(--danger); border-color: var(--danger); }
    </style>
</head>
<body>

    <div class="call-info">
        <h3 id="vName">Elite User</h3>
        <p id="vStatus" style="color: #38bdf8; font-size: 14px; font-weight: 500;">Connecting Camera...</p>
    </div>

    <div id="remote-player">
        <i class="fas fa-user-circle" style="font-size: 100px; color: rgba(255,255,255,0.05);"></i>
    </div>
    
    <div id="local-player"></div>

    <div class="video-controls">
        <div class="v-btn" id="micBtn" onclick="toggleAudio()"><i class="fas fa-microphone" id="micIcon"></i></div>
        <div class="v-btn v-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></div>
        <div class="v-btn" id="camBtn" onclick="toggleVideo()"><i class="fas fa-video" id="camIcon"></i></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const APP_ID = "546f11a86ed8404ba1f7ec460e55c7fa";
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        const urlParams = new URLSearchParams(window.location.search);
        const partnerUID = urlParams.get('uid');
        
        // Gyara: Tabbatar an samo UID din mai amfani ko da an kira shi daban a localStorage
        const myUID = localStorage.getItem('user_uid') || localStorage.getItem('uid') || "USER_" + Math.floor(Math.random()*1000);

        let localTracks = { videoTrack: null, audioTrack: null };

        // GYARA: Nemo Username live daga Firebase
        async function fetchPartnerInfo() {
            if (!partnerUID) return;
            // Ina amfani da .on domin idan aka canja sunan ma ya sauya anan
            database.ref('users/' + partnerUID).on('value', snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    document.getElementById('vName').innerText = data.username || data.name || "Elite User";
                } else {
                    document.getElementById('vName').innerText = "Elite User";
                }
            });
        }

        async function startCall() {
            if (!partnerUID) {
                document.getElementById('vStatus').innerText = "Error: Partner UID missing!";
                return;
            }

            fetchPartnerInfo();

            const channelName = myUID < partnerUID ? myUID + "_" + partnerUID : partnerUID + "_" + myUID;

            try {
                // GYARA: Create Tracks kafin ma shiga channel don tabbatar camera ta bude
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                
                // Nuna hotonka nan take
                localTracks.videoTrack.play("local-player");
                document.getElementById('vStatus').innerText = "Camera Active - Joining...";

                // Join Agora
                await client.join(APP_ID, channelName, null, null);
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                
                document.getElementById('vStatus').innerText = "Ringing...";

                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    document.getElementById('vStatus').innerText = "Live";

                    if (mediaType === "video") {
                        document.getElementById('remote-player').innerHTML = ""; 
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                    }
                });

                client.on("user-unpublished", () => {
                    document.getElementById('vStatus').innerText = "Partner Left";
                    setTimeout(endCall, 2000);
                });

            } catch (err) {
                console.error("Agora Error:", err);
                document.getElementById('vStatus').innerText = "Camera Access Denied!";
            }
        }

        async function toggleVideo() {
            const isEnabled = localTracks.videoTrack.enabled;
            await localTracks.videoTrack.setEnabled(!isEnabled);
            document.getElementById('camIcon').className = !isEnabled ? "fas fa-video" : "fas fa-video-slash";
            document.getElementById('camBtn').classList.toggle('muted-active', isEnabled);
        }

        async function toggleAudio() {
            const isEnabled = localTracks.audioTrack.enabled;
            await localTracks.audioTrack.setEnabled(!isEnabled);
            document.getElementById('micIcon').className = !isEnabled ? "fas fa-microphone" : "fas fa-microphone-slash";
            document.getElementById('micBtn').classList.toggle('muted-active', isEnabled);
        }

        async function endCall() {
            if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            if(localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            await client.leave();
            
            database.ref('calls/' + myUID).remove();
            database.ref('calls/' + partnerUID).remove();

            window.location.href = "Chatting.html?uid=" + partnerUID;
        }

        // Listener don gane idan kiran ya kare
        database.ref('calls/' + myUID).on('value', snap => {
            if (snap.exists() && snap.val().status === 'ended') endCall();
        });

        window.onload = startCall;
    </script>
</body>
</html>
