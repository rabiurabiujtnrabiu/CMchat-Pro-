<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; overflow: hidden; position: relative; font-family: 'Inter', sans-serif; }

        /* Babban Bidiyon Aboki */
        #remote-player { width: 100%; height: 100%; background: #1e293b; position: absolute; top:0; left:0; }

        /* Bidiyonka (Karami) */
        #local-player { 
            position: absolute; top: 20px; right: 20px; width: 110px; height: 160px; 
            background: #334155; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);
            z-index: 10; overflow: hidden;
        }

        .video-controls { 
            position: absolute; bottom: 40px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 20px; z-index: 20;
        }

        .v-btn { 
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 22px; 
            color: white; cursor: pointer; backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .v-end { background: #ef4444; border: none; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        .v-btn:active { transform: scale(0.9); }
        .active-btn { background: #0062ff; }

        .call-meta { position: absolute; top: 30px; left: 20px; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 15; }
    </style>
</head>
<body>

    <div class="call-meta">
        <h3 id="vName">Elite User</h3>
        <p id="vStatus" style="font-size: 12px; opacity: 0.8; color: #38bdf8;">Connecting...</p>
    </div>

    <div id="remote-player"></div>
    
    <div id="local-player"></div>

    <div class="video-controls">
        <div class="v-btn" id="camBtn" onclick="toggleVideo()"><i class="fas fa-video" id="camIcon"></i></div>
        <div class="v-btn" id="micBtn" onclick="toggleAudio()"><i class="fas fa-microphone" id="micIcon"></i></div>
        <div class="v-btn v-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const APP_ID = "546f11a86ed8404ba1f7ec460e55c7fa";
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        const urlParams = new URLSearchParams(window.location.search);
        const partnerUID = urlParams.get('uid');
        const myUID = localStorage.getItem('user_uid');
        const partnerName = urlParams.get('name') || "Elite User";

        document.getElementById('vName').innerText = partnerName;

        let localTracks = { videoTrack: null, audioTrack: null };
        let isVideoMuted = false;
        let isAudioMuted = false;

        async function initVideoCall() {
            // 1. Shiga Agora Channel
            const channelName = myUID < partnerUID ? myUID + "_" + partnerUID : partnerUID + "_" + myUID;
            await client.join(APP_ID, channelName, null, null);

            // 2. Kunna Camera da Microphone
            localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();

            // 3. Nuna hotonka a cikin karamin box
            localTracks.videoTrack.play("local-player");

            // 4. Tura hotonka da muryarka ga abokin hira
            await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
            document.getElementById('vStatus').innerText = "Ringing...";

            // 5. Saurari lokacin da abokin hira ya shigo
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                document.getElementById('vStatus').innerText = "Live";

                if (mediaType === "video") {
                    user.videoTrack.play("remote-player");
                }
                if (mediaType === "audio") {
                    user.audioTrack.play();
                }
            });
        }

        // --- Controls Functions ---

        async function toggleVideo() {
            isVideoMuted = !isVideoMuted;
            await localTracks.videoTrack.setEnabled(!isVideoMuted);
            document.getElementById('camIcon').className = isVideoMuted ? "fas fa-video-slash" : "fas fa-video";
            document.getElementById('camBtn').classList.toggle('active-btn');
        }

        async function toggleAudio() {
            isAudioMuted = !isAudioMuted;
            await localTracks.audioTrack.setEnabled(!isAudioMuted);
            document.getElementById('micIcon').className = isAudioMuted ? "fas fa-microphone-slash" : "fas fa-microphone";
            document.getElementById('micBtn').classList.toggle('active-btn');
        }

        async function endCall() {
            for (let trackName in localTracks) {
                let track = localTracks[trackName];
                if (track) {
                    track.stop();
                    track.close();
                    localTracks[trackName] = null;
                }
            }
            await client.leave();
            database.ref('calls/' + partnerUID).remove();
            history.back();
        }

        // Saurari idan dayan ya kashe kiran
        database.ref('calls/' + myUID).on('value', snap => {
            if (!snap.exists()) {
                // Idan dayan ya kashe a database, kaima shafinka ya koma baya
                endCall();
            }
        });

        document.addEventListener('DOMContentLoaded', initVideoCall);
    </script>
</body>
</html>
