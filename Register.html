<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CMchat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root {
            --primary: #1A237E;
            --accent: #FFD600;
            --white: #ffffff;
            --bg: #F8F9FD;
        }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .reg-card {
            background: var(--white); width: 90%; max-width: 400px; padding: 35px 25px;
            border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo-area b { font-size: 28px; color: var(--primary); }
        .logo-area span { color: var(--accent); }

        .input-box {
            position: relative; margin-top: 20px; text-align: left;
        }
        .input-box i { position: absolute; left: 18px; top: 18px; color: #999; }
        .input-box input {
            width: 100%; padding: 18px 18px 18px 50px; border-radius: 18px;
            border: 2px solid #F0F2F5; background: #F9FAFB; font-weight: 600;
            box-sizing: border-box; transition: 0.3s;
        }
        .input-box input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-reg {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: var(--primary); color: white; font-weight: 800;
            margin-top: 25px; cursor: pointer; font-size: 16px;
            box-shadow: 0 10px 20px rgba(26,35,126,0.2);
        }

        /* --- Double Security UI --- */
        .security-options {
            margin-top: 20px; display: flex; gap: 10px; justify-content: center;
        }
        .sec-tag {
            font-size: 11px; padding: 5px 12px; border-radius: 20px;
            background: #E8EAF6; color: var(--primary); font-weight: 700;
        }

        /* --- Modern Google Button --- */
        .google-divider {
            display: flex; align-items: center; margin: 25px 0; color: #999; font-size: 13px;
        }
        .google-divider::before, .google-divider::after {
            content: ""; flex: 1; height: 1px; background: #EEE; margin: 0 10px;
        }

        #googleBtn { display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="reg-card animate__animated animate__fadeInUp">
        <div class="logo-area">
            <b>CMchat <span>Pro</span></b>
            <p style="color:#666; font-size:14px; margin-top:10px;">Create your elite account</p>
        </div>

        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" id="regName" placeholder="Full Name">
        </div>

        <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="Email Address">
        </div>

        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPass" placeholder="Password">
        </div>

        <div class="security-options">
            <span class="sec-tag"><i class="fas fa-shield-check"></i> Encrypted</span>
            <span class="sec-tag"><i class="fas fa-fingerprint"></i> Biometric Ready</span>
        </div>

        <button class="btn-reg" onclick="handleRegister()">CREATE ACCOUNT</button>

        <div class="google-divider">OR CONTINUE WITH</div>

        <div id="googleBtn"></div>
        
        <p style="margin-top:25px; font-size:14px; color:#666;">
            Already have an account? <a href="Login.html" style="color:var(--primary); font-weight:700; text-decoration:none;">Login</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- Modern Google Login Integration ---
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "874591203456-example.apps.googleusercontent.com", // Saka naka a nan
                callback: handleGoogleResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { theme: "outline", size: "large", width: "350", shape: "pill" } 
            );
        };

        function handleGoogleResponse(response) {
            const credential = response.credential;
            const googleAuth = firebase.auth.GoogleAuthProvider.credential(credential);
            
            auth.signInWithCredential(googleAuth).then(result => {
                const user = result.user;
                saveUserData(user.uid, user.displayName, user.email);
            }).catch(error => alert(error.message));
        }

        // --- Normal Registration ---
        function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;

            if(!name || !email || !pass) return alert("Please fill all fields");

            auth.createUserWithEmailAndPassword(email, pass).then(result => {
                saveUserData(result.user.uid, name, email);
            }).catch(error => alert(error.message));
        }

        function saveUserData(uid, name, email) {
            db.ref('users/' + uid).set({
                username: name,
                email: email,
                uid: uid,
                wallet: 0,
                securitySet: false // Zai zama true idan ya saita PIN
            }).then(() => {
                localStorage.setItem('username', name);
                // Redirect zuwa saita PIN (Double Security)
                location.href = 'Security-Pin.html';
            });
        }
    </script>
</body>
</html>
