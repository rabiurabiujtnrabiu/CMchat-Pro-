<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #0a0e27; --card: rgba(255,255,255,0.08); --g: #FFD600; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; }
        
        .register-card { background: var(--card); padding: 40px 30px; border-radius: 25px; width: 90%; max-width: 400px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h2 { color: var(--g); margin-bottom: 30px; font-weight: 800; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--g); font-size: 14px; }
        .input-group input { width: 100%; padding: 15px 15px 15px 45px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; outline: none; box-sizing: border-box; font-size: 14px; background: rgba(255,255,255,0.05); color: white; transition: 0.3s; }
        .input-group input:focus { border-color: var(--g); background: rgba(255,255,255,0.1); }
        
        .reg-btn { width: 100%; padding: 16px; background: var(--g); color: #0a0e27; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .reg-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 214, 0, 0.2); }
        .reg-btn:disabled { background: #555; cursor: not-allowed; }

        .footer-link { margin-top: 25px; font-size: 13px; color: #aaa; }
        .footer-link a { color: var(--g); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>CMchat Pro</h2>
        <p style="color: #888; font-size: 12px; margin-top: -20px; margin-bottom: 30px;">Create your professional account</p>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="regName" placeholder="Full Name">
        </div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="Email Address">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPass" placeholder="Password">
        </div>

        <div class="input-group">
            <i class="fas fa-gift"></i>
            <input type="text" id="regRef" placeholder="Referral Code (Optional)">
        </div>

        <button class="reg-btn" id="regBtn" onclick="handleRegister()">Sign Up Now</button>
        
        <div class="footer-link">
            Already have an account? <a href="index.html">Login</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        
        const auth = firebase.auth();
        const firestore = firebase.firestore();
        const rtdb = firebase.database();

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            const ref = document.getElementById('regRef').value.trim();
            const btn = document.getElementById('regBtn');

            if(!name || !email || !pass) {
                Swal.fire('Error', 'Please fill all required fields!', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // 1. Create User in Authentication
                const userCred = await auth.createUserWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;

                // 2. Save to Firestore (Professional Storage)
                await firestore.collection('users').doc(uid).set({
                    username: name,
                    email: email,
                    uid: uid,
                    referredBy: ref || "Direct",
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 3. Save to Realtime Database (FOR EXPLORE/NETWORK PAGE)
                // Wannan shi ne zai sa mutane su bayyana a "Add Friend"
                await rtdb.ref('users/' + uid).set({
                    username: name,
                    email: email,
                    uid: uid,
                    avatar: name[0].toUpperCase(),
                    status: "online"
                });

                // 4. Save to LocalStorage (To fix 'undefined' name in posts)
                localStorage.setItem('user_uid', uid);
                localStorage.setItem('username', name);

                Swal.fire({
                    icon: 'success',
                    title: 'Welcome!',
                    text: 'Account created successfully.',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = 'index.html';
                });

            } catch (err) {
                Swal.fire('Registration Failed', err.message, 'error');
                btn.disabled = false;
                btn.innerText = "Sign Up Now";
            }
        }
    </script>
</body>
</html>
