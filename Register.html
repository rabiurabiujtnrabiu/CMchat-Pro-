<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --error: #d93025; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .register-card { background: white; padding: 40px 30px; border-radius: 25px; width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; }
        h2 { color: #333; margin-bottom: 25px; font-weight: 700; }

        .input-box { position: relative; margin-bottom: 18px; text-align: left; }
        .input-box i:not(.toggle-password) { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #888; transition: 0.3s; }
        .input-box input { width: 100%; padding: 15px 45px 15px 50px; border: 2px solid #f1f1f1; border-radius: 15px; outline: none; box-sizing: border-box; font-size: 15px; transition: 0.3s; background: #fafafa; }
        .input-box input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 10px rgba(26, 115, 232, 0.1); }
        
        .toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #aaa; cursor: pointer; padding: 5px; }
        
        /* Referral Box Styling */
        .ref-container { background: #eef5ff; border-radius: 15px; padding: 12px; margin-bottom: 20px; border: 1px dashed var(--primary); }
        .ref-label { font-size: 11px; color: var(--primary); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .ref-input { border: none !important; background: transparent !important; padding: 5px 10px !important; text-align: center; font-weight: bold; color: #333; letter-spacing: 1px; }

        .error-msg { color: var(--error); font-size: 12px; display: none; margin-top: 5px; font-weight: 500; }
        
        .reg-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3); }
        .reg-btn:hover { background: #1557b0; transform: translateY(-2px); }
        .reg-btn:disabled { background: #ccc; box-shadow: none; transform: none; }

        /* Success Modal */
        #successModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 320px; animation: slideUp 0.4s ease; }
        .modal-content i { font-size: 60px; color: var(--success); margin-bottom: 20px; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Create Account</h2>

        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" id="regName" placeholder="Full Name">
        </div>

        <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="Email Address">
        </div>

        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPass" placeholder="Password">
            <i class="fas fa-eye toggle-password" onclick="toggleVisibility('regPass', this)"></i>
        </div>

        <div class="input-box">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPass" placeholder="Confirm Password">
            <i class="fas fa-eye toggle-password" onclick="toggleVisibility('confirmPass', this)"></i>
            <span id="passError" class="error-msg"><i class="fas fa-exclamation-circle"></i> Passwords do not match!</span>
        </div>

        <div class="ref-container">
            <span class="ref-label">Referral Program</span>
            <div class="input-box" style="margin-bottom: 0;">
                <i class="fas fa-gift" style="color: var(--primary);"></i>
                <input type="text" id="regRef" class="ref-input" placeholder="Enter Code (Optional)">
            </div>
        </div>

        <button class="reg-btn" id="regBtn" onclick="handleRegister()">Sign Up</button>
        
        <p style="font-size: 14px; color: #666; margin-top: 20px;">
            Already have an account? <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">index</a>
        </p>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <i class="fas fa-check-circle"></i>
            <h2 style="margin: 0;">Awesome!</h2>
            <p style="color: #666; margin: 15px 0 25px;">Your account has been created successfully.</p>
            <button class="reg-btn" onclick="window.location.href='index.html'">Continue to login</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            projectId: "cmchat-pro"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. AUTO-FILL REFERRAL FROM URL (?ref=CODE)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const refCode = params.get('ref');
            if (refCode) {
                const refInput = document.getElementById('regRef');
                refInput.value = refCode;
                refInput.readOnly = true; // Make it read-only if it came from a link
                refInput.style.color = "var(--primary)";
            }
        };

        function toggleVisibility(id, icon) {
            const el = document.getElementById(id);
            if(el.type === "password") {
                el.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                el.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            const cPass = document.getElementById('confirmPass').value;
            const ref = document.getElementById('regRef').value.trim();
            const btn = document.getElementById('regBtn');
            const passError = document.getElementById('passError');

            // Reset UI
            passError.style.display = "none";
            
            if(!name || !email || !pass) { alert("Please fill all fields!"); return; }
            if(pass !== cPass) { passError.style.display = "block"; return; }
            if(pass.length < 6) { alert("Password too short!"); return; }

            btn.disabled = true;
            btn.innerText = "Creating Account...";

            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;

                // Save to Firestore
                await db.collection('users').doc(uid).set({
                    username: name,
                    email: email,
                    uid: uid,
                    referredBy: ref || "Direct",
                    profilePic: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Show Success Modal
                document.getElementById('successModal').style.display = 'flex';

            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = "Sign Up";
            }
        }
    </script>
</body>
</html>
