<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .register-card { background: white; padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .input-box { position: relative; margin-bottom: 15px; }
        .input-box i:not(.toggle-password) { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        .input-box input { width: 100%; padding: 14px 40px 14px 45px; border: 1.5px solid #eee; border-radius: 15px; outline: none; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        .input-box input:focus { border-color: var(--primary); }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; cursor: pointer; z-index: 10; }
        .reg-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .reg-btn:disabled { background: #ccc; cursor: not-allowed; }
        .optional-tag { font-size: 10px; color: #999; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2 style="margin-bottom: 25px;">Create Account</h2>
        
        <div class="input-box"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Full Name" required></div>
        <div class="input-box"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email Address" required></div>
        
        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPass" placeholder="Create Password" required>
            <i class="fas fa-eye toggle-password" onclick="toggleVisibility('regPass', this)"></i>
        </div>

        <div class="input-box">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPass" placeholder="Confirm Password" required>
            <i class="fas fa-eye toggle-password" onclick="toggleVisibility('confirmPass', this)"></i>
        </div>
        
        <div class="input-box">
            <i class="fas fa-users"></i>
            <input type="text" id="regRef" placeholder="Referral Code">
            <span class="optional-tag">Optional</span>
        </div>
        
        <button class="reg-btn" id="regBtn" onclick="handleRegister()">Sign Up</button>
        
        <div style="margin-top:20px; font-size:14px;">
            Already have an account? <span style="color:var(--primary); font-weight:bold; cursor:pointer;" onclick="location.href='Login.html'">Login</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            projectId: "cmchat-pro"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Function na alamar ido
        function toggleVisibility(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const cPass = document.getElementById('confirmPass').value.trim();
            const referralCode = document.getElementById('regRef').value.trim();
            const btn = document.getElementById('regBtn');

            if(!name || !email || !pass || !cPass) {
                alert("Please fill in all required fields!");
                return;
            }
            if(pass !== cPass) {
                alert("Passwords do not match!");
                return;
            }
            if(pass.length < 6) {
                alert("Password must be at least 6 characters!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // 1. Create User in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // 2. Save User Profile to Firestore
                await db.collection('users').doc(user.uid).set({
                    username: name,
                    email: email,
                    uid: user.uid,
                    profilePic: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    referredBy: referralCode || "None",
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 3. Initialize Wallet & Arena (Only if rules allow or use a separate logic)
                // Note: If you get permission error here, it means rules are strictly protecting wallets.
                console.log("Profile created, setting up stats...");

                alert("Registration Successful!");
                location.href = 'Login.html';

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Sign Up";
            }
        }
    </script>
</body>
</html>
