<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Academy Pro - Learning System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* All your original styles remain untouched */
        :root {
            --primary: #1A237E; --accent: #FFD600; --danger: #FF5252;
            --success: #00E676; --info: #00B0FF; --bg: #F8F9FA; --card-bg: #ffffff;
        }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; color: #333; }
        header { background: var(--primary); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-left i { font-size: 18px; cursor: pointer; }
        .header-left b { font-size: 20px; letter-spacing: 0.5px; }
        .live-badge { background: var(--danger); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .video-box { margin: 15px; height: 230px; background: #000; border-radius: 24px; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 4px solid var(--card-bg); overflow: hidden; }
        .malami-tag { position: absolute; bottom: 12px; left: 12px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); padding: 6px 14px; border-radius: 12px; font-size: 12px; color: white; display: flex; align-items: center; gap: 8px; }
        .section-header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 14px; color: #666; }
        .attendance-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 0 15px 20px; }
        .student-card { background: var(--card-bg); padding: 12px 5px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.04); transition: 0.3s; }
        .student-card .status-dot { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin-bottom: 6px; }
        .bg-in { background: linear-gradient(135deg, var(--success), #00C853); }
        .bg-out { background: linear-gradient(135deg, var(--danger), #D32F2F); }
        .student-card span { font-size: 10px; color: #888; font-weight: 600; text-align: center; }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px 20px; }
        .btn-pro { padding: 15px; border: none; border-radius: 18px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-pro:active { transform: scale(0.95); }
        .bottom-nav { background: var(--card-bg); padding: 15px 10px 25px; display: flex; justify-content: space-around; border-radius: 35px 35px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); }
        .tool-btn { width: 54px; height: 54px; border-radius: 16px; border: none; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .tool-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-chevron-left" onclick="window.history.back()"></i>
            <b>CM Academy Pro</b>
        </div>
        <div class="live-badge" id="liveStatus">
            <i class="fas fa-broadcast-tower"></i> LIVE VIDEO
        </div>
    </header>

    <div class="main-content">
        <div class="video-box" id="videoContainer">
            <div class="malami-tag">
                <i class="fas fa-user-tie"></i> Instructor: <span id="teacherName">Loading...</span>
            </div>
        </div>

        <div class="section-header">
            <span>ACTIVE STUDENTS</span>
            <span style="color: var(--success);" id="activeCount"><i class="fas fa-users"></i> 0 Active</span>
        </div>

        <div class="attendance-grid" id="studentGrid">
            </div>

        <div class="action-row">
            <button class="btn-pro" style="background: #5C6BC0;" onclick="downloadNote()">
                <i class="fas fa-file-download"></i> Download Note
            </button>
            <button class="btn-pro" style="background: #26A69A;" onclick="window.location.href='Chat.html'">
                <i class="fas fa-comments"></i> Group Chat
            </button>
            <button class="btn-pro" style="background: var(--danger); grid-column: span 2;" onclick="raiseHand()">
                <i class="fas fa-hand-paper"></i> Raise Your Hand (Question)
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="tool-btn" style="background: #42A5F5;" onclick="toggleVideo()"><i class="fas fa-video"></i></button>
        <button class="tool-btn" style="background: var(--success);" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
        <button class="tool-btn" style="background: var(--accent); color: #333;" onclick="openBoard()"><i class="fas fa-chalkboard"></i></button>
        <button class="tool-btn" style="background: #78909C;" onclick="openSettings()"><i class="fas fa-cog"></i></button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Student_" + Math.floor(Math.random()*100);

        // 1. Live Attendance System
        const userStatusRef = db.ref('academy/attendance/' + myName);
        userStatusRef.set({ status: 'online', last_seen: Date.now() });
        userStatusRef.onDisconnect().set({ status: 'offline', last_seen: Date.now() });

        // 2. Fetch Instructor & Live Status
        db.ref('academy/config').on('value', snap => {
            const config = snap.val() || { teacher: "Prof. Ibrahim", isLive: true };
            document.getElementById('teacherName').innerText = config.teacher;
            document.getElementById('liveStatus').style.display = config.isLive ? 'flex' : 'none';
        });

        // 3. Update Student Grid in Real-time
        db.ref('academy/attendance').on('value', snap => {
            const grid = document.getElementById('studentGrid');
            const countLabel = document.getElementById('activeCount');
            grid.innerHTML = "";
            let onlineCount = 0;

            snap.forEach(child => {
                const user = child.val();
                const isOnline = user.status === 'online';
                if(isOnline) onlineCount++;

                grid.innerHTML += `
                    <div class="student-card animate__animated animate__fadeIn">
                        <div class="status-dot ${isOnline ? 'bg-in' : 'bg-out'}">
                            ${child.key.charAt(0).toUpperCase()}
                        </div>
                        <span>${child.key}</span>
                    </div>
                `;
            });
            countLabel.innerHTML = `<i class="fas fa-users"></i> ${onlineCount} Active`;
        });

        // 4. Functional Buttons
        function raiseHand() {
            db.ref('academy/notifications').push({
                user: myName,
                type: 'hand_raise',
                time: Date.now()
            });
            alert("Your teacher has been notified that you have a question.");
        }

        function downloadNote() {
            db.ref('academy/materials').once('value', snap => {
                const data = snap.val();
                if(data && data.noteUrl) {
                    window.open(data.noteUrl);
                } else {
                    alert("No study materials uploaded yet for this session.");
                }
            });
        }

        // Dummy Tool Actions
        function toggleVideo() { alert("Camera toggled"); }
        function toggleMic() { alert("Microphone toggled"); }
        function openBoard() { alert("Opening Interactive Whiteboard..."); }
        function openSettings() { alert("Classroom Settings"); }

    </script>
</body>
</html>
