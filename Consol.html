<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Console | CM Academy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --p: #1A237E; --accent: #FFD600; --bg: #0a0f18; --card: #151c27; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; padding-bottom: 50px; }

        .header { background: linear-gradient(135deg, var(--p), #283593); padding: 40px 25px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 25px 20px; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: -30px; padding: 0 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }

        .config-card { background: var(--card); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .card-header { font-size: 14px; font-weight: 800; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; }
        .admin-input { width: 100%; padding: 15px; background: #0a0f18; border: 1px solid #1e293b; border-radius: 15px; color: white; outline: none; }
        
        .btn-sync { width: 100%; padding: 18px; background: var(--p); color: white; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #1e293b; }

        /* Switch UI */
        .switch { position: relative; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #334155; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: #0062ff; }
        input:checked + .slider:before { transform: translateX(21px); }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <i class="fas fa-chevron-left" onclick="history.back()"></i>
            <b style="font-size:18px;">Control Center</b>
            <i class="fas fa-key" onclick="checkAuth()"></i>
        </div>
        <h2 style="margin-top:20px; font-size:24px;">Academy Console</h2>
    </div>

    <div class="stat-row">
        <div class="stat-card">
            <h3 id="onlineStudents">0</h3>
            <p style="font-size:10px; color:#64748b;">Active Students</p>
        </div>
        <div class="stat-card">
            <h3 id="totalSales">₦0</h3>
            <p style="font-size:10px; color:#64748b;">Daily Revenue</p>
        </div>
    </div>

    <div class="main-grid">
        <div class="config-card">
            <div class="card-header"><i class="fas fa-sliders"></i> Global Governance</div>
            <div class="toggle-row">
                <span>Classroom Live Mode</span>
                <label class="switch">
                    <input type="checkbox" id="liveToggle" onchange="updateSys('is_live', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>Auto-Mute Everyone</span>
                <label class="switch">
                    <input type="checkbox" id="muteToggle" onchange="updateSys('global_mute', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="config-card">
            <div class="card-header"><i class="fas fa-pen-to-square"></i> Instructor Settings</div>
            <div class="input-group">
                <label>ACTIVE SENIOR MENTOR</label>
                <input type="text" id="mentorName" class="admin-input" placeholder="e.g. Commander CM">
            </div>
            <div class="input-group">
                <label>ACADEMY ANNOUNCEMENT</label>
                <textarea id="academyNotice" class="admin-input" rows="2" placeholder="Scrollable news..."></textarea>
            </div>
            <button class="btn-sync" onclick="syncContent()">SYNC TO ACADEMY</button>
        </div>

        <div class="config-card" style="border-color: #ff3d0044;">
            <div class="card-header" style="color: #ff3d00;"><i class="fas fa-triangle-exclamation"></i> Emergency Actions</div>
            <button onclick="wipeBoard()" style="width:100%; padding:15px; background:#ff3d001a; color:#ff3d00; border:1px solid #ff3d00; border-radius:15px; font-weight:800; font-size:12px;">WIPE ALL BOARD DATA</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Security Authentication
        function checkAuth() {
            Swal.fire({
                title: 'Admin Verification',
                input: 'password',
                inputPlaceholder: 'Enter Admin Key',
                background: '#151c27',
                color: '#fff',
                confirmButtonColor: '#0062ff'
            }).then(r => {
                if(r.value === "CM2026") { 
                    Swal.fire('Verified!', 'Full access granted.', 'success'); 
                } else { 
                    Swal.fire('Denied!', 'Unauthorized access.', 'error');
                    history.back();
                }
            });
        }

        // Live Sync
        db.ref('academy/config').on('value', snap => {
            const c = snap.val() || {};
            document.getElementById('liveToggle').checked = c.is_live || false;
            document.getElementById('muteToggle').checked = c.global_mute || false;
            document.getElementById('mentorName').value = c.teacher || "";
            document.getElementById('academyNotice').value = c.notice || "";
        });

        // Online Counter Sync
        db.ref('academy/attendance').on('value', snap => {
            document.getElementById('onlineStudents').innerText = snap.numChildren();
        });

        function updateSys(key, val) {
            db.ref('academy/config/' + key).set(val);
        }

        function syncContent() {
            const teacher = document.getElementById('mentorName').value;
            const notice = document.getElementById('academyNotice').value;
            db.ref('academy/config').update({ teacher, notice }).then(() => {
                Swal.fire({ icon: 'success', title: 'Synced Successfully', background: '#151c27', color: '#fff' });
            });
        }

        function wipeBoard() {
            Swal.fire({
                title: 'Confirm Wipe?',
                text: "All drawings on the Smartboard will be gone!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff3d00'
            }).then(r => {
                if(r.isConfirmed) {
                    db.ref('boards/academy_master_board').remove();
                    db.ref('boards/academy_master_board').push({ type: 'clear' });
                }
            });
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
