<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Video View | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #0062ff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: #000; color: white; height: 100vh; overflow: hidden; }

        /* --- VIDEO CONTAINER --- */
        .video-wrapper { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* --- OVERLAY COMPONENTS --- */
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 80px 20px 40px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .overlay * { pointer-events: auto; }

        .user-info h4 { font-size: 16px; font-weight: 800; margin-bottom: 5px; color: #fff; }
        .video-desc { font-size: 14px; color: #e2e8f0; line-height: 1.4; max-width: 80%; }

        /* --- RIGHT ACTION SIDEBAR --- */
        .side-actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .action-item { text-align: center; cursor: pointer; transition: 0.3s; }
        .action-item i { font-size: 28px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .action-item span { display: block; font-size: 12px; font-weight: 700; margin-top: 5px; }
        .action-item.liked i { color: #ff3b30; }

        /* --- ADS BOX --- */
        .ads-container { background: var(--glass); backdrop-filter: blur(10px); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .ads-badge { background: #ff9500; color: #000; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }

        /* --- NAVIGATION --- */
        .top-nav { position: absolute; top: 20px; left: 20px; z-index: 1000; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--glass); display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; backdrop-filter: blur(10px); }

        /* --- COMMENT SECTION (HIDDEN BY DEFAULT) --- */
        #commentPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 60%; background: white; border-radius: 20px 20px 0 0; color: #1e293b; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; padding: 20px; }
        #commentPanel.active { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    </div>

    <div class="video-wrapper">
        <video id="mainVideo" autoplay loop playsinline>
            <source src="" type="video/mp4">
        </video>

        <div class="side-actions">
            <div class="action-item" id="likeBtn" onclick="toggleLike()">
                <i class="fas fa-heart"></i>
                <span id="likeCount">0</span>
            </div>
            <div class="action-item" onclick="toggleComments()">
                <i class="fas fa-comment-dots"></i>
                <span id="commentCount">0</span>
            </div>
            <div class="action-item" onclick="shareVideo()">
                <i class="fas fa-share"></i>
                <span>Share</span>
            </div>
        </div>

        <div class="overlay">
            <div class="user-info">
                <h4 id="videoAuthor">@Elite_Commander</h4>
                <p class="video-desc" id="videoText">Experience the next generation of social interaction.</p>
            </div>

            <div class="ads-container" onclick="location.href='https://google.com'">
                <span class="ads-badge">Ad</span>
                <div style="flex:1">
                    <p style="font-size: 12px; font-weight: 800;">Elite Hosting Pro</p>
                    <p style="font-size: 10px; color: #cbd5e1;">Get 50% off on all elite servers today!</p>
                </div>
                <i class="fas fa-external-link-alt" style="font-size: 12px; color: #cbd5e1;"></i>
            </div>
        </div>
    </div>

    <div id="commentPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="font-weight:800;">Comments</h3>
            <i class="fas fa-times" onclick="toggleComments()"></i>
        </div>
        <div id="commentList" style="height:80%; overflow-y:auto;">
            <p style="text-align:center; color:#94a3b8; margin-top:20px;">No comments yet. Be the first!</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. LOAD VIDEO DATA FROM DASHBOARD
        const videoData = JSON.parse(localStorage.getItem('current_video_view'));
        if (videoData) {
            document.getElementById('mainVideo').src = videoData.url;
            document.getElementById('videoAuthor').innerText = `@${videoData.username.replace(/\s+/g, '_')}`;
            document.getElementById('videoText').innerText = videoData.text;
        }

        // 2. LIVE LIKE LOGIC
        let isLiked = false;
        function toggleLike() {
            const btn = document.getElementById('likeBtn');
            const count = document.getElementById('likeCount');
            isLiked = !isLiked;
            
            if (isLiked) {
                btn.classList.add('liked');
                count.innerText = parseInt(count.innerText) + 1;
                // Nan zaka iya hada Firebase Update
            } else {
                btn.classList.remove('liked');
                count.innerText = parseInt(count.innerText) - 1;
            }
        }

        // 3. COMMENT PANEL LOGIC
        function toggleComments() {
            document.getElementById('commentPanel').classList.toggle('active');
        }

        // 4. SHARING LOGIC
        async function shareVideo() {
            try {
                await navigator.share({
                    title: 'CMchat Pro Video',
                    text: videoData.text,
                    url: window.location.href
                });
            } catch (err) {
                alert("Link copied to clipboard!");
            }
        }
    </script>
</body>
</html>
