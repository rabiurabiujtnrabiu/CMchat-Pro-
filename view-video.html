<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Reels | CMchat Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0062ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            height: 100vh; 
            overflow: hidden; /* Muna toshe asalin scroll na body */
        }

        /* --- VERTICAL SCROLL CONTAINER --- */
        #videoContainer {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Wannan shi ne sirrin TikTok scroll */
            scrollbar-width: none;
        }
        #videoContainer::-webkit-scrollbar { display: none; }

        .video-page {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- UI OVERLAYS (Like, Share, Info) --- */
        .overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 100px 20px 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            pointer-events: none;
            z-index: 10;
        }
        .overlay * { pointer-events: auto; }

        .side-actions {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 20px;
            z-index: 20;
        }
        .action-item { text-align: center; color: white; cursor: pointer; }
        .action-item i { font-size: 30px; margin-bottom: 5px; }

        .ads-mini {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px; border-radius: 12px;
            margin-top: 10px; display: flex; align-items: center; gap: 10px;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            z-index: 100; color: white; font-size: 20px;
            background: rgba(0,0,0,0.3); width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <div id="videoContainer">
        </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. DAUKO DUKKAN VIDEOS DAGA FIREBASE
        async function loadFeed() {
            const container = document.getElementById('videoContainer');
            const snap = await db.collection('posts').orderBy('timestamp', 'desc').limit(10).get();
            
            container.innerHTML = '';
            
            snap.forEach(doc => {
                const p = doc.data();
                if (p.media && p.media[0].type === 'video') {
                    const videoUrl = p.media[0].url;
                    
                    const videoElement = `
                        <div class="video-page">
                            <video class="main-video" loop playsinline preload="metadata">
                                <source src="${videoUrl}" type="video/mp4">
                            </video>
                            
                            <div class="side-actions">
                                <div class="action-item"><i class="fas fa-heart"></i><span>1</span></div>
                                <div class="action-item"><i class="fas fa-comment"></i><span>0</span></div>
                                <div class="action-item"><i class="fas fa-share"></i></div>
                            </div>

                            <div class="overlay">
                                <h4 style="font-weight:800; margin-bottom:5px;">@${p.username}</h4>
                                <p style="font-size:14px; color:#ddd;">${p.text || ''}</p>
                                <div class="ads-mini">
                                    <span style="background:#febd00; color:black; font-size:10px; padding:2px 5px; border-radius:4px; font-weight:900;">AD</span>
                                    <span style="font-size:12px;">Elite Web Services - 50% Off</span>
                                </div>
                            </div>
                        </div>`;
                    container.insertAdjacentHTML('beforeend', videoElement);
                }
            });

            setupObserver();
        }

        // 2. OBSERVER DOMIN PLAY/PAUSE NAN TAKE (Don gudun delay)
        function setupObserver() {
            const options = { threshold: 0.8 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(e => {});
                    } else {
                        video.pause();
                        video.currentTime = 0; // Maida shi farko idan an wuce
                    }
                });
            }, options);

            document.querySelectorAll('.video-page').forEach(page => {
                observer.observe(page);
            });
        }

        loadFeed();
    </script>
</body>
</html>
