<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMchat Pro | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
        }
        /* Sidebar */
        .sidebar {
            width: 80px;
            background: var(--card-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #334155;
            position: fixed;
        }
        .sidebar i {
            font-size: 1.5rem;
            margin: 20px 0;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.3s;
        }
        .sidebar i:hover, .sidebar i.active {
            color: var(--primary);
        }
        /* Main Content */
        .main-content {
            margin-left: 80px;
            padding: 30px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #334155;
        }
        .card h3 { margin: 0; font-size: 0.9rem; color: #94a3b8; }
        .card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0 0; }

        /* Table */
        .activity-table {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            border-collapse: collapse;
        }
        .activity-table th, .activity-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fas fa-home active"></i>
        <i class="fas fa-user"></i>
        <i class="fas fa-comment"></i>
        <i class="fas fa-cog"></i>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Welcome, Hamza</h2>
            <img src="https://via.placeholder.com/40" style="border-radius: 50%;">
        </div>

        <div class="stats-grid">
            <div class="card">
                <h3>Total Users</h3>
                <p>1,240</p>
            </div>
            <div class="card">
                <h3>Messages</h3>
                <p>852</p>
            </div>
            <div class="card">
                <h3>Status</h3>
                <p style="color: #10b981;">Online</p>
            </div>
        </div>

        <h3>Recent Activity</h3>
        <table class="activity-table">
            <tr><th>User</th><th>Status</th><th>Time</th></tr>
            <tr><td>Aliyu Musa</td><td>Joined</td><td>2m ago</td></tr>
            <tr><td>Binta Sani</td><td>Message</td><td>5m ago</td></tr>
        </table>
    </div>
</body>
</html>
