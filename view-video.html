<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMchat PRO - Professional UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .active-tab { color: #1877f2; border-bottom: 3px solid #1877f2; }
        .story-card { width: 110px; height: 180px; border-radius: 12px; position: relative; overflow: hidden; }
    </style>
</head>
<body>

    <header class="bg-white p-3 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <button class="bg-gray-100 p-2 rounded-full"><i class="fa-solid fa-bars text-gray-700"></i></button>
            <h1 class="text-blue-600 font-bold text-xl leading-tight">CMchat<br>PRO</h1>
        </div>
        <div class="flex items-center gap-2">
            <button class="bg-gray-100 p-2 rounded-full"><i class="fa-solid fa-cart-shopping text-gray-700"></i></button>
            <button class="bg-gray-100 p-2 rounded-full"><i class="fa-solid fa-magnifying-glass text-gray-700"></i></button>
            <button class="bg-gray-100 p-2 rounded-full"><i class="fa-brands fa-facebook-messenger text-gray-700"></i></button>
            <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold border border-blue-100">
                ₦0.00
            </div>
        </div>
    </header>

    <div class="bg-white mt-2 p-4 flex items-center gap-3">
        <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
        <div class="flex-1">
            <input type="text" placeholder="What's on your mind, CM...?" class="w-full bg-gray-100 rounded-full py-2 px-4 outline-none border-none">
        </div>
        <i class="fa-regular fa-image text-green-500 text-2xl"></i>
    </div>

    <nav class="bg-white border-t border-gray-100 flex justify-around items-center pt-2">
        <div class="flex flex-col items-center pb-2 active-tab w-1/4">
            <i class="fa-solid fa-comment-dots text-xl"></i>
            <span class="text-xs font-semibold">Chatting</span>
        </div>
        <div class="flex flex-col items-center pb-2 text-gray-500 w-1/4">
            <i class="fa-solid fa-users-viewfinder text-xl"></i>
            <span class="text-xs font-semibold">Group</span>
        </div>
        <div class="flex flex-col items-center pb-2 text-gray-500 w-1/4">
            <i class="fa-solid fa-user-plus text-xl"></i>
            <span class="text-xs font-semibold">Friends</span>
        </div>
        <div class="flex flex-col items-center pb-2 text-gray-500 w-1/4">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-xs font-semibold">Settings</span>
        </div>
    </nav>

    <div class="flex gap-2 p-4 overflow-x-auto bg-white mt-2 no-scrollbar">
        <div class="story-card bg-gray-100 border border-gray-200 flex flex-col justify-end items-center">
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-10 bg-blue-600 rounded-full p-2 border-4 border-white text-white">
                <i class="fa-solid fa-plus"></i>
            </div>
            <div class="bg-white w-full py-2 text-center text-[10px] font-bold">Create Story</div>
        </div>
        
        <div class="story-card bg-gray-400">
            <img src="https://via.placeholder.com/110x180" class="w-full h-full object-cover">
            <span class="absolute bottom-2 left-2 text-white text-[10px] font-bold">Anonymous</span>
        </div>
        <div class="story-card bg-gray-400">
            <img src="https://via.placeholder.com/110x180" class="w-full h-full object-cover">
            <span class="absolute bottom-2 left-2 text-white text-[10px] font-bold">Anonymous</span>
        </div>
    </div>

    <div class="bg-white m-3 p-3 rounded-lg shadow-sm border border-gray-100">
        <div class="flex justify-between items-center mb-1">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bullhorn text-orange-500"></i>
                <span class="font-bold text-sm">CM Market</span>
            </div>
            <span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-0.5 rounded">Sponsored</span>
        </div>
        <p class="text-sm text-gray-700">Buy Cheap Data And Airtime Instantly On CM Market!</p>
    </div>

    <div class="bg-white mt-2 p-4">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">C</div>
            <div>
                <h4 class="font-bold text-sm">Commander CM</h4>
                <div class="flex items-center gap-1 text-gray-500 text-[10px]">
                    <span>11:32 PM</span> • <i class="fa-solid fa-earth-africa"></i>
                </div>
            </div>
        </div>
        <div class="bg-gray-200 h-64 rounded-xl relative overflow-hidden">
             <button class="absolute top-2 right-2 bg-black/50 text-white rounded-full p-1 w-6 h-6 flex items-center justify-center">
                <i class="fa-solid fa-xmark text-xs"></i>
             </button>
        </div>
    </div>

</body>
</html>
