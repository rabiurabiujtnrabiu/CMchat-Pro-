<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #1A237E; --g: #FFD600; --bg: #0a0e27; --card: rgba(255,255,255,0.08); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        
        header { background: var(--p); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .search-container { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; width: 80%; }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 14px; }
        
        .tabs { display: flex; background: #12183d; position: sticky; top: 60px; z-index: 999; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; text-align: center; padding: 15px 0; font-weight: bold; color: #888; cursor: pointer; font-size: 11px; position: relative; transition: 0.3s; }
        .tab.active { color: var(--g); border-bottom: 3px solid var(--g); }
        .badge { background: #ff0000; color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; position: absolute; top: 8px; right: 5px; border: 1.5px solid #12183d; }

        .content { padding: 15px; min-height: 80vh; padding-bottom: 30px; }
        .user-card { background: var(--card); border-radius: 18px; padding: 12px 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--p); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; object-fit: cover; border: 2px solid var(--g); }
        .details b { display: block; font-size: 14px; color: #fff; }
        .details span { font-size: 11px; color: #aaa; }

        .btn { padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 11px; border: none; cursor: pointer; min-width: 85px; text-transform: uppercase; }
        .btn-add { background: var(--g); color: var(--p); }
        .btn-sent { background: #1e254a !important; color: #64748b !important; cursor: not-allowed; border: 1px solid rgba(255,255,255,0.1); }
        .btn-accept { background: #00E676; color: white; }
        .btn-friends { background: transparent; border: 1px solid rgba(0, 230, 118, 0.3); color: #00E676; pointer-events: none; }
        
        .empty { text-align: center; padding: 100px 20px; color: #555; }
        .empty i { font-size: 40px; margin-bottom: 10px; opacity: 0.2; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <div class="search-container">
            <i class="fas fa-search" style="color: var(--g);"></i>
            <input type="text" placeholder="Search members..." id="searchBox" oninput="filterUsers()">
        </div>
        <i class="fas fa-ellipsis-v"></i>
    </header>

    <div class="tabs">
        <div class="tab active" id="tab-explore" onclick="switchTab('explore')">EXPLORE</div>
        <div class="tab" id="tab-requests" onclick="switchTab('requests')">REQUESTS <span id="reqBadge" class="badge" style="display:none;">0</span></div>
        <div class="tab" id="tab-friends" onclick="switchTab('friends')">FRIENDS</div>
    </div>

    <div class="content" id="mainDisplay"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const myUid = localStorage.getItem('user_uid') || "USER_ANON";
        const myName = localStorage.getItem('username') || "CM Member";

        let currentTab = 'explore';

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            currentTab = tab;
            renderView();
        }

        function renderView() {
            const display = document.getElementById('mainDisplay');
            
            // Cire duk wani listener da yake kai kafin a fara sabo
            db.ref('users').off();
            db.ref('requests/' + myUid).off();
            db.ref('friends/' + myUid).off();

            if (currentTab === 'explore') {
                // GYARA: Mun koma amfani da .on domin ya dauko sabon user nan take ba tare da refresh ba
                db.ref('users').on('value', async snap => {
                    display.innerHTML = "";
                    let usersFound = false;

                    // Dauko bayanan requests don sanin wanda aka tura mawa
                    const reqSnap = await db.ref(`requests`).once('value');
                    
                    snap.forEach(child => {
                        const u = child.val();
                        const uid = child.key;

                        if(uid !== myUid) {
                            usersFound = true;
                            // Duba idan na riga na tura request ga wannan user din
                            let isPending = false;
                            if(reqSnap.hasChild(`${uid}/${myUid}`)) isPending = true;

                            display.innerHTML += `
                            <div class="user-card">
                                <div class="user-info">
                                    <div class="avatar">${u.username ? u.username[0].toUpperCase() : 'M'}</div>
                                    <div class="details"><b>${u.username || 'Member'}</b><span>Available to connect</span></div>
                                </div>
                                <button class="btn ${isPending ? 'btn-sent' : 'btn-add'}" 
                                    id="btn-${uid}" 
                                    ${isPending ? 'disabled' : ''} 
                                    onclick="sendReq('${uid}', '${u.username || 'Member'}')">
                                    ${isPending ? 'PENDING' : 'CONNECT'}
                                </button>
                            </div>`;
                        }
                    });

                    if(!usersFound) {
                        display.innerHTML = '<div class="empty"><i class="fas fa-users-slash"></i><p>No new members yet.</p></div>';
                    }
                });

            } else if (currentTab === 'requests') {
                db.ref('requests/' + myUid).on('value', snap => {
                    display.innerHTML = "";
                    if (!snap.exists()) {
                        display.innerHTML = '<div class="empty"><i class="fas fa-bell-slash"></i><p>No pending requests.</p></div>';
                        return;
                    }
                    snap.forEach(child => {
                        const r = child.val();
                        display.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <div class="avatar" style="background:#00E676">${r.senderName ? r.senderName[0] : 'U'}</div>
                                <div class="details"><b>${r.senderName || 'Unknown User'}</b><span>Wants to be friends</span></div>
                            </div>
                            <button class="btn btn-accept" onclick="acceptFriend('${child.key}', '${r.senderName}')">ACCEPT</button>
                        </div>`;
                    });
                });

            } else if (currentTab === 'friends') {
                db.ref('friends/' + myUid).on('value', snap => {
                    display.innerHTML = "";
                    if (!snap.exists()) {
                        display.innerHTML = '<div class="empty"><i class="fas fa-user-friends"></i><p>No friends yet.</p></div>';
                        return;
                    }
                    snap.forEach(child => {
                        const f = child.val();
                        display.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <div class="avatar" style="background:var(--g); color:var(--p)">${f.name ? f.name[0] : 'F'}</div>
                                <div class="details"><b>${f.name || 'Friend'}</b><span>Connected</span></div>
                            </div>
                            <button class="btn btn-friends">FRIENDS</button>
                        </div>`;
                    });
                });
            }
        }

        window.sendReq = (id, name) => {
            const btn = document.getElementById('btn-' + id);
            db.ref(`requests/${id}/${myUid}`).set({
                senderName: myName,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                btn.className = "btn btn-sent";
                btn.innerText = "PENDING";
                btn.disabled = true;
            });
        };

        window.acceptFriend = (senderId, senderName) => {
            db.ref(`friends/${myUid}/${senderId}`).set({ name: senderName });
            db.ref(`friends/${senderId}/${myUid}`).set({ name: myName });
            db.ref(`requests/${myUid}/${senderId}`).remove().then(() => {
                switchTab('friends');
            });
        };

        // Badge listener na Requests
        db.ref('requests/' + myUid).on('value', snap => {
            const badge = document.getElementById('reqBadge');
            if (snap.exists()) {
                badge.style.display = 'block';
                badge.innerText = snap.numChildren();
            } else { badge.style.display = 'none'; }
        });

        window.filterUsers = () => {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const cards = document.querySelectorAll('.user-card');
            cards.forEach(card => {
                const name = card.querySelector('b').innerText.toLowerCase();
                card.style.display = name.includes(q) ? 'flex' : 'none';
            });
        };

        document.addEventListener('DOMContentLoaded', renderView);
    </script>
</body>
</html>
