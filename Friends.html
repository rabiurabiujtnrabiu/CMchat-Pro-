<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1A237E; --g: #FFD600; --bg: #0a0e27; --card: rgba(255,255,255,0.08); --accent: #00E676; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        header { background: var(--p); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .search-bar { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 25px; display: flex; align-items: center; gap: 10px; width: 85%; border: 1px solid rgba(255,255,255,0.1); }
        .search-bar input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 14px; }
        .tabs { display: flex; background: #12183d; position: sticky; top: 65px; z-index: 999; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; text-align: center; padding: 16px 0; font-weight: 700; color: #888; cursor: pointer; font-size: 12px; position: relative; }
        .tab.active { color: var(--g); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--g); }
        .badge { background: #ff3d00; color: white; font-size: 10px; padding: 2px 7px; border-radius: 20px; position: absolute; top: 10px; right: 10px; }
        .content { padding: 15px; min-height: 85vh; }
        .user-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 15px; background: linear-gradient(45deg, var(--p), #3949ab); display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; font-weight: bold; }
        .details b { display: block; font-size: 15px; color: #fff; }
        .details span { font-size: 11px; color: #aaa; }
        .btn { padding: 10px 18px; border-radius: 12px; font-weight: 800; font-size: 11px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-add { background: var(--g); color: var(--p); }
        .btn-sent { background: rgba(255,255,255,0.1); color: #888; cursor: default; }
        .btn-accept { background: var(--accent); color: white; }
        .btn-friends { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); cursor: default; }
        .empty { text-align: center; padding: 120px 20px; color: #555; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <div class="search-bar">
            <i class="fas fa-search" style="color: var(--g);"></i>
            <input type="text" placeholder="Search for members..." id="searchBox" oninput="filterUsers()">
        </div>
        <i class="fas fa-user-plus" style="color: var(--g);"></i>
    </header>

    <div class="tabs">
        <div class="tab active" id="tab-explore" onclick="switchTab('explore')">EXPLORE</div>
        <div class="tab" id="tab-requests" onclick="switchTab('requests')">REQUESTS <span id="reqBadge" class="badge" style="display:none;">0</span></div>
        <div class="tab" id="tab-friends" onclick="switchTab('friends')">FRIENDS</div>
    </div>

    <div class="content" id="mainDisplay"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com/", 
            projectId: "cmchat-pro"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const myUid = localStorage.getItem('user_uid');
        const myName = localStorage.getItem('username') || "CM Member";

        let currentTab = 'explore';

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            currentTab = tab;
            renderView();
        }

        function renderView() {
            const display = document.getElementById('mainDisplay');
            if (!myUid) {
                display.innerHTML = '<div class="empty"><p>Please Login first.</p></div>';
                return;
            }
            
            db.ref('users').off();
            db.ref('requests/' + myUid).off();
            db.ref('friends/' + myUid).off();

            if (currentTab === 'explore') {
                display.innerHTML = '<div class="empty"><p>Loading members...</p></div>';
                
                db.ref('users').on('value', snap => {
                    if (!snap.exists()) {
                        display.innerHTML = '<div class="empty"><p>No members found in database.</p></div>';
                        return;
                    }
                    
                    display.innerHTML = "";
                    snap.forEach(child => {
                        const u = child.val();
                        const uid = child.key;

                        if (uid !== myUid) {
                            // Kirkirar UI kafin duba status
                            const userDiv = document.createElement('div');
                            userDiv.className = 'user-card';
                            userDiv.id = 'card-' + uid;
                            userDiv.innerHTML = `
                                <div class="user-info">
                                    <div class="avatar">${u.username ? u.username[0].toUpperCase() : 'M'}</div>
                                    <div class="details"><b>${u.username || 'Member'}</b><span>Active Now</span></div>
                                </div>
                                <div id="action-${uid}"><button class="btn btn-add" onclick="sendReq('${uid}', '${u.username}')">CONNECT</button></div>
                            `;
                            display.appendChild(userDiv);

                            // Duba idan kun zama abokai
                            db.ref(`friends/${myUid}/${uid}`).once('value', fSnap => {
                                if (fSnap.exists()) {
                                    document.getElementById('action-' + uid).innerHTML = `<button class="btn btn-friends"><i class="fas fa-check"></i> FRIENDS</button>`;
                                } else {
                                    // Duba idan an tura request
                                    db.ref(`requests/${uid}/${myUid}`).once('value', rSnap => {
                                        if (rSnap.exists()) {
                                            document.getElementById('action-' + uid).innerHTML = `<button class="btn btn-sent" disabled>PENDING</button>`;
                                        }
                                    });
                                }
                            });
                        }
                    });
                });

            } else if (currentTab === 'requests') {
                db.ref('requests/' + myUid).on('value', snap => {
                    display.innerHTML = "";
                    if (!snap.exists()) {
                        display.innerHTML = '<div class="empty"><p>No pending requests.</p></div>';
                        return;
                    }
                    snap.forEach(child => {
                        const r = child.val();
                        display.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <div class="avatar" style="background:var(--accent)">${r.senderName ? r.senderName[0].toUpperCase() : 'U'}</div>
                                <div class="details"><b>${r.senderName || 'Unknown'}</b><span>Wants to connect</span></div>
                            </div>
                            <button class="btn btn-accept" onclick="acceptFriend('${child.key}', '${r.senderName}')">ACCEPT</button>
                        </div>`;
                    });
                });

            } else if (currentTab === 'friends') {
                db.ref('friends/' + myUid).on('value', snap => {
                    display.innerHTML = "";
                    if (!snap.exists()) {
                        display.innerHTML = '<div class="empty"><p>You haven\'t added any friends yet.</p></div>';
                        return;
                    }
                    snap.forEach(child => {
                        const f = child.val();
                        display.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <div class="avatar" style="background:var(--g); color:var(--p)">${f.name ? f.name[0].toUpperCase() : 'F'}</div>
                                <div class="details"><b>${f.name || 'Friend'}</b><span>Connected</span></div>
                            </div>
                            <button class="btn btn-friends" style="color:#888; border-color:#333;">CHAT</button>
                        </div>`;
                    });
                });
            }
        }

        window.sendReq = (targetUid, targetName) => {
            const btnArea = document.getElementById('action-' + targetUid);
            db.ref(`requests/${targetUid}/${myUid}`).set({
                senderName: myName,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                btnArea.innerHTML = `<button class="btn btn-sent" disabled>PENDING</button>`;
                Swal.fire({ icon: 'success', title: 'Sent!', text: 'Request sent to ' + targetName, timer: 1500, showConfirmButton: false });
            }).catch(err => {
                Swal.fire('Error', err.message, 'error');
            });
        };

        window.acceptFriend = (senderId, senderName) => {
            db.ref(`friends/${myUid}/${senderId}`).set({ name: senderName });
            db.ref(`friends/${senderId}/${myUid}`).set({ name: myName });
            db.ref(`requests/${myUid}/${senderId}`).remove().then(() => {
                switchTab('friends');
            });
        };

        db.ref('requests/' + myUid).on('value', snap => {
            const b = document.getElementById('reqBadge');
            if (snap.exists()) { b.style.display = 'block'; b.innerText = snap.numChildren(); }
            else { b.style.display = 'none'; }
        });

        window.filterUsers = () => {
            const q = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => {
                c.style.display = c.querySelector('b').innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        };

        document.addEventListener('DOMContentLoaded', renderView);
    </script>
</body>
</html>
