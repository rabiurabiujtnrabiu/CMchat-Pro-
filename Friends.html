<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root { --p: #1A237E; --g: #FFD600; --bg: #0a0e27; --card: rgba(255,255,255,0.08); }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        header { 
            background: var(--p); padding: 20px; display: flex; align-items: center; 
            justify-content: space-between; position: sticky; top: 0; z-index: 1000;
        }

        .search-container {
            background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 15px;
            display: flex; align-items: center; gap: 10px; width: 70%;
        }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 15px; }

        .tabs { display: flex; background: #12183d; position: sticky; top: 68px; z-index: 999; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { 
            flex: 1; text-align: center; padding: 15px 0; font-weight: bold; 
            color: #888; cursor: pointer; font-size: 13px; position: relative;
        }
        .tab.active { color: var(--g); border-bottom: 3px solid var(--g); }
        .badge { background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; position: absolute; top: 8px; right: 15px; }

        .content { padding: 15px; }
        
        /* User Card Styling */
        .user-card {
            background: var(--card); backdrop-filter: blur(10px); border-radius: 20px; 
            padding: 15px; margin-bottom: 15px; display: flex; align-items: center; 
            justify-content: space-between; border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 0.4s ease;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 55px; height: 55px; border-radius: 15px; object-fit: cover; border: 2px solid var(--g); }
        .details b { display: block; font-size: 16px; color: var(--g); }
        .details span { font-size: 12px; color: #ccc; }

        .btn {
            padding: 10px 15px; border-radius: 12px; font-weight: bold; font-size: 12px;
            border: none; cursor: pointer; transition: 0.3s;
        }
        .btn-add { background: var(--g); color: var(--p); }
        .btn-sent { background: #444; color: #aaa; cursor: not-allowed; }
        .btn-accept { background: #00E676; color: white; }
        .btn-msg { background: transparent; border: 1px solid var(--g); color: var(--g); }

        .empty { text-align: center; padding: 100px 20px; color: #666; }
        .empty i { font-size: 50px; margin-bottom: 15px; opacity: 0.2; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-chevron-left" onclick="window.history.back()"></i>
        <div class="search-container">
            <i class="fas fa-search" style="color: var(--g);"></i>
            <input type="text" placeholder="Search elite members..." id="searchBox" onkeyup="filterUsers()">
        </div>
        <i class="fas fa-ellipsis-v"></i>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('explore', this)">EXPLORE</div>
        <div class="tab" onclick="switchTab('requests', this)">REQUESTS <span id="reqBadge" class="badge" style="display:none;">0</span></div>
        <div class="tab" onclick="switchTab('friends', this)">FRIENDS</div>
    </div>

    <div class="content" id="mainDisplay"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myUid = localStorage.getItem('user_uid'); // Tabbatar ka ajiye UID a login
        const myName = localStorage.getItem('username') || "Elite User";

        let currentTab = 'explore';

        function switchTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentTab = tab;
            renderView();
        }

        function renderView() {
            const display = document.getElementById('mainDisplay');
            display.innerHTML = '<div class="empty"><i class="fas fa-circle-notch fa-spin"></i><p>Syncing data...</p></div>';

            if(currentTab === 'explore') {
                db.ref('users').once('value', snap => {
                    display.innerHTML = "";
                    snap.forEach(child => {
                        if(child.key !== myUid) {
                            const u = child.val();
                            display.innerHTML += `
                            <div class="user-card">
                                <div class="user-info">
                                    <img src="${u.profilePic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="avatar">
                                    <div class="details"><b>${u.username}</b><span>Global Member</span></div>
                                </div>
                                <button class="btn btn-add" id="add-${child.key}" onclick="sendReq('${child.key}', '${u.username}')">ADD FRIEND</button>
                            </div>`;
                        }
                    });
                });
            } else if(currentTab === 'requests') {
                db.ref('requests/' + myUid).on('value', snap => {
                    display.innerHTML = "";
                    if(!snap.exists()) {
                        display.innerHTML = '<div class="empty"><i class="fas fa-bell-slash"></i><p>No new requests.</p></div>';
                        return;
                    }
                    snap.forEach(child => {
                        const r = child.val();
                        display.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar">
                                <div class="details"><b>${r.senderName}</b><span>Wants to connect</span></div>
                            </div>
                            <button class="btn btn-accept" onclick="acceptFriend('${child.key}', '${r.senderName}')">ACCEPT</button>
                        </div>`;
                    });
                });
            } else {
                display.innerHTML = '<div class="empty"><i class="fas fa-user-friends"></i><p>Your friends list is empty.</p></div>';
            }
        }

        window.sendReq = (id, name) => {
            db.ref('requests/' + id + '/' + myUid).set({ senderName: myName, timestamp: Date.now() });
            const btn = document.getElementById('add-' + id);
            btn.className = "btn btn-sent";
            btn.innerText = "SENT";
            btn.disabled = true;
        };

        window.acceptFriend = (senderId, senderName) => {
            db.ref('friends/' + myUid + '/' + senderId).set({ name: senderName });
            db.ref('friends/' + senderId + '/' + myUid).set({ name: myName });
            db.ref('requests/' + myUid + '/' + senderId).remove();
            alert("Connection established with " + senderName);
            renderView();
        };

        // Initial Load
        renderView();

        // Listen for new requests for badge
        db.ref('requests/' + myUid).on('value', snap => {
            const badge = document.getElementById('reqBadge');
            if(snap.exists()) {
                badge.style.display = 'block';
                badge.innerText = snap.numChildren();
            } else {
                badge.style.display = 'none';
            }
        });
    </script>
</body>
</html>
