<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Story Lab | CMchat PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #0062ff;
            --glass: rgba(0, 0, 0, 0.6);
            --border: rgba(255, 255, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; color: white; overflow: hidden; position: relative; touch-action: none; }

        /* Story Canvas */
        #storyPreview { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; transition: 0.5s filter ease;
        }

        /* Top Bar */
        .story-header { 
            position: absolute; top: 0; width: 100%; z-index: 30; 
            padding: 40px 20px 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }
        .header-btn { 
            width: 42px; height: 42px; background: var(--glass); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(15px); border: 1px solid var(--border); color: white; cursor: pointer;
        }
        .publish-btn { 
            background: #fff; color: #000; border: none; padding: 10px 24px; 
            border-radius: 25px; font-weight: 800; font-size: 14px; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(255,255,255,0.2); 
        }

        /* --- ADVANCED DRAGGABLE CAPTION --- */
        #draggable-caption {
            position: absolute; z-index: 20; top: 45%; left: 0;
            width: 100%; text-align: center;
            cursor: move; touch-action: none;
            will-change: transform;
        }
        .caption-input {
            background: transparent; border: none; outline: none;
            color: white; font-size: 32px; text-align: center;
            font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            width: 100%; padding: 10px; caret-color: var(--primary);
            resize: none; overflow: hidden; display: block;
        }

        /* Editing Tools (Right Sidebar) */
        .edit-panel {
            position: absolute; right: 15px; top: 120px; 
            z-index: 30; display: flex; flex-direction: column; gap: 15px;
        }
        .tool-box { 
            width: 48px; height: 48px; background: var(--glass); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(15px); border: 1px solid var(--border); cursor: pointer;
            font-size: 18px; color: #fff; transition: 0.2s;
        }
        .tool-box:active { transform: scale(0.9); }

        /* Bottom Controls */
        .story-footer { 
            position: absolute; bottom: 0; width: 100%; z-index: 30; 
            padding: 30px 20px 40px; display: flex; justify-content: space-around; 
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); 
        }
        .footer-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .footer-circle { 
            width: 60px; height: 60px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        .footer-item span { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #fff; letter-spacing: 1px; }

        /* Status Overlay */
        #statusOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="statusOverlay">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 40px; color: var(--primary);"></i>
        <p style="margin-top: 15px; font-weight: 700;">Sharing your story...</p>
    </div>

    <img id="storyPreview" src="https://via.placeholder.com/1080x1920/111/111?text=.">

    <div class="story-header">
        <div class="header-btn" onclick="window.history.back()"><i class="fas fa-times"></i></div>
        <button id="publishBtn" class="publish-btn">Share Story</button>
    </div>

    <div class="edit-panel">
        <div class="tool-box" onclick="applyFilter('none')"><i class="fas fa-undo"></i></div>
        <div class="tool-box" onclick="applyFilter('grayscale(1)')"><i class="fas fa-moon"></i></div>
        <div class="tool-box" onclick="applyFilter('sepia(0.8)')"><i class="fas fa-palette"></i></div>
        <div class="tool-box" onclick="applyFilter('contrast(1.5)')"><i class="fas fa-adjust"></i></div>
    </div>

    <div id="draggable-caption">
        <textarea id="caption" class="caption-input" placeholder="Type here..." rows="1" oninput="autoResize(this)"></textarea>
    </div>

    <div class="story-footer">
        <label for="mediaInput" class="footer-item">
            <div class="footer-circle" style="background: rgba(255,255,255,0.2); color: #fff; border: 1px solid var(--border);"><i class="fas fa-image"></i></div>
            <span>Media</span>
        </label>
        <div class="footer-item" onclick="changeTextColor()">
            <div class="footer-circle"><i class="fas fa-font"></i></div>
            <span>Color</span>
        </div>
        <div class="footer-item" onclick="location.reload()">
            <div class="footer-circle" style="background: rgba(255,30,30,0.2); color: #ff3b30; border: 1px solid rgba(255,30,30,0.3);"><i class="fas fa-trash-alt"></i></div>
            <span>Reset</span>
        </div>
    </div>

    <input type="file" id="mediaInput" hidden accept="image/*">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const mediaInput = document.getElementById('mediaInput');
        const storyPreview = document.getElementById('storyPreview');
        const publishBtn = document.getElementById('publishBtn');
        const captionArea = document.getElementById('caption');
        const dragBox = document.getElementById('draggable-caption');

        let compressedImageBase64 = "";

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        // --- ELITE 2D DRAG ENGINE (X & Y) ---
        let isDragging = false;
        let startX, startY;
        let xOffset = 0, yOffset = 0;

        dragBox.addEventListener("touchstart", dragStart);
        document.addEventListener("touchend", dragEnd);
        document.addEventListener("touchmove", drag);

        function dragStart(e) {
            if (document.activeElement === captionArea) return;
            isDragging = true;
            startX = e.touches[0].clientX - xOffset;
            startY = e.touches[0].clientY - yOffset;
        }

        function dragEnd() { isDragging = false; }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                xOffset = e.touches[0].clientX - startX;
                yOffset = e.touches[0].clientY - startY;
                dragBox.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`;
            }
        }

        // Filter Logic
        function applyFilter(f) { storyPreview.style.filter = f; }

        // Color Logic
        const colors = ['#ffffff', '#0062ff', '#ff3b30', '#4cd964', '#ffcc00', '#ff2d55', '#000000', '#a259ff'];
        let cIdx = 0;
        function changeTextColor() {
            cIdx = (cIdx + 1) % colors.length;
            captionArea.style.color = colors[cIdx];
        }

        // Media Handling
        mediaInput.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 1080;
                        canvas.height = (img.height * 1080) / img.width;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        storyPreview.src = compressedImageBase64;
                    }
                }
                reader.readAsDataURL(file);
            }
        };

        publishBtn.onclick = () => {
            if(!compressedImageBase64) return alert("Select media first!");
            document.getElementById('statusOverlay').style.display = 'flex';

            db.collection('stories').add({
                imageUrl: compressedImageBase64,
                caption: captionArea.value,
                textColor: captionArea.style.color || '#ffffff',
                xPos: xOffset,
                yPos: yOffset,
                filter: storyPreview.style.filter || 'none',
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                owner: localStorage.getItem('username') || "Elite Member"
            }).then(() => window.history.back());
        };
    </script>
</body>
</html>
