<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMchat Pro - Official Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --dark: #0d47a1; --bg: #f0f2f5; --gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; padding-bottom: 90px; }

        /* Sidebar */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.3s; box-shadow: 2px 0 15px rgba(0,0,0,0.1); }
        .sidebar.active { left: 0; }
        .sidebar-header { background: var(--dark); color: white; padding: 30px 20px; text-align: center; }
        .sidebar-item { display: flex; align-items: center; gap: 15px; padding: 15px; text-decoration: none; color: #444; font-weight: 500; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }

        /* Header */
        .premium-header { background: linear-gradient(135deg, var(--dark), var(--primary)); color: white; padding: 20px 20px 60px; border-radius: 0 0 35px 35px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .sidebar-toggle { font-size: 24px; cursor: pointer; }
        .balance-card { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 15px; cursor: pointer; }

        /* Stories/Status */
        .status-tray { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px; margin-top: -45px; scrollbar-width: none; }
        .status-circle { min-width: 75px; height: 75px; border-radius: 50%; background: white; padding: 3px; border: 3px solid #ffd700; cursor: pointer; position: relative; }
        .status-img { width: 100%; height: 100%; border-radius: 50%; background: #ddd; object-fit: cover; }
        .add-status { background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 3px solid white; }

        /* Action Grid */
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; background: white; border-radius: 25px; margin: 20px 15px; }
        .grid-item { text-align: center; text-decoration: none; color: #444; font-size: 11px; font-weight: 600; cursor: pointer; }
        .grid-item i { display: block; font-size: 22px; margin-bottom: 8px; color: var(--primary); background: #e8f0fe; padding: 12px; border-radius: 18px; }

        /* Post Creation */
        .create-post { background: white; margin: 0 15px 20px; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .fake-input { background: #f1f5f9; flex: 1; padding: 12px 20px; border-radius: 25px; color: #65676b; font-size: 14px; }

        /* Sponsored Ad */
        .ad-card { background: #fffbe6; border: 1px solid #ffe58f; padding: 15px; border-radius: 20px; margin: 15px; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 25px 25px 0 0; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .nav-link { text-decoration: none; color: #94a3b8; text-align: center; font-size: 12px; font-weight: 600; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="width: 70px; height: 70px; background: #eee; border-radius: 50%; margin: 0 auto 10px;"></div>
            <b>CM Academy User</b>
        </div>
        <div class="sidebar-menu">
            <a onclick="location.href='Profile.html'" class="sidebar-item"><i class="fas fa-user"></i> My Profile</a>
            <a onclick="location.href='Wallet.html'" class="sidebar-item"><i class="fas fa-wallet"></i> My Wallet</a>
            <a onclick="location.href='Help.html'" class="sidebar-item"><i class="fas fa-headset"></i> Help & Support</a>
            <a onclick="location.href='Privacy.html'" class="sidebar-item"><i class="fas fa-shield-halved"></i> Privacy Policy</a>
            <a onclick="location.href='Whitepaper.html'" class="sidebar-item"><i class="fas fa-file-lines"></i> Whitepaper</a>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <a onclick="location.href='index.html'" class="sidebar-item" style="color:#d93025;"><i class="fas fa-power-off"></i> Logout</a>
        </div>
    </nav>

    <div class="premium-header">
        <div class="header-top">
            <i class="fas fa-bars sidebar-toggle" onclick="toggleSidebar()"></i>
            <div style="font-size: 20px; font-weight: bold;">CMchat PRO</div>
            <div class="balance-card" onclick="location.href='Wallet.html'">
                <small style="display:block; font-size:10px;">Balance</small>
                <b>₦0.00</b>
            </div>
        </div>
    </div>

    <div class="status-tray">
        <div class="status-circle add-status" onclick="location.href='post-media.html'"><i class="fas fa-plus"></i></div>
        <div class="status-circle" onclick="location.href='ViewStatus.html'"><div class="status-img"></div></div>
        <div class="status-circle" onclick="location.href='ViewStatus.html'"><div class="status-img"></div></div>
        <div class="status-circle" onclick="location.href='ViewStatus.html'"><div class="status-img"></div></div>
    </div>

    <div class="action-grid">
        <div class="grid-item" onclick="location.href='Chatting.html'"><i class="fas fa-comment-dots"></i>Chatting</div>
        <div class="grid-item" onclick="location.href='Groups.html'"><i class="fas fa-user-group"></i>Groups</div>
        <div class="grid-item" onclick="location.href='Friends.html'"><i class="fas fa-user-plus"></i>Add Friends</div>
        <div class="grid-item" onclick="location.href='Settings.html'"><i class="fas fa-sliders"></i>Settings</div>
    </div>

    <div class="create-post" onclick="location.href='post-media.html'">
        <div style="width: 42px; height: 42px; border-radius: 50%; background: #ccc;"></div>
        <div class="fake-input">Post a video or photo, CM...?</div>
        <div style="display:flex; gap:10px; color:#45bd62;"><i class="fas fa-image"></i><i class="fas fa-video"></i></div>
    </div>

    <div class="ad-card" onclick="location.href='Wallet.html'">
        <span style="background:#faad14; color:white; font-size:10px; padding:2px 8px; border-radius:5px; float:right;">Sponsored</span>
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fas fa-bullhorn" style="color:var(--gold); font-size:20px;"></i>
            <div>
                <b>CM Market</b><br>
                <small>Buy cheap data and airtime instantly!</small>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a onclick="location.href='Dashboard.html'" class="nav-link active"><i class="fas fa-house"></i>Home</a>
        <a onclick="location.href='Academy.html'" class="nav-link"><i class="fas fa-graduation-cap"></i>Academy</a>
        <a onclick="location.href='Arena.html'" class="nav-link" style="color:var(--gold);"><i class="fas fa-trophy"></i>Arena</a>
        <a onclick="location.href='VTU.html'" class="nav-link"><i class="fas fa-bolt"></i>VTU</a>
        <a onclick="location.href='Profile.html'" class="nav-link"><i class="fas fa-user-circle"></i>Profile</a>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            const overlay = document.getElementById('overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
