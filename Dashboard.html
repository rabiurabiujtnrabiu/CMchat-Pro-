<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMchat Pro - Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root { 
            --p: #1A237E; --g: #FFD600; --bg: #F0F2F5; --white: #ffffff;
            --danger: #FF5252; --success: #00E676;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        
        body {
            margin: 0; background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #333; overflow-x: hidden; padding-bottom: 100px;
        }

        /* --- SIDEBAR CUSTOM STYLES (New) --- */
        .sidebar-overlay {
            height: 100%; width: 0; position: fixed; z-index: 2000;
            top: 0; left: 0; background-color: rgba(0,0,0,0.5);
            overflow-x: hidden; transition: 0.3s;
        }
        .sidebar-content {
            height: 100%; width: 280px; position: fixed; z-index: 2001;
            top: 0; left: -280px; background-color: var(--p);
            transition: 0.4s ease-in-out; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 30px 20px; background: rgba(0,0,0,0.1);
            text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header .side-avatar {
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--g); margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 800; color: var(--p);
            border: 3px solid rgba(255,255,255,0.2);
        }
        .sidebar-header h4 { color: white; margin: 0; font-size: 18px; }
        .sidebar-header p { color: var(--g); margin: 5px 0 0; font-size: 12px; font-weight: 600; }
        .sidebar-links { padding: 20px 0; flex-grow: 1; }
        .sidebar-links a {
            padding: 15px 25px; text-decoration: none; font-size: 16px;
            color: #E0E0E0; display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .sidebar-links a:hover { background: rgba(255,255,255,0.1); color: var(--g); }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .logout-btn { color: var(--danger) !important; font-weight: 700; cursor: pointer; }

        /* --- DASHBOARD ORIGINAL STYLES --- */
        .header { 
            background: var(--p); color: white; padding: 18px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header b { font-size: 22px; letter-spacing: 0.5px; }
        .header b span { color: var(--g); }
        .user-avatar { 
            width: 38px; height: 38px; border-radius: 50%; 
            background: var(--g); color: var(--p); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
        }
        .status-bar { display: flex; gap: 15px; padding: 20px 15px; overflow-x: auto; scrollbar-width: none; }
        .status-bar::-webkit-scrollbar { display: none; }
        .status-circle { 
            min-width: 65px; height: 65px; border-radius: 50%; padding: 3px; 
            border: 2.5px solid var(--g); background: var(--white); position: relative;
        }
        .status-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .add-icon { 
            position: absolute; bottom: 0; right: 0; background: var(--p); 
            color: white; border-radius: 50%; width: 22px; height: 22px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; border: 2px solid var(--white); 
        }
        .wallet-card { 
            background: linear-gradient(135deg, var(--p), #3949AB); margin: 0 15px 25px; 
            padding: 25px; border-radius: 30px; color: white; position: relative;
            box-shadow: 0 15px 35px rgba(26, 35, 126, 0.25);
        }
        .wallet-card .amt { font-size: 32px; font-weight: 800; margin: 8px 0; }
        .coin-badge { 
            position: absolute; top: 25px; right: 20px; 
            background: rgba(255,255,255,0.2); padding: 6px 14px; 
            border-radius: 20px; font-size: 12px; font-weight: bold;
            display: flex; align-items: center; gap: 6px;
        }
        .wallet-btns { display: flex; gap: 12px; margin-top: 15px; }
        .btn-gold { 
            background: var(--g); color: var(--p); border: none; padding: 12px 20px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; flex: 1; 
        }
        .btn-glass { 
            background: rgba(255,255,255,0.15); color: white; border: none; padding: 12px 20px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; flex: 1; backdrop-filter: blur(5px);
        }
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .service-item { 
            background: var(--white); padding: 25px 15px; border-radius: 25px; 
            text-align: center; text-decoration: none; color: #444; 
            box-shadow: var(--shadow); transition: transform 0.2s;
        }
        .service-item:active { transform: scale(0.95); }
        .service-item i { font-size: 32px; margin-bottom: 12px; display: block; }
        .service-item span { font-weight: 700; font-size: 14px; color: #555; }
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--white);
            display: flex; justify-content: space-around; padding: 12px 0 28px;
            border-top-left-radius: 35px; border-top-right-radius: 35px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-item { color: #BBB; font-size: 24px; cursor: pointer; transition: 0.3s; text-align: center; }
        .nav-item.active { color: var(--p); }
    </style>
</head>
<body>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebarContent" class="sidebar-content">
        <div class="sidebar-header">
            <div class="side-avatar" id="sideInitial">U</div>
            <h4 id="sideUserName">Loading...</h4>
            <p>ID: <span id="sideUserID">---</span></p>
        </div>
        <div class="sidebar-links">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="Profile.html"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="Wallet.html"><i class="fas fa-wallet"></i> My Wallet</a>
            <a href="School.html"><i class="fas fa-graduation-cap"></i> Academy</a>
            <a href="Market.html"><i class="fas fa-shopping-cart"></i> Market</a>
            <a href="Settings.html"><i class="fas fa-cog"></i> Settings</a>
        </div>
        <div class="sidebar-footer">
            <a onclick="logoutUser()" class="logout-btn"><i class="fas fa-power-off"></i> Logout</a>
        </div>
    </div>

    <div class="header">
        <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor: pointer;"></i>
        <b>CMchat <span>Pro</span></b>
        <div class="user-avatar" id="uInitial" onclick="location.href='Profile.html'">U</div>
    </div>

    <div class="status-bar">
        <div class="status-circle" onclick="location.href='Status.html'">
            <img src="https://via.placeholder.com/100" style="opacity: 0.6;">
            <div class="add-icon"><i class="fas fa-plus"></i></div>
        </div>
        <div class="status-circle"><img src="https://i.pravatar.cc/100?u=1"></div>
        <div class="status-circle"><img src="https://i.pravatar.cc/100?u=2"></div>
        <div class="status-circle"><img src="https://i.pravatar.cc/100?u=3"></div>
    </div>

    <div class="wallet-card animate__animated animate__fadeIn">
        <div class="coin-badge">
            <i class="fas fa-coins" style="color:var(--g)"></i> 
            <span id="coins">0</span>
        </div>
        <small style="opacity: 0.8; font-weight: 600;">Available Balance</small>
        <div class="amt" id="displayBalance">₦0.00</div>
        <div class="wallet-btns">
            <button class="btn-gold" onclick="location.href='Wallet.html'">Add Funds</button>
            <button class="btn-glass" onclick="location.href='Wallet.html'">Transfer</button>
        </div>
    </div>

    <div class="service-grid">
        <a href="Chatting.html" class="service-item animate__animated animate__zoomIn">
            <i class="fas fa-comments" style="color:#42A5F5"></i>
            <span>Chats</span>
        </a>
        <a href="School.html" class="service-item animate__animated animate__zoomIn">
            <i class="fas fa-graduation-cap" style="color:#FF7043"></i>
            <span>Academy</span>
        </a>
        <a href="Market.html" class="service-item animate__animated animate__zoomIn">
            <i class="fas fa-store" style="color:var(--g)"></i>
            <span>Market</span>
        </a>
        <a href="Group.html" class="service-item animate__animated animate__zoomIn">
            <i class="fas fa-users" style="color:#66BB6A"></i>
            <span>Groups</span>
        </a>
        <a href="Call.html" class="service-item animate__animated animate__zoomIn">
            <i class="fas fa-phone-alt" style="color:#26A69A"></i>
            <span>Calling</span>
        </a>
        <a href="Settings.html" class="service-item animate__animated animate__zoomIn">
            <i class="fas fa-cog" style="color:#78909C"></i>
            <span>Settings</span>
        </a>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.href='index.html'">
            <i class="fas fa-home"></i>
        </div>
        <div class="nav-item" onclick="location.href='Friends.html'">
            <i class="fas fa-user-plus"></i>
        </div>
        <div class="nav-item" onclick="location.href='Shopping.html'">
            <i class="fas fa-shopping-bag"></i>
        </div>
        <div class="nav-item" onclick="location.href='Wallet.html'">
            <i class="fas fa-wallet"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const currentUserName = localStorage.getItem('username') || "User";

        // Update UI Initials
        const updateUI = (name) => {
            const initial = name.charAt(0).toUpperCase();
            document.getElementById('uInitial').innerText = initial;
            document.getElementById('sideInitial').innerText = initial;
            document.getElementById('sideUserName').innerText = name;
        };
        updateUI(currentUserName);

        // Real-time Balance & Data Sync
        const userRef = ref(db, `users/${currentUserName}`);
        onValue(userRef, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('displayBalance').innerText = "₦" + parseFloat(data.wallet || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('coins').innerText = data.coins || 0;
                document.getElementById('sideUserID').innerText = data.uid || "CM-" + Math.floor(1000 + Math.random() * 9000);
            }
        });

        // Logout Global Function
        window.logoutUser = () => {
            localStorage.removeItem('username');
            window.location.href = 'Login.html';
        };
    </script>

    <script>
        // Sidebar Toggle Logic
        let isSidebarOpen = false;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebarContent');
            const overlay = document.getElementById('sidebarOverlay');
            if (!isSidebarOpen) {
                sidebar.style.left = "0";
                overlay.style.width = "100%";
                isSidebarOpen = true;
            } else {
                sidebar.style.left = "-280px";
                overlay.style.width = "0";
                isSidebarOpen = false;
            }
        }
    </script>

</body>
</html>
