<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMchat Pro - Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Style dinka na asali ban taba komai ba */
        :root { 
            --p: #1A237E; --g: #FFD600; --bg: #F0F2F5; --white: #ffffff;
            --danger: #FF5252; --success: #00E676;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        
        body {
            margin: 0; background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #333; overflow-x: hidden; padding-bottom: 90px;
        }

        .header { 
            background: var(--p); color: white; padding: 18px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header b { font-size: 22px; }
        .header b span { color: var(--g); }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--g); color: var(--p); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        .status-bar { display: flex; gap: 15px; padding: 20px 15px; overflow-x: auto; scrollbar-width: none; }
        .status-bar::-webkit-scrollbar { display: none; }
        .status-circle { min-width: 65px; height: 65px; border-radius: 50%; padding: 3px; border: 2.5px solid var(--g); background: var(--white); position: relative; }
        .status-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .add-icon { position: absolute; bottom: 0; right: 0; background: var(--p); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid var(--white); }

        .wallet-card { 
            background: linear-gradient(135deg, var(--p), #3949AB); margin: 0 15px 25px; 
            padding: 22px; border-radius: 28px; color: white; position: relative;
            box-shadow: 0 15px 30px rgba(26, 35, 126, 0.2);
        }
        .wallet-card .amt { font-size: 30px; font-weight: 800; margin: 5px 0; }
        .coin-badge { position: absolute; top: 22px; right: 20px; background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .service-item { 
            background: var(--white); padding: 25px 15px; border-radius: 24px; 
            text-align: center; text-decoration: none; color: #444; 
            box-shadow: var(--shadow); transition: 0.3s;
        }
        .service-item:active { transform: scale(0.95); }
        .service-item i { font-size: 30px; margin-bottom: 12px; display: block; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--white);
            display: flex; justify-content: space-around; padding: 15px 0 25px;
            border-top-left-radius: 35px; border-top-right-radius: 35px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-item { color: #999; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--p); }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; backdrop-filter: blur(10px); }
        .modal-body { background:white; width:92%; max-width:400px; margin:15% auto; border-radius:30px; padding:25px; max-height: 75vh; overflow-y: auto; }
        .tab-bar { display:flex; background:#f0f2f5; padding:5px; border-radius:15px; margin-bottom:20px; }
        .tab-btn { flex:1; padding:10px; border:none; border-radius:12px; background:transparent; font-weight:bold; cursor:pointer; }
        .active-tab { background:white; color:var(--p); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .user-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px dotted #ddd; }
        .add-btn { background:var(--p); color:white; border:none; padding:7px 15px; border-radius:10px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars" onclick="location.href='Profile.html'"></i>
        <b>CMchat <span>Pro</span></b>
        <div class="user-avatar" id="uInitial" onclick="location.href='Profile.html'">U</div>
    </div>

    <div class="status-bar">
        <div class="status-circle" onclick="location.href='Status.html'">
            <img src="https://via.placeholder.com/100" style="opacity: 0.5;">
            <div class="add-icon"><i class="fas fa-plus"></i></div>
        </div>
        <div class="status-circle"><img src="https://i.pravatar.cc/100?u=1"></div>
        <div class="status-circle"><img src="https://i.pravatar.cc/100?u=2"></div>
        <div class="status-circle"><img src="https://i.pravatar.cc/100?u=3"></div>
    </div>

    <div class="wallet-card">
        <div class="coin-badge"><i class="fas fa-coins" style="color:var(--g)"></i> <span id="coins">0</span></div>
        <small style="opacity: 0.8;">Wallet Balance</small>
        <div class="amt" id="displayBalance">₦0.00</div>
        <div style="display:flex; gap:12px; margin-top:12px;">
            <button onclick="location.href='Fund-Wallet.html'" style="background:var(--g); border:none; padding:10px 22px; border-radius:14px; font-weight:bold; color:var(--p); cursor:pointer;">Loda Kuɗi</button>
            <button onclick="location.href='Wallet.html'" style="background:rgba(255,255,255,0.2); border:none; padding:10px 22px; border-radius:14px; font-weight:bold; color:white; cursor:pointer;">Turawa</button>
        </div>
    </div>

    <div class="service-grid">
        <a href="Chatting.html" class="service-item"><i class="fas fa-comments" style="color:#42A5F5"></i><span>Chats</span></a>
        <a href="School.html" class="service-item"><i class="fas fa-graduation-cap" style="color:#FF7043"></i><span>Academy</span></a>
        <a href="Marketplace.html" class="service-item"><i class="fas fa-store" style="color:var(--g)"></i><span>Market</span></a>
        <a href="#" class="service-item" onclick="openCommunity()"><i class="fas fa-users" style="color:#66BB6A"></i><span>Groups</span></a>
        <a href="Calling.html" class="service-item"><i class="fas fa-phone-alt" style="color:#26A69A"></i><span>Calling</span></a>
        <a href="Settings.html" class="service-item"><i class="fas fa-cog" style="color:#78909C"></i><span>Settings</span></a>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.href='index.html'"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="openCommunity()"><i class="fas fa-user-plus"></i></div>
        <div class="nav-item" onclick="location.href='Shopping.html'"><i class="fas fa-shopping-bag"></i></div>
        <div class="nav-item" onclick="location.href='Wallet.html'"><i class="fas fa-wallet"></i></div>
    </div>

    <div id="comModal" class="modal">
        <div class="modal-body">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; color:var(--p)">Community</h3>
                <i class="fas fa-times" onclick="closeCommunity()" style="cursor:pointer; font-size:20px; color:#999;"></i>
            </div>
            <div class="tab-bar">
                <button id="tabDiscover" class="tab-btn active-tab" onclick="switchCom('discover')">Nemo</button>
                <button id="tabFriends" class="tab-btn" onclick="switchCom('friends')">Abokai</button>
                <button id="tabReq" class="tab-btn" onclick="switchCom('req')">Requests</button>
            </div>
            <div id="comContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Zabo sunan mai amfani daga LocalStorage
        const currentUserName = localStorage.getItem('username') || "User";
        document.getElementById('uInitial').innerText = currentUserName.charAt(0).toUpperCase();

        // Load Balance Real-time
        onValue(ref(db, `users/${currentUserName}/wallet`), (snapshot) => {
            const bal = snapshot.val() || 0;
            document.getElementById('displayBalance').innerText = "₦" + parseFloat(bal).toLocaleString();
        });

        // Community Modal Logic
        window.openCommunity = () => { document.getElementById('comModal').style.display='block'; switchCom('discover'); };
        window.closeCommunity = () => document.getElementById('comModal').style.display='none';

        window.switchCom = async (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active-tab');
            const box = document.getElementById('comContent');
            box.innerHTML = "<p style='text-align:center; color:#999;'>Loading...</p>";

            if(tab === 'discover') {
                const snap = await get(ref(db, 'users'));
                box.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.username !== currentUserName) {
                        box.innerHTML += `<div class="user-row"><span>${u.username}</span><button class="add-btn" onclick="sendReq('${u.username}')">Add</button></div>`;
                    }
                });
            } else if(tab === 'friends') {
                onValue(ref(db, `friends/${currentUserName}`), s => {
                    box.innerHTML = s.exists() ? "" : "<p style='text-align:center; color:#999;'>Babu abokai tukunna.</p>";
                    s.forEach(c => box.innerHTML += `<div class="user-row"><span>${c.key}</span> <i class="fas fa-comment" style="color:var(--p)" onclick="location.href='Chatting.html'"></i></div>`);
                });
            } else if(tab === 'req') {
                onValue(ref(db, `friend_requests/${currentUserName}`), s => {
                    box.innerHTML = s.exists() ? "" : "<p style='text-align:center; color:#999;'>Babu sabuwar buƙata.</p>";
                    s.forEach(c => box.innerHTML += `<div class="user-row"><span>${c.val().from}</span><button class="add-btn" style="background:var(--success)" onclick="acceptReq('${c.key}')">Accept</button></div>`);
                });
            }
        };

        window.sendReq = (targetUser) => {
            update(ref(db), { [`friend_requests/${targetUser}/${currentUserName}`]: { from: currentUserName, time: Date.now() } })
            .then(() => alert("Friend Request Sent to " + targetUser));
        };

        window.acceptReq = (senderName) => {
            const updates = {};
            updates[`friends/${currentUserName}/${senderName}`] = true;
            updates[`friends/${senderName}/${currentUserName}`] = true;
            updates[`friend_requests/${currentUserName}/${senderName}`] = null;
            update(ref(db), updates).then(() => switchCom('friends'));
        };
    </script>
</body>
</html>
