<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Elite Group - CMchat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #0062ff; --bg: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; }
        
        .create-card { 
            background: white; width: 100%; max-width: 400px; padding: 30px; 
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center;
        }
        .icon-box { 
            width: 80px; height: 80px; background: #e0eaff; color: var(--primary); 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; font-size: 30px; margin: 0 auto 20px;
        }
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; 
            margin-bottom: 20px; outline: none; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.1); }
        
        .btn-create { 
            background: linear-gradient(135deg, #0062ff, #00d2ff); color: white; 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-create:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="create-card">
        <div class="icon-box"><i class="fas fa-users"></i></div>
        <h2 style="margin-bottom: 10px;">Create New Group</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 30px;">Become the administrator of a new Elite Community group.</p>

        <input type="text" id="groupNameInp" placeholder="Group Name (e.g. Elite Fans)">
        
        <button class="btn-create" onclick="createNewGroup()">CREATE GROUP</button>
        
        <p style="margin-top: 20px; font-size: 13px; color: #94a3b8; cursor: pointer;" onclick="history.back()">Back to Chats</p>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        const myUID = localStorage.getItem('user_uid');
        const myName = localStorage.getItem('username');

        async function createNewGroup() {
            const name = document.getElementById('groupNameInp').value.trim();
            
            if (!name) {
                alert("Please enter a group name!");
                return;
            }

            const groupID = "GP-" + Math.floor(1000 + Math.random() * 9000);

            const groupData = {
                id: groupID,
                name: name,
                owner: myUID,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            try {
                await rtdb.ref(`groups/${groupID}`).set(groupData);
                await rtdb.ref(`groups/${groupID}/admins/${myUID}`).set(true);
                await rtdb.ref(`groups/${groupID}/members/${myUID}`).set({
                    name: myName,
                    role: 'owner'
                });

                alert(`${name} created successfully!`);
                window.location.href = `group-chat.html?id=${groupID}&name=${name}`;

            } catch (error) {
                console.error("Error: ", error);
                alert("Failed to create group. Please try again.");
            }
        }
    </script>
</body>
</html>
