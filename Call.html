<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMchat Pro - Call System</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --wa-teal: #128C7E; --danger: #ea4335; --dark-bg: #0b141a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; overflow: hidden; }
        
        .call-container { position: relative; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; }
        
        /* Videos */
        #remoteVideo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: #000; z-index: 1; }
        #localVideo { position: absolute; top: 40px; right: 20px; width: 110px; height: 160px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.4); object-fit: cover; z-index: 100; background: #222; transition: 0.3s; }
        
        /* User Info Overlay */
        .user-info { position: absolute; top: 12%; text-align: center; z-index: 10; width: 100%; }
        .user-info img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .user-info h2 { margin: 15px 0 5px; font-size: 26px; font-weight: 500; }
        .status-tag { font-size: 15px; color: #cfd8dc; letter-spacing: 0.5px; }

        /* Controls Area */
        .controls-wrapper { position: absolute; bottom: 0; width: 100%; padding-bottom: 50px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 100; display: flex; justify-content: center; align-items: center; gap: 25px; }
        
        .btn { width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        .btn-mute { background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); }
        .btn-hangup { background: var(--danger); font-size: 28px; transform: rotate(135deg); }
        
        /* Incoming Call Modal */
        #incomingModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .pulse-avatar { width: 130px; height: 130px; border-radius: 50%; background: var(--wa-teal); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 0 0 rgba(18, 140, 126, 0.7); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(18, 140, 126, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(18, 140, 126, 0); } 100% { box-shadow: 0 0 0 0 rgba(18, 140, 126, 0); } }
    </style>
</head>
<body>

    <div class="call-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>

        <div class="user-info">
            <img src="https://via.placeholder.com/150" id="userAvatar">
            <h2 id="targetName">Suna...</h2>
            <div class="status-tag" id="callStatus">CONNECTING...</div>
        </div>

        <div class="controls-wrapper">
            <button class="btn btn-mute" onclick="toggleMic()"><i class="fas fa-microphone" id="micIcon"></i></button>
            <button class="btn btn-hangup" onclick="endCall()"><i class="fas fa-phone"></i></button>
            <button class="btn btn-mute" onclick="toggleCam()"><i class="fas fa-video" id="camIcon"></i></button>
            <button class="btn btn-mute" onclick="switchCamera()"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <div id="incomingModal">
        <div class="pulse-avatar"><i class="fas fa-user" style="font-size: 50px;"></i></div>
        <h1 id="callerNameDisp" style="margin-bottom: 5px;">Kira Yana Shigo...</h1>
        <p style="color: #aaa; margin-bottom: 40px;">Voice Call</p>
        <div style="display:flex; gap:60px;">
            <button class="btn btn-hangup" onclick="rejectCall()" style="transform: rotate(135deg);"><i class="fas fa-phone"></i></button>
            <button class="btn" style="background: #25d366;" onclick="acceptCall()"><i class="fas fa-phone"></i></button>
        </div>
        <audio id="ringtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com", projectId: "cmchat-pro" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myUsername = localStorage.getItem('username') || "User-" + Math.floor(Math.random() * 100);

        // Professional Connection (ICE Servers)
        const peer = new Peer(myUsername, {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        let localStream, currentCall, incomingCall;

        peer.on('open', id => {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('call');
            if (target) startCall(target);
        });

        // Sauron Kira (Incoming)
        peer.on('call', call => {
            incomingCall = call;
            document.getElementById('incomingModal').style.display = 'flex';
            document.getElementById('callerNameDisp').innerText = call.peer;
            document.getElementById('ringtone').play();
        });

        async function acceptCall() {
            document.getElementById('incomingModal').style.display = 'none';
            document.getElementById('ringtone').pause();
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = localStream;
            
            incomingCall.answer(localStream);
            handleCall(incomingCall);
        }

        async function startCall(target) {
            document.getElementById('targetName').innerText = target;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = localStream;
                const call = peer.call(target, localStream);
                handleCall(call);
            } catch (err) {
                alert("Don Allah ka ba mu damar amfani da Camera/Mic");
            }
        }

        function handleCall(call) {
            currentCall = call;
            document.getElementById('callStatus').innerText = "RINGING...";
            
            call.on('stream', remoteStream => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
                document.getElementById('callStatus').innerText = "00:00 - CONNECTED";
            });
            
            call.on('close', () => endCall());
            call.on('error', () => endCall());
        }

        function endCall() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (currentCall) currentCall.close();
            window.history.back();
        }

        function rejectCall() {
            document.getElementById('incomingModal').style.display = 'none';
            document.getElementById('ringtone').pause();
            if(incomingCall) incomingCall.close();
        }

        function toggleMic() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('micIcon').className = track.enabled ? "fas fa-microphone" : "fas fa-microphone-slash";
        }

        function toggleCam() {
            const track = localStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('camIcon').className = track.enabled ? "fas fa-video" : "fas fa-video-slash";
            document.getElementById('localVideo').style.display = track.enabled ? "block" : "none";
        }
    </script>
</body>
</html>
