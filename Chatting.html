<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMchat Pro - Elite Messenger</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #0b141a;
            --header-dark: #202c33;
            --sent-bubble: #005c4b;
            --received-bubble: #202c33;
            --text-main: #e9edef;
            --text-dim: #8696a0;
            --primary: #00a884;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); height: 730px; display: flex; flex-direction: column; color: var(--text-main); overflow: hidden; }

        /* --- HEADER --- */
        .chat-header { background: var(--header-dark); padding: 10px 15px; display: flex; align-items: center; height: 65px; z-index: 1000; position: sticky; top: 0; }
        .header-left { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .user-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #3b4a54; border: 1px solid rgba(255,255,255,0.1); }
        .user-meta b { font-size: 16px; color: var(--text-main); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .status-text { font-size: 11px; color: var(--text-dim); }
        .status-text.online { color: var(--primary); }
        .header-tools { display: flex; gap: 22px; color: var(--text-dim); font-size: 19px; padding-right: 5px; }

        /* --- CHAT AREA --- */
        .chat-container { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-size: 400px; scroll-behavior: smooth;
        }

        .message { max-width: 85%; padding: 6px 10px 4px; border-radius: 12px; font-size: 14.5px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .received { background: var(--received-bubble); align-self: flex-start; border-top-left-radius: 0; }
        .sent { background: var(--sent-bubble); align-self: flex-end; border-top-right-radius: 0; }

        /* --- VOICE PLAYER UI --- */
        .voice-wrapper { display: flex; align-items: center; gap: 10px; min-width: 200px; padding: 4px 0; }
        .voice-avatar-box { position: relative; width: 35px; height: 35px; }
        .voice-avatar { width: 100%; height: 100%; border-radius: 50%; background: #3b4a54; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: white; }
        .mic-badge { position: absolute; bottom: -1px; right: -1px; font-size: 9px; color: var(--primary); background: var(--header-dark); border-radius: 50%; padding: 2px; }

        .play-btn { font-size: 22px; color: var(--text-dim); cursor: pointer; }
        .sent .play-btn { color: white; }
        
        .waveform-lite { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; position: relative; }
        .waveform-lite::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 30%; background: var(--primary); border-radius: 2px; }

        .msg-footer { display: flex; justify-content: flex-end; align-items: center; gap: 4px; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
        .sent .msg-footer i { color: #53bdeb; }

        /* --- INPUT BAR --- */
        .input-area { background: var(--header-dark); padding: 10px 12px; display: flex; align-items: center; gap: 8px; position: relative; }
        
        .recording-hud { display: none; align-items: center; gap: 12px; flex: 1; color: #ff3b30; font-weight: 800; font-size: 14px; }
        .rec-dot { width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .input-wrapper { flex: 1; background: #2a3942; border-radius: 25px; padding: 0 12px; display: flex; align-items: center; height: 45px; gap: 12px; }
        #messageInput { border: none; background: transparent; outline: none; flex: 1; color: var(--text-main); font-size: 16px; }
        
        .action-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); border: none; color: white; cursor: pointer; font-size: 19px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .recording-active { transform: scale(1.3); background: #ff3b30 !important; }
    </style>
</head>
<body>

    <header class="chat-header">
        <div class="header-left">
            <i class="fas fa-arrow-left" onclick="history.back()"></i>
            <img src="https://via.placeholder.com/100" class="user-avatar" id="chatAvatar">
            <div class="user-meta">
                <b id="chatWith">Elite Member</b> 
                <div class="status-text" id="statusText">online</div>
            </div>
        </div>
        <div class="header-tools">
            <i class="fas fa-video"></i>
            <i class="fas fa-phone-alt"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <i class="far fa-laugh" style="color:var(--text-dim); font-size:22px;"></i>
        <div id="recHUD" class="recording-hud">
            <div class="rec-dot"></div> <span id="recTimer">00:00</span>
        </div>
        <div class="input-wrapper" id="inputWrap">
            <input type="text" id="messageInput" placeholder="Message" oninput="checkInput()">
            <i class="fas fa-paperclip" style="color:var(--text-dim); transform:rotate(45deg);"></i>
        </div>
        <button class="action-btn" id="micBtn" 
                onmousedown="startVoice()" onmouseup="stopVoice()"
                ontouchstart="startVoice()" ontouchend="stopVoice()">
            <i class="fas fa-microphone" id="btnIcon"></i>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // --- FIREBASE INIT ---
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const myUID = localStorage.getItem('user_uid') || "USER_1";
        const partnerUID = new URLSearchParams(window.location.search).get('uid') || "USER_2";
        const chatID = myUID < partnerUID ? myUID + "_" + partnerUID : partnerUID + "_" + myUID;

        // UI Selectors
        const msgInput = document.getElementById('messageInput');
        const btnIcon = document.getElementById('btnIcon');
        const micBtn = document.getElementById('micBtn');
        const hud = document.getElementById('recHUD');
        const inputWrap = document.getElementById('inputWrap');

        // --- VOICE ENGINE ---
        let mediaRecorder;
        let audioChunks = [];

        const VoiceEngine = {
            async start() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.start();
                } catch(e) { alert("Mic Permission Denied"); }
            },
            async stop() {
                if(!mediaRecorder || mediaRecorder.state === "inactive") return;
                mediaRecorder.stop();
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    mediaRecorder.stream.getTracks().forEach(t => t.stop());
                    if(blob.size > 1000) this.upload(blob);
                };
            },
            async upload(blob) {
                const fd = new FormData();
                fd.append('file', blob);
                fd.append('upload_preset', "cmchat_pro");
                fd.append('resource_type', 'video');

                const res = await fetch(`https://api.cloudinary.com/v1_1/dyfyhzp3o/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                if(data.secure_url) {
                    database.ref('messages/' + chatID).push({
                        sender: myUID,
                        url: data.secure_url,
                        duration: Math.floor(data.duration) + "s",
                        type: 'voice',
                        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        timestamp: Date.now()
                    });
                }
            }
        };

        // --- UI HANDLERS ---
        function startVoice() {
            if(msgInput.value.trim().length > 0) return;
            hud.style.display = 'flex';
            inputWrap.style.display = 'none';
            micBtn.classList.add('recording-active');
            VoiceEngine.start();
            
            let sec = 0;
            window.vTimer = setInterval(() => {
                sec++;
                let m = Math.floor(sec/60), s = sec%60;
                document.getElementById('recTimer').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            }, 1000);
        }

        function stopVoice() {
            if(hud.style.display === 'none') {
                if(msgInput.value.trim().length > 0) sendMessage();
                return;
            }
            clearInterval(window.vTimer);
            hud.style.display = 'none';
            inputWrap.style.display = 'flex';
            micBtn.classList.remove('recording-active');
            document.getElementById('recTimer').innerText = "00:00";
            VoiceEngine.stop();
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            database.ref('messages/' + chatID).push({
                sender: myUID,
                msg: text,
                type: 'text',
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                timestamp: Date.now()
            });
            msgInput.value = "";
            checkInput();
        }

        function checkInput() {
            btnIcon.className = msgInput.value.trim().length > 0 ? "fas fa-paper-plane" : "fas fa-microphone";
        }

        // --- RENDER & SYNC ---
        database.ref('messages/' + chatID).on('value', snap => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const isMe = d.sender === myUID;
                if(d.type === 'voice') {
                    box.innerHTML += `
                        <div class="message ${isMe ? 'sent' : 'received'}">
                            <div class="voice-wrapper">
                                <div class="voice-avatar-box">
                                    <div class="voice-avatar">${isMe ? 'Me' : 'H'}</div>
                                    <i class="fas fa-microphone mic-badge"></i>
                                </div>
                                <i class="fas fa-play play-btn" onclick="playA('${d.url}', this)"></i>
                                <div class="waveform-lite"></div>
                            </div>
                            <div class="msg-footer">
                                <span>${d.duration || ''} • ${d.time}</span>
                                ${isMe ? '<i class="fas fa-check-double"></i>' : ''}
                            </div>
                        </div>`;
                } else {
                    box.innerHTML += `
                        <div class="message ${isMe ? 'sent' : 'received'}">
                            ${d.msg}
                            <div class="msg-footer">
                                <span>${d.time}</span>
                                ${isMe ? '<i class="fas fa-check-double"></i>' : ''}
                            </div>
                        </div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });

        function playA(u, b) {
            const a = new Audio(u);
            b.className = "fas fa-pause play-btn";
            a.play();
            a.onended = () => b.className = "fas fa-play play-btn";
        }

        // Partner Info
        database.ref('users/' + partnerUID).once('value', s => {
            const u = s.val();
            if(u) {
                document.getElementById('chatWith').innerText = u.username;
                document.getElementById('chatAvatar').src = u.profilePhoto || 'https://via.placeholder.com/100';
            }
        });
    </script>
</body>
</html>
