<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMchat Pro - Elite Messenger</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #0062ff; 
            --primary-gradient: linear-gradient(135deg, #0062ff, #00d2ff);
            --bg-chat: #f0f2f5; 
            --white: #ffffff; 
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg-chat); }
        body { display: flex; flex-direction: column; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding: 30px 20px; }
        .sidebar.active { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2500; display: none; backdrop-filter: blur(4px); }

        /* --- HEADER (SIDEBAR ONLY, NO BACK BUTTON) --- */
        .chat-header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 10px 15px; display: flex; align-items: center; height: 75px; 
            border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000; position: sticky; top: 0;
        }
        .header-left { display: flex; align-items: center; gap: 15px; flex: 1; }
        .sidebar-toggle { padding: 10px; color:#64748b; cursor:pointer; font-size: 20px; }
        .user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .user-avatar { width: 48px; height: 48px; border-radius: 16px; object-fit: cover; background: #e2e8f0; }
        .user-meta b { font-size: 16px; color: #1e293b; font-weight: 800; }
        .status-dot { font-size: 12px; color: #94a3b8; }

        .header-tools { display: flex; gap: 18px; color: #64748b; font-size: 18px; padding-right: 10px; }

        /* --- CHAT BUBBLES --- */
        .chat-container { flex: 1; padding: 20px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 78%; padding: 12px 16px; border-radius: 20px; font-size: 14.5px; box-shadow: var(--shadow); }
        .received { background: var(--white); align-self: flex-start; border-bottom-left-radius: 4px; color: #334155; }
        .sent { background: var(--primary-gradient); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        
        /* --- FLOATING ADD FRIEND --- */
        .floating-add {
            position: fixed; bottom: 100px; right: 20px; 
            width: 55px; height: 55px; background: var(--primary-gradient);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; box-shadow: 0 8px 20px rgba(0,98,255,0.3);
            z-index: 2000; cursor: pointer;
        }

        /* --- INPUT AREA --- */
        .input-area { padding: 12px 15px; background: white; display: flex; align-items: center; gap: 10px; border-top: 1px solid #edf2f7; }
        .input-wrapper { flex: 1; background: #f1f5f9; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #messageInput { border: none; background: transparent; outline: none; flex: 1; padding: 10px; font-size: 15px; }
        .action-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--primary-gradient); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <h2 style="color:var(--primary); margin-bottom:20px; font-weight:800;">Elite Menu</h2>
        <div style="display:flex; flex-direction:column; gap:25px;">
            <a href="Profile.html" style="text-decoration:none; color:#1e293b; font-weight:700;"><i class="fas fa-user-circle" style="margin-right:10px;"></i> Profile</a>
            <a href="Wallet.html" style="text-decoration:none; color:#1e293b; font-weight:700;"><i class="fas fa-wallet" style="margin-right:10px;"></i> Wallet</a>
            <a href="Settings.html" style="text-decoration:none; color:#1e293b; font-weight:700;"><i class="fas fa-cog" style="margin-right:10px;"></i> Settings</a>
            <hr>
            <a href="index.html" style="text-decoration:none; color:red; font-weight:700;"><i class="fas fa-sign-out-alt" style="margin-right:10px;"></i> Exit Chat</a>
        </div>
    </div>

    <header class="chat-header">
        <div class="header-left">
            <i class="fas fa-bars sidebar-toggle" onclick="toggleSidebar()"></i>
            <div class="user-info">
                <img src="https://via.placeholder.com/100" class="user-avatar" id="chatAvatar">
                <div class="user-meta">
                    <b id="chatWith">User</b> 
                    <div class="status-dot" id="statusText">Offline</div>
                </div>
            </div>
        </div>
        <div class="header-tools">
            <i class="fas fa-phone-alt" onclick="window.location.href='voice-call.html'"></i>
            <i class="fas fa-video" onclick="window.location.href='video-call.html'"></i>
        </div>
    </header>

    <div class="floating-add" onclick="window.location.href='add-friend.html'">
        <i class="fas fa-user-plus"></i>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <i class="far fa-face-smile" style="color:#64748b; font-size:22px;" onclick="window.location.href='stickers.html'"></i>
            <input type="text" id="messageInput" placeholder="Type a message..." oninput="checkInput()">
        </div>
        <button class="action-btn" id="sendBtn">
            <i class="fas fa-microphone" id="btnIcon"></i>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('active');
            ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
        }

        function checkInput() {
            const input = document.getElementById('messageInput');
            const icon = document.getElementById('btnIcon');
            icon.className = input.value.trim().length > 0 ? "fas fa-paper-plane" : "fas fa-microphone";
        }

        // --- CIGABA DA CORE LOGIC DINKA ---
        // (Saka ainihin startMessenger da sauran logic dinka anan)
    </script>
</body>
</html>
