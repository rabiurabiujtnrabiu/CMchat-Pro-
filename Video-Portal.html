<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Academy | Professional Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1A237E; --accent: #FBC02D; --live: #FF3D00; --dark-bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { background: var(--primary); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; }

        /* Video Stage */
        #main-stage { flex: 1; position: relative; background: #000; overflow: hidden; }
        #spotlight-video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlays */
        .live-indicator { position: absolute; top: 15px; left: 15px; background: var(--live); color: white; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .live-indicator span { width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .speaker-info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); font-size: 13px; }

        /* Admin Sidebar */
        .admin-sidebar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .circle-btn { width: 52px; height: 52px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; position: relative; }
        .circle-btn:active { transform: scale(0.9); }
        .badge { position: absolute; top: -2px; right: -2px; background: var(--live); width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #000; }

        /* Guest Tray */
        .guest-tray { height: 150px; display: flex; gap: 15px; padding: 15px 20px; background: #000; border-top: 1px solid #222; overflow-x: auto; scrollbar-width: none; }
        .guest-card { min-width: 100px; height: 120px; background: #1a1a1a; border-radius: 15px; position: relative; overflow: hidden; border: 2px solid transparent; transition: 0.4s; }
        .guest-card.active { border-color: var(--accent); }
        .guest-card video { width: 100%; height: 100%; object-fit: cover; }
        .guest-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); font-size: 10px; text-align: center; padding: 5px 0; font-weight: bold; }

        /* Policy Alert */
        .policy-tag { font-size: 9px; color: #666; text-align: center; background: #000; padding: 5px; }

        .swal-custom-ui { border-radius: 20px !important; background: #121826 !important; color: white !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-broadcast-tower" style="color: var(--accent);"></i> CM LIVE PRO</div>
        <i class="fas fa-sign-out-alt" style="font-size: 20px;" onclick="location.reload()"></i>
    </header>

    <div id="main-stage">
        <div class="live-indicator"><span></span> LIVE</div>
        
        <video id="spotlight-video" autoplay playsinline muted></video>

        <div class="speaker-info">
            <i class="fas fa-microphone" style="color:#00E676;"></i>
            <span id="hostLabel">Host: CM Master</span>
        </div>

        <div class="admin-sidebar">
            <div class="circle-btn" onclick="viewRequests()">
                <i class="fas fa-user-plus"></i>
                <div class="badge" id="reqCount">0</div>
            </div>
            <div class="circle-btn" onclick="toggleMic()"><i class="fas fa-microphone" id="micIco"></i></div>
            <div class="circle-btn" onclick="sendHeart()"><i class="fas fa-heart" style="color:var(--live)"></i></div>
            <div class="circle-btn" onclick="stopLive()" style="background:var(--live)"><i class="fas fa-stop"></i></div>
        </div>
    </div>

    <div class="guest-tray" id="guestTray">
        <div class="guest-card active">
            <video id="mini-me" autoplay muted></video>
            <div class="guest-name">YOU (HOST)</div>
        </div>
        </div>

    <div class="policy-tag">Notice: Naked dressing or inappropriate content is strictly prohibited.</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Host User";

        let localStream;
        let isMic = true;

        async function startLive() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('spotlight-video').srcObject = localStream;
                document.getElementById('mini-me').srcObject = localStream;
                
                db.ref('live_sessions/' + myName).set({ status: 'live', startTime: Date.now() });
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Camera Error', text: 'Permit camera access to go live.' });
            }
        }

        // Duba masu neman shiga (Requests)
        db.ref('live_requests/' + myName).on('value', snap => {
            const count = snap.numChildren();
            document.getElementById('reqCount').innerText = count;
        });

        function viewRequests() {
            db.ref('live_requests/' + myName).once('value', snap => {
                let html = '<div style="text-align:left;">';
                if(!snap.exists()) html += '<p style="text-align:center">No pending requests.</p>';
                
                snap.forEach(child => {
                    const r = child.val();
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#1e293b; padding:12px; border-radius:12px; margin-bottom:10px;">
                            <span><b>${r.user}</b></span>
                            <div>
                                <button onclick="handleReq('${child.key}', 'approve', '${r.user}')" style="background:#00E676; border:none; color:white; padding:7px 12px; border-radius:8px;">Accept</button>
                                <button onclick="handleReq('${child.key}', 'decline')" style="background:var(--live); border:none; color:white; padding:7px 12px; border-radius:8px; margin-left:5px;">Reject</button>
                            </div>
                        </div>`;
                });
                html += '</div><p style="font-size:10px; color:var(--live); text-align:center;">Policy: Check dress code before accepting.</p>';

                Swal.fire({ title: 'Join Requests', html: html, showConfirmButton: false, customClass: { popup: 'swal-custom-ui' } });
            });
        }

        function handleReq(id, action, uName) {
            if(action === 'approve') {
                db.ref('live_sessions/' + myName + '/guests/' + id).set({ name: uName });
                Swal.fire('Accepted!', `${uName} can now join.`, 'success');
            }
            db.ref('live_requests/' + myName + '/' + id).remove();
            Swal.close();
        }

        function toggleMic() {
            isMic = !isMic;
            localStream.getAudioTracks()[0].enabled = isMic;
            document.getElementById('micIco').className = isMic ? 'fas fa-microphone' : 'fas fa-microphone-slash';
        }

        function stopLive() {
            Swal.fire({
                title: 'End Session?',
                text: "This will disconnect everyone.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#FF3D00',
                confirmButtonText: 'End Live'
            }).then(r => {
                if(r.isConfirmed) {
                    db.ref('live_sessions/' + myName).remove();
                    localStream.getTracks().forEach(t => t.stop());
                    location.reload();
                }
            });
        }

        function sendHeart() {
            const toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
            toast.fire({ icon: 'success', title: 'Sent Heart ❤️' });
        }

        window.onload = startLive;
    </script>
</body>
</html>
