<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Academy | Professional Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1A237E; --accent: #FBC02D; --live: #FF3D00; --dark-bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark-bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        header { background: var(--primary); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; letter-spacing: 0.5px; }

        .ads-banner { background: #1a1a1a; padding: 10px; text-align: center; font-size: 11px; border-bottom: 1px solid #333; color: #aaa; }

        /* Video Stage */
        #main-stage { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; overflow: hidden; }
        #spotlight-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        #spotlight-video { width: 100%; height: 100%; object-fit: cover; background: #111; }

        /* UI Overlays */
        .live-indicator { position: absolute; top: 15px; left: 15px; background: var(--live); color: white; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .live-indicator::before { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .speaker-info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 8px 18px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; font-size: 13px; }

        /* Guest Scroller */
        .guest-tray { height: 140px; display: flex; gap: 12px; padding: 15px; overflow-x: auto; background: linear-gradient(to top, #000, transparent); border-top: 1px solid #222; scrollbar-width: none; }
        .guest-card { min-width: 95px; height: 115px; background: #1e1e1e; border-radius: 12px; position: relative; overflow: hidden; border: 2px solid transparent; flex-shrink: 0; transition: 0.3s ease; }
        .guest-card.active { border-color: var(--accent); transform: translateY(-5px); }
        .guest-card video { width: 100%; height: 100%; object-fit: cover; }
        .guest-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); font-size: 10px; text-align: center; padding: 4px 0; }

        /* Sidebar Actions */
        .admin-sidebar { position: absolute; right: 15px; top: 40%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; }
        .circle-btn { width: 50px; height: 50px; background: var(--glass); backdrop-filter: blur(12px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .notification { position: absolute; top: -2px; right: -2px; background: var(--live); width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* SweetAlert Custom Style */
        .swal2-popup { border-radius: 25px !important; background: #1E293B !important; color: white !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-broadcast-tower"></i>
            <span>CM ACADEMY LIVE</span>
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <i class="fas fa-shield-alt" style="color:#00E676;"></i>
            <i class="fas fa-user-circle" style="font-size:24px;"></i>
        </div>
    </header>

    <div class="ads-banner">
        <i class="fas fa-info-circle" style="color:var(--accent)"></i> Promote your business here to thousands of students!
    </div>

    <div id="main-stage">
        <div class="live-indicator">Live</div>
        
        <div id="spotlight-container">
            <video id="spotlight-video" autoplay playsinline></video>
            <div class="speaker-info">
                <i class="fas fa-microphone" style="color:#00E676;"></i>
                <span>Host: <strong>Hamza Rabiu</strong></span>
            </div>
        </div>

        <div class="admin-sidebar">
            <div class="circle-btn" onclick="openRequests()">
                <i class="fas fa-users"></i>
                <div class="notification">3</div>
            </div>
            <div class="circle-btn" onclick="sendHeart()"><i class="fas fa-heart" style="color:var(--live)"></i></div>
            <div class="circle-btn" onclick="Swal.fire('Chat', 'Chat is live!', 'info')"><i class="fas fa-comment-dots"></i></div>
        </div>
    </div>

    <div class="guest-tray">
        <div class="guest-card active" onclick="focusUser('host')">
            <video id="host-mini" autoplay muted></video>
            <div class="guest-name">MASTER</div>
        </div>
        <div class="guest-card" onclick="requestToJoin()">
            <div style="height:100%; display:flex; align-items:center; justify-content:center; background:#111;">
                <i class="fas fa-plus" style="color:#444; font-size:25px;"></i>
            </div>
            <div class="guest-name">Add Guest</div>
        </div>
    </div>

    <script>
        // Kunna kyamara yayin da shafin ya buɗe
        async function initLiveStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('spotlight-video').srcObject = stream;
                document.getElementById('host-mini').srcObject = stream;
            } catch (err) {
                Swal.fire('Camera Error', 'Please enable camera permissions.', 'error');
            }
        }
        initLiveStream();

        // Buɗe jerin ɗalibai masu neman shiga da Buttons na gaske
        function openRequests() {
            Swal.fire({
                title: 'Guest Requests',
                background: '#1E293B',
                color: '#fff',
                html: `
                    <div style="text-align:left; font-size:15px; margin-top:10px;">
                        ${['Dalibi Ahmed', 'Sani Bello', 'Aisha Umar'].map((name, i) => `
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding:10px; background:#0F172A; border-radius:12px;">
                            <span>${i+1}. <b>${name}</b></span>
                            <div>
                                <button onclick="action('Approve', '${name}')" style="background:#00E676; border:none; color:white; padding:6px 12px; border-radius:8px; cursor:pointer;">Approve</button>
                                <button onclick="action('Decline', '${name}')" style="background:#FF3D00; border:none; color:white; padding:6px 12px; border-radius:8px; cursor:pointer; margin-left:5px;">Decline</button>
                            </div>
                        </div>`).join('')}
                        <p style="color:#FF3D00; font-size:11px; text-align:center; margin-top:15px;">Note: No indecent dressing allowed.</p>
                    </div>
                `,
                showConfirmButton: false,
                showCloseButton: true
            });
        }

        function action(type, name) {
            Swal.close();
            Swal.fire({
                title: type === 'Approve' ? 'Approved!' : 'Declined',
                text: `${name} has been ${type.toLowerCase()}d.`,
                icon: type === 'Approve' ? 'success' : 'error',
                timer: 2000,
                showConfirmButton: false
            });
        }

        function requestToJoin() {
            Swal.fire({
                title: 'Join Video?',
                text: "Your camera will be shared once approved.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Request'
            }).then((res) => { if(res.isConfirmed) Swal.fire('Sent!', 'Wait for teacher.', 'success'); });
        }

        function sendHeart() {
            const toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
            toast.fire({ icon: 'success', title: 'Sent Heart ❤️' });
        }
    </script>
</body>
</html>
