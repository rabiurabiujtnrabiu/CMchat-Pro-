<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Market Pro | CMchat Academy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --p: #1A237E; --accent: #FFD600; --bg: #f8fafc; --white: #fff; --text: #1e293b; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* --- HEADER & WALLET --- */
        .market-header {
            background: linear-gradient(135deg, var(--p), #303F9F);
            padding: 45px 25px 70px; border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px; color: white;
            box-shadow: 0 15px 35px rgba(26, 35, 126, 0.2);
        }
        .nav-row { display: flex; justify-content: space-between; align-items: center; }
        .wallet-card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            padding: 10px 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 10px;
        }

        /* --- SEARCH & CATEGORIES --- */
        .market-actions { margin: -35px 20px 20px; }
        .search-wrapper {
            background: var(--white); border-radius: 22px; padding: 16px 25px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9;
        }
        .search-wrapper input { border: none; outline: none; width: 100%; font-size: 14px; color: #475569; }

        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 25px 20px; scrollbar-width: none; }
        .cat-btn { 
            padding: 10px 20px; background: white; border-radius: 14px; 
            font-size: 11px; font-weight: 800; color: #64748b; 
            white-space: nowrap; border: 1px solid #f1f5f9; cursor: pointer;
        }
        .cat-btn.active { background: var(--p); color: white; border-color: var(--p); }

        /* --- PRODUCT GRID --- */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .course-card {
            background: white; border-radius: 30px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9;
            position: relative;
        }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.05); }
        
        .course-icon {
            width: 100%; height: 130px; border-radius: 24px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; position: relative; overflow: hidden;
        }
        .course-icon::after {
            content: ''; position: absolute; top: -50%; right: -20px; width: 40px; height: 200%;
            background: rgba(255,255,255,0.3); transform: rotate(25deg);
            animation: shine 3s infinite;
        }
        @keyframes shine { from { transform: rotate(25deg) translateY(-100%); } to { transform: rotate(25deg) translateY(100%); } }

        .course-card h3 { font-size: 13px; font-weight: 800; margin: 8px 0; min-height: 38px; line-height: 1.4; }
        .course-card p { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin: 0; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .price-text { font-weight: 900; color: var(--p); font-size: 15px; }
        
        .enroll-btn {
            background: #f1f5f9; color: var(--p); width: 38px; height: 38px;
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer;
        }
        .enroll-btn:hover { background: var(--p); color: white; }

        .section-tag { font-size: 11px; font-weight: 800; color: #94a3b8; margin: 20px 0 15px 30px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header class="market-header">
        <div class="nav-row animate__animated animate__fadeIn">
            <i class="fas fa-arrow-left" onclick="history.back()"></i>
            <b style="font-size: 18px;">Elite Store</b>
            <div class="wallet-card">
                <i class="fas fa-wallet" style="color:var(--accent)"></i>
                <span id="walletBal">₦0.00</span>
            </div>
        </div>
    </header>

    <div class="market-actions animate__animated animate__fadeInUp">
        <div class="search-wrapper">
            <i class="fas fa-search" style="color: #cbd5e1;"></i>
            <input type="text" id="searchInput" onkeyup="filterCourses()" placeholder="Search premium courses...">
        </div>
    </div>

    <div class="cat-scroll">
        <div class="cat-btn active" onclick="filterCat('All')">All</div>
        <div class="cat-btn" onclick="filterCat('Tech')">Tech & AI</div>
        <div class="cat-btn" onclick="filterCat('Trading')">Trading</div>
        <div class="cat-btn" onclick="filterCat('Coding')">Coding</div>
    </div>

    <div class="section-tag">Premium Catalog</div>
    <div class="product-grid" id="marketGrid"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";

        const courseData = [
            { id: 'ai_01', cat: 'Tech', name: 'AI Prompt Engineering Mastery', price: 10000, icon: 'fa-robot', bg: '#E3F2FD' },
            { id: 'trd_01', cat: 'Trading', name: 'Forex King Strategy 2026', price: 15000, icon: 'fa-chart-line', bg: '#FFF8E1' },
            { id: 'cod_01', cat: 'Coding', name: 'Fullstack Web App Design', price: 25000, icon: 'fa-code', bg: '#E8EAF6' },
            { id: 'des_01', cat: 'Creative', name: 'Elite Graphics & UI/UX', price: 8500, icon: 'fa-paint-brush', bg: '#F3E5F5' }
        ];

        // 1. Wallet Real-time Sync
        db.ref('users/' + myName + '/wallet').on('value', snap => {
            const bal = snap.val() || 0;
            document.getElementById('walletBal').innerText = "₦" + bal.toLocaleString();
        });

        // 2. Render Courses
        function render(list) {
            const grid = document.getElementById('marketGrid');
            grid.innerHTML = list.map(c => `
                <div class="course-card animate__animated animate__zoomIn">
                    <div class="course-icon" style="background: ${c.bg}; color: var(--p);">
                        <i class="fas ${c.icon}"></i>
                    </div>
                    <p>${c.cat}</p>
                    <h3>${c.name}</h3>
                    <div class="price-row">
                        <span class="price-text">₦${c.price.toLocaleString()}</span>
                        <div class="enroll-btn" onclick="buyCourse(${c.price}, '${c.name}')">
                            <i class="fas fa-cart-plus"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 3. Purchase & Academy Integration
        function buyCourse(price, title) {
            Swal.fire({
                title: 'Enroll Now?',
                html: `Unlock <b>${title}</b> for ₦${price.toLocaleString()}?`,
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#1A237E',
                confirmButtonText: 'Pay & Enroll'
            }).then(async (res) => {
                if (res.isConfirmed) {
                    const walletRef = db.ref('users/' + myName + '/wallet');
                    const transRef = db.ref('transactions/' + myName);
                    
                    // Verify if already owned
                    const ownedSnap = await transRef.orderByChild('service').equalTo(`Market: ${title}`).once('value');
                    if (ownedSnap.exists()) return Swal.fire('Owned!', 'You already have access to this course.', 'success');

                    walletRef.once('value').then(s => {
                        const bal = s.val() || 0;
                        if (bal >= price) {
                            // EXECUTE TRANSACTION
                            walletRef.set(bal - price).then(() => {
                                transRef.push({
                                    service: `Market: ${title}`,
                                    amount: price,
                                    time: new Date().toLocaleString(),
                                    status: 'Success'
                                });
                                Swal.fire('Success!', 'Course unlocked. Check your Academy portal.', 'success');
                            });
                        } else {
                            Swal.fire('Low Balance', 'Please top up your wallet to enroll.', 'error');
                        }
                    });
                }
            });
        }

        // 4. Filtering Logic
        function filterCourses() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = courseData.filter(c => c.name.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q));
            render(filtered);
        }

        function filterCat(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'All' ? courseData : courseData.filter(c => c.cat === cat);
            render(filtered);
        }

        window.onload = () => render(courseData);
    </script>
</body>
</html>
