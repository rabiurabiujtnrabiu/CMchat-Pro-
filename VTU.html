<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Arena Pro | Instant Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #1A237E; --accent: #00f2fe; --bg: #F4F7FE; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #1e293b; padding-bottom: 50px; }
        header { padding: 20px; display: flex; align-items: center; background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        header h1 { font-size: 18px; font-weight: 800; margin: 0 0 0 15px; color: var(--primary); }
        .balance-badge { background: var(--white); margin: 15px; padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .balance-badge b { font-size: 16px; color: var(--primary); font-weight: 800; }
        .form-container { background: var(--white); margin: 0 15px; padding: 25px 20px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; }
        .network-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .network-btn { background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 15px; padding: 10px 5px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: 0.3s; }
        .network-btn.selected { border-color: var(--primary); background: #fff; box-shadow: 0 5px 15px rgba(26,35,126,0.1); }
        .logo-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 9px; font-weight: 800; }
        .service-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab-btn { white-space: nowrap; padding: 10px 15px; border-radius: 10px; background: #f1f5f9; border: none; font-size: 10px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .tab-btn.active { background: #9C27B0; color: white; box-shadow: 0 4px 10px rgba(156,37,176,0.2); }
        .input-box { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #e2e8f0; background: #f8fafc; font-weight: 700; outline: none; margin-bottom: 15px; font-size: 14px; }
        .btn-purchase { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: 800; font-size: 14px; box-shadow: 0 8px 20px rgba(26,35,126,0.2); cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left" style="color:var(--primary); cursor:pointer" onclick="history.back()"></i>
        <h1>Elite Arena Pro</h1>
    </header>

    <div class="balance-badge">
        <span style="font-size: 10px; font-weight: 800; color: #64748b;">AVAILABLE BALANCE</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container">
        <span class="label">Select Network</span>
        <div class="network-grid">
            <div class="network-btn" id="net_mtn" onclick="changeNet('mtn')"><div style="background:#FFD600; color:#000;" class="logo-circle">MTN</div><span style="font-size:9px; font-weight:700">MTN</span></div>
            <div class="network-btn" id="net_airtel" onclick="changeNet('airtel')"><div style="background:#FF1744;" class="logo-circle">AIR</div><span style="font-size:9px; font-weight:700">Airtel</span></div>
            <div class="network-btn" id="net_glo" onclick="changeNet('glo')"><div style="background:#00E676;" class="logo-circle">GLO</div><span style="font-size:9px; font-weight:700">Glo</span></div>
            <div class="network-btn" id="net_9mobile" onclick="changeNet('etisalat')"><div style="background:#004D40;" class="logo-circle">9M</div><span style="font-size:9px; font-weight:700">9mobile</span></div>
        </div>

        <div id="serviceTabArea" style="display:none;">
            <span class="label">Service Category</span>
            <div class="service-tabs" id="tabList"></div>
        </div>

        <div id="inputSection" style="margin-top: 15px;">
            <span class="label">Recipient Phone Number</span>
            <input type="number" class="input-box" id="phoneNo" placeholder="e.g. 08144216361">

            <span class="label">Choose Plan</span>
            <select class="input-box" id="planSelect" onchange="updateBtnLabel()">
                <option value="">-- Select Category First --</option>
            </select>

            <button class="btn-purchase" onclick="processOrder()" id="buyBtn">PROCEED</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const username = localStorage.getItem('username') || "Elite_User";
        const GSUBZ_KEY = "Ap_8fe29a8969a042bf6538b658112965fb";

        db.ref('users/'+username+'/wallet').on('value', s => {
            document.getElementById('walletBal').innerText = "₦" + (parseFloat(s.val()) || 0).toLocaleString();
        });

        // INSTANT DATA PLANS (No Researching Needed)
        const staticPlans = {
            "mtn_sme": [
                { id: "262", name: "MTN SME 500MB", price: 140 },
                { id: "260", name: "MTN SME 1GB", price: 275 },
                { id: "261", name: "MTN SME 2GB", price: 550 },
                { id: "263", name: "MTN SME 5GB", price: 1375 }
            ],
            "mtn_gifting": [
                { id: "179", name: "MTN Gifting 1GB", price: 300 },
                { id: "180", name: "MTN Gifting 2.5GB", price: 600 }
            ],
            "mtn_cg_lite": [
                { id: "320", name: "MTN CG Lite 1GB", price: 280 }
            ],
            "airtel_cg": [{ id: "201", name: "Airtel CG 1GB", price: 280 }],
            "glo_data": [{ id: "101", name: "Glo 1GB", price: 290 }],
            "etisalat_data": [{ id: "401", name: "9mobile 1GB", price: 350 }]
        };

        const netMap = {
            "mtn": ["mtn_sme", "mtn_gifting", "mtn_cg_lite"],
            "airtel": ["airtel_cg"],
            "glo": ["glo_data"],
            "etisalat": ["etisalat_data"]
        };

        let currentService = "";

        function changeNet(net) {
            document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('net_'+(net==='etisalat'?'9mobile':net)).classList.add('selected');
            let tabs = "";
            netMap[net].forEach(srv => {
                tabs += `<button class="tab-btn" id="t_${srv}" onclick="showPlans('${srv}')">${srv.split('_')[1].toUpperCase()}</button>`;
            });
            document.getElementById('tabList').innerHTML = tabs;
            document.getElementById('serviceTabArea').style.display = "block";
            document.getElementById('planSelect').innerHTML = `<option value="">-- Choose Category --</option>`;
        }

        function showPlans(srv) {
            currentService = srv;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById('t_'+srv).classList.add('active');
            let opts = `<option value="">-- Select Data Plan --</option>`;
            staticPlans[srv].forEach(p => {
                // Adjusting your price to 450 per 1GB logic if needed
                let displayPrice = p.name.includes("1GB") ? 450 : p.price + 50; 
                opts += `<option value="${p.id}" data-price="${displayPrice}" data-name="${p.name}">${p.name} (₦${displayPrice})</option>`;
            });
            document.getElementById('planSelect').innerHTML = opts;
        }

        function updateBtnLabel() {
            const sel = document.getElementById('planSelect');
            const price = sel.options[sel.selectedIndex].getAttribute('data-price');
            document.getElementById('buyBtn').innerText = price ? `PAY ₦${price} NOW` : "PROCEED";
        }

        async function processOrder() {
            const sel = document.getElementById('planSelect');
            const planId = sel.value;
            const price = parseFloat(sel.options[sel.selectedIndex].getAttribute('data-price'));
            const phone = document.getElementById('phoneNo').value;

            if(!planId || phone.length < 10) return Swal.fire('Error', 'Invalid details', 'warning');

            Swal.fire({
                title: 'Confirm', text: `Send to ${phone}?`, showCancelButton: true
            }).then(r => { if(r.isConfirmed) executeAPI(planId, phone, price); });
        }

        async function executeAPI(id, ph, pr) {
            Swal.showLoading();
            // Transaction & API Call Logic...
            // (Same as before but using currentService and static ID)
            let fd = new FormData();
            fd.append('serviceID', currentService);
            fd.append('plan', id);
            fd.append('api', GSUBZ_KEY);
            fd.append('phone', ph);
            
            try {
                const res = await fetch('https://gsubz.com/api/pay/', { method: 'POST', body: fd });
                const d = await res.json();
                if(d.code == 200) Swal.fire('Success!', 'Data Sent', 'success');
                else Swal.fire('Failed', d.description, 'error');
            } catch(e) { Swal.fire('Error', 'API Timeout', 'error'); }
        }
    </script>
</body>
</html>
