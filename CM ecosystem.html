<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Ecosystem Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a73e8;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-white: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 0;
        }

        .header {
            padding: 20px;
            background: linear-gradient(135deg, #1a73e8, #0ea5e9);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            text-align: center;
        }

        .wallet-card {
            background: var(--card-bg);
            margin: -30px 20px 20px 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-info h3 { margin: 0; font-size: 14px; opacity: 0.8; }
        .balance-info h2 { margin: 5px 0 0 0; font-size: 28px; color: #10b981; }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .service-item {
            background: var(--card-bg);
            padding: 25px 15px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .service-item i { font-size: 30px; margin-bottom: 10px; color: var(--primary-color); }
        .service-item span { display: block; font-weight: 500; font-size: 15px; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item { color: #94a3b8; font-size: 20px; text-decoration: none; }
        .nav-item.active { color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="header">
        <h1>CM Ecosystem</h1>
        <p>Welcome back, <span id="userName">User</span></p>
    </div>

    <div class="wallet-card">
        <div class="balance-info">
            <h3>Wallet Balance</h3>
            <h2>₦<span id="balance">0.00</span></h2>
        </div>
        <button style="background: #10b981; color: white; border: none; padding: 10px 15px; border-radius: 10px;">
            <i class="fas fa-plus"></i> Top Up
        </button>
    </div>

    <div class="services-grid">
        <div class="service-item" onclick="location.href='School.html'">
            <i class="fas fa-graduation-cap"></i>
            <span>CM Academy</span>
        </div>
        <div class="service-item" onclick="location.href='Market.html'">
            <i class="fas fa-shopping-cart"></i>
            <span>CM Market</span>
        </div>
        <div class="service-item" onclick="location.href='VTU.html'">
            <i class="fas fa-mobile-alt"></i>
            <span>CM VTU</span>
        </div>
        <div class="service-item" onclick="location.href='index.html'">
            <i class="fas fa-comments"></i>
            <span>CM Chat Pro</span>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="Market.html" class="nav-item"><i class="fas fa-store"></i></a>
        <a href="School.html" class="nav-item"><i class="fas fa-book"></i></a>
        <a href="Profile.html" class="nav-item"><i class="fas fa-user"></i></a>
    </div>

</body>
</html>
