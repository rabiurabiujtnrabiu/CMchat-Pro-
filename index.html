<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --accent: #00d2ff; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --success: #34d399; }
        
        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; color: white;
        }

        /* Background Effects */
        .orb { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(26,115,232,0.15) 0%, transparent 70%); border-radius: 50%; z-index: -1; animation: float 10s infinite alternate; }
        .orb-1 { top: 10%; left: 10%; }
        .orb-2 { bottom: 10%; right: 10%; background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, transparent 70%); }
        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(20px, 20px); } }

        .login-card { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 380px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center;
            border: 1px solid rgba(255,255,255,0.1); animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-icon { font-size: 50px; background: linear-gradient(to right, #1a73e8, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #64748b; }
        .input-group input { 
            width: 100%; padding: 15px 15px 15px 50px; background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; 
            outline: none; box-sizing: border-box; color: white; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

        .login-btn { 
            width: 100%; padding: 15px; background: linear-gradient(90deg, #1a73e8, #00d2ff);
            color: white; border: none; border-radius: 15px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(26,115,232,0.3); }
        .login-btn:disabled { opacity: 0.6; }

        .reg-link { margin-top: 25px; font-size: 13px; color: #94a3b8; }
        .reg-link span { color: var(--primary); font-weight: bold; cursor: pointer; }

        /* Custom Alert */
        .loader { display: none; margin-top: 15px; color: var(--accent); font-size: 12px; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
        <h2 style="margin: 0;">CMchat Pro</h2>
        <p style="color: #64748b; font-size: 12px; margin-bottom: 30px;">Login to your secure account</p>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email Address">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPass" placeholder="Password">
        </div>
        
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
        <div id="loader" class="loader"><i class="fas fa-circle-notch fa-spin"></i> Authenticating...</div>
        
        <div class="reg-link">
            New user? <span onclick="location.href='Register.html'">Create Account</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com/", 
            projectId: "cmchat-pro"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const rtdb = firebase.database(); // Muna amfani da Realtime Database yanzu

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loader');

            if(!email || !pass) {
                alert("Please enter both email and password.");
                return;
            }

            btn.disabled = true;
            loader.style.display = "block";

            try {
                const result = await auth.signInWithEmailAndPassword(email, pass);
                const user = result.user;

                // GYARA MAI KYAU: Adana UID na mutumin a browser (cite: 14712.jpg)
                localStorage.setItem('user_uid', user.uid);

                // Daukowa asalin sunan mutumin (username) daga folder din 'users'
                // Tunda Rules dinka suna 'true' (cite: 14640.jpg), wannan zai kwaso bayanan cikin sauki
                rtdb.ref('users/' + user.uid).once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        localStorage.setItem('username', userData.username);
                    } else {
                        localStorage.setItem('username', 'CM User');
                    }
                    
                    // Bayan an kammala komai, a tura shi Dashboard
                    window.location.href = 'Dashboard.html';
                });

            } catch (err) {
                alert("Login Failed: " + err.message);
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
