<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root { --p: #1A237E; --g: #FFD600; --bg: #0a0e27; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', sans-serif; background: var(--bg);
            color: white; overflow: hidden;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0a0e27, #1a237e, #0a0e27);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex; flex-direction: column; height: 100vh;
            justify-content: space-between; padding: 40px 20px; box-sizing: border-box;
        }

        .intro-slider { text-align: center; margin-top: 20px; }
        .intro-slider h1 { font-size: 35px; margin: 0; letter-spacing: 2px; font-weight: 800; }
        .intro-slider h1 span { color: var(--g); }
        .feature-text { height: 60px; margin-top: 15px; font-size: 16px; color: #cbd5e0; line-height: 1.5; }

        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 35px 25px; border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: var(--g); font-size: 18px; }
        .input-group input {
            width: 100%; background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 15px 16px 50px; border-radius: 18px;
            color: white; outline: none; transition: 0.3s; box-sizing: border-box; font-size: 16px;
        }
        .input-group input:focus { border-color: var(--g); background: rgba(255,255,255,0.12); }

        .login-btn {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: var(--g); color: var(--p); font-size: 18px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        /* Forgot Password Link */
        .forgot-link { text-align: right; margin-top: -10px; margin-bottom: 20px; }
        .forgot-link a { color: var(--g); font-size: 13px; text-decoration: none; opacity: 0.8; font-weight: 600; }

        .footer-links { text-align: center; margin-top: 25px; font-size: 14px; color: #aaa; }
        .footer-links a { color: var(--g); text-decoration: none; font-weight: bold; }

        /* Modal Style */
        #resetModal { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.9); z-index:9999; backdrop-filter: blur(10px); 
        }
        .modal-content {
            background: #0d1117; width: 85%; max-width: 400px; margin: 30% auto; 
            padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }

        #statusLabel, #resetStatus { text-align: center; font-size: 14px; margin-top: 15px; min-height: 20px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="container animate__animated animate__fadeIn">
        <div class="intro-slider">
            <h1>CMchat <span>Pro</span></h1>
            <div id="featureText" class="feature-text">Connecting you to the future of communication.</div>
        </div>

        <div class="login-card">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>

            <div class="forgot-link">
                <a href="#" onclick="showResetModal()">Forgot Password?</a>
            </div>
            
            <button class="login-btn" onclick="handleLogin()">
                <span>SECURE LOGIN</span> <i class="fas fa-shield-alt"></i>
            </button>

            <div id="statusLabel"></div>

            <div class="footer-links">
                New to the platform? <a href="Register.html">Create Account</a>
            </div>
        </div>

        <div style="text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 2px;">
            SECURED BY CLOUDFLARE & FIREBASE &copy; 2026
        </div>
    </div>

    <div id="resetModal">
        <div class="modal-content animate__animated animate__zoomIn">
            <h3 style="color: var(--g);">Reset Password</h3>
            <p style="font-size: 14px; color: #ccc; margin-bottom: 20px;">Enter your email to receive a reset link.</p>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="resetEmail" placeholder="Registered Email">
            </div>
            <button class="login-btn" onclick="sendPasswordReset()" style="padding:14px">SEND LINK</button>
            <p onclick="hideResetModal()" style="color:white; margin-top:15px; cursor:pointer; font-size:14px; opacity:0.6;">Cancel</p>
            <div id="resetStatus"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Feature Text Switcher
        const texts = ["Secure real-time messaging.", "Trade easily on CM Market.", "Learn at CM Academy.", "Secure CM Wallet."];
        let idx = 0;
        setInterval(() => {
            const el = document.getElementById('featureText');
            el.style.opacity = '0';
            setTimeout(() => {
                idx = (idx + 1) % texts.length;
                el.innerText = texts[idx];
                el.style.opacity = '1';
            }, 500);
        }, 4000);

        // Login Logic
        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const status = document.getElementById('statusLabel');

            if(!e || !p) { status.style.color = "#FF5252"; status.innerText = "Fields are required!"; return; }

            status.style.color = var(--g);
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            signInWithEmailAndPassword(auth, e, p)
                .then(() => {
                    status.style.color = "#00E676";
                    status.innerText = "Success! Redirecting...";
                    setTimeout(() => window.location.href = "index.html", 1200);
                })
                .catch(() => {
                    status.style.color = "#FF5252";
                    status.innerText = "Invalid Email or Password.";
                });
        };

        // Reset Password Logic
        window.showResetModal = () => document.getElementById('resetModal').style.display = 'block';
        window.hideResetModal = () => document.getElementById('resetModal').style.display = 'none';
        
        window.sendPasswordReset = () => {
            const email = document.getElementById('resetEmail').value;
            const status = document.getElementById('resetStatus');
            if(!email) { status.innerText = "Enter email!"; return; }

            sendPasswordResetEmail(auth, email)
                .then(() => {
                    status.style.color = "#00E676";
                    status.innerText = "Reset link sent to your email!";
                    setTimeout(hideResetModal, 3000);
                })
                .catch(() => {
                    status.style.color = "#FF5252";
                    status.innerText = "User not found.";
                });
        };
    </script>
</body>
</html>
