<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .logo-icon { font-size: 60px; color: var(--primary); margin-bottom: 20px; }
        .input-box { position: relative; margin-bottom: 20px; }
        .input-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        .input-box input { width: 100%; padding: 14px 15px 14px 45px; border: 1.5px solid #eee; border-radius: 15px; outline: none; box-sizing: border-box; font-size: 14px; }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn:active { transform: scale(0.98); }
        .reg-link { margin-top: 25px; font-size: 14px; color: #555; }
        .reg-link span { color: var(--primary); text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-circle-user"></i></div>
        <h2>Welcome Back</h2>
        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" id="loginUser" placeholder="Full Name (Username)">
        </div>
        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPass" placeholder="Password">
        </div>
        
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">Login</button>
        
        <div class="reg-link">
            Don't have an account? <span onclick="location.href='Register.html'">Register</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Saita Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            authDomain: "cmchat-pro.firebaseapp.com",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // Cika sunan mutum idan ya fito daga Register
        window.onload = () => {
            const savedName = localStorage.getItem('temp_user');
            if(savedName) document.getElementById('loginUser').value = savedName;
        };

        async function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const btn = document.getElementById('loginBtn');

            if(!user || !pass) {
                alert("Enter username and password!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Checking...";

            try {
                // Nemo mamba a database ta sunansa
                const snapshot = await db.ref('users/' + user).once('value');
                
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    
                    // Tabbatar password yayi daidai
                    if(data.password === pass) {
                        // Ajiye zaman login a waya (Session)
                        localStorage.setItem('username', data.username);
                        localStorage.setItem('user_uid', data.uid);
                        localStorage.removeItem('temp_user');

                        // Kai mutum zuwa Dashboard
                        location.href = 'Dashboard.html';
                    } else {
                        alert("Invalid Password!");
                        btn.disabled = false;
                        btn.innerText = "Login";
                    }
                } else {
                    alert("User not found!");
                    btn.disabled = false;
                    btn.innerText = "Login";
                }
            } catch (err) {
                alert("Network Error!");
                btn.disabled = false;
                btn.innerText = "Login";
            }
        }
    </script>
</body>
</html>
