<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMchat Pro - Elite Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --cm-blue: #0056b3; 
            --cm-dark: #1e293b;
            --white: #ffffff;
            --bg-chat: #f1f5f9;
        }

        /* 1. SCALING FIX: Tabbatar da girman screen ya dace da waya */
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg-chat); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
            font-size: 14px; /* Standard sizing */
        }

        header { 
            background: var(--white); padding: 10px 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            height: 60px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 100;
        }
        .group-profile { display: flex; align-items: center; gap: 10px; flex: 1; }
        .group-profile img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }

        /* CHAT AREA */
        .chat-view { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 12px;
        }

        .bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 18px; 
            position: relative; line-height: 1.4; font-size: 14px;
        }
        .sent { background: var(--cm-blue); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: var(--white); color: var(--cm-dark); align-self: flex-start; border-bottom-left-radius: 2px; }

        .xp-tag { background: #ffd700; color: #000; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-left: 5px; }

        /* 2. ADMIN TOOLS & SIDEBAR FIX */
        .sidebar { 
            position: fixed; right: -100%; top: 0; width: 85%; max-width: 300px; 
            height: 100%; background: var(--white); z-index: 2000; 
            transition: 0.3s ease-in-out; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .sidebar.active { right: 0; }

        .admin-box { 
            background: #fff1f0; border: 1px solid #ffa39e; 
            margin: 15px; padding: 15px; border-radius: 12px;
        }

        /* 3. FRIENDS SLIDE-UP MODAL */
        .friends-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: white; z-index: 3000; transition: 0.4s ease;
            border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            padding: 20px; display: flex; flex-direction: column;
        }
        .friends-modal.active { bottom: 0; }
        .friend-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid #eee;
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        .input-bar { padding: 10px; background: var(--white); display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #f1f5f9; border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; }
        #msgInp { border: none; background: transparent; outline: none; flex: 1; height: 30px; }
        .send-btn { width: 45px; height: 45px; background: var(--cm-blue); color: white; border: none; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <header>
        <div class="group-profile" onclick="toggleSidebar()">
            <img src="https://ui-avatars.com/api/?name=CM+Pro&background=0056b3&color=fff">
            <div>
                <b id="groupTitle">CMchat Community</b>
                <div style="font-size: 11px; color: #22c55e;">Active Members...</div>
            </div>
        </div>
        <div style="display:flex; gap:15px">
            <i class="fas fa-user-plus" onclick="openFriends()"></i>
            <i class="fas fa-ellipsis-v" onclick="toggleSidebar()"></i>
        </div>
    </header>

    <div class="chat-view" id="chatContainer"></div>

    <div class="input-bar">
        <div class="input-box">
            <input type="text" id="msgInp" placeholder="Rubuta saƙo...">
        </div>
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="sidebar" class="sidebar">
        <div style="background:var(--cm-blue); padding:30px; color:white">
            <h3>CMchat Pro</h3>
            <small>Admin Settings</small>
        </div>
        <div id="adminArea" style="display:none" class="admin-box">
            <h4 style="color:#f5222d; margin-top:0">Master Tools</h4>
            <button onclick="clearChat()" style="width:100%; padding:10px; background:#f5222d; color:white; border:none; border-radius:8px; cursor:pointer">Clear All Chat</button>
        </div>
        <div style="padding:15px">
            <div onclick="openFriends()" style="padding:12px; cursor:pointer"><i class="fas fa-user-friends"></i> Add Friends</div>
        </div>
    </div>

    <div id="friendsModal" class="friends-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3 style="margin:0">Zaɓi Abokai</h3>
            <i class="fas fa-times" onclick="closeAll()" style="font-size:20px"></i>
        </div>
        <div id="friendsList" style="overflow-y:auto; flex:1">
            <p style="color:#888">Neman abokan ka...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", 
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com", 
            projectId: "cmchat-pro" 
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        // 1. Tabbatar da sunan Abubakar don Admin Tools su fito
        const myName = localStorage.getItem('username') || "Elite_User"; 
        const isAdmin = (myName === "Abubakar");

        if(isAdmin) document.getElementById('adminArea').style.display = 'block';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function openFriends() {
            document.getElementById('friendsModal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
            loadFriends();
        }

        function closeAll() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('friendsModal').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        function loadFriends() {
            const list = document.getElementById('friendsList');
            // Anan za mu duba "friends" branch na wannan user kadai
            rtdb.ref('users').child(myName).child('friends').once('value', (snap) => {
                list.innerHTML = "";
                if(!snap.exists()) { list.innerHTML = "<p>Baka da abokai tukunna.</p>"; return; }
                snap.forEach(child => {
                    list.innerHTML += `
                        <div class="friend-item">
                            <span><b>${child.key}</b></span>
                            <button onclick="addToGroup('${child.key}')" style="background:var(--cm-blue); color:white; border:none; padding:5px 12px; border-radius:15px">Add</button>
                        </div>`;
                });
            });
        }

        function addToGroup(friendName) {
            rtdb.ref('group_list').child(friendName).set({status: "active"});
            alert(friendName + " an ƙara shi a group!");
        }

        // CHAT LOGIC
        rtdb.ref('group_pro_chat').on('value', (snap) => {
            const container = document.getElementById('chatContainer');
            container.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                if(!d.message || d.message === "undefined") return;
                const isMe = d.sender === myName;
                container.innerHTML += `
                    <div class="bubble ${isMe ? 'sent' : 'received'}">
                        <div style="font-size:11px; font-weight:bold; margin-bottom:4px">
                            ${isMe ? 'Kai' : d.sender} <span class="xp-tag">Elite</span>
                        </div>
                        ${d.message}
                        <div style="font-size:9px; text-align:right; margin-top:4px; opacity:0.7">${d.timestamp}</div>
                    </div>`;
            });
            container.scrollTop = container.scrollHeight;
        });

        function sendMessage() {
            const inp = document.getElementById('msgInp');
            if(!inp.value.trim()) return;
            rtdb.ref('group_pro_chat').push({
                sender: myName,
                message: inp.value,
                timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                xp: "Elite"
            });
            inp.value = "";
        }

        function clearChat() { if(confirm("Goge dukkan hira?")) rtdb.ref('group_pro_chat').remove(); }
    </script>
</body>
</html>
