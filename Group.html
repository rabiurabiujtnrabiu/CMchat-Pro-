<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMchat Elite - Pro Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="pro-ui">

    <div id="overlay" class="overlay" onclick="closeAllPanels()"></div>

    <header class="main-header">
        <div class="header-content-wrapper">
            <div class="header-left" onclick="showGroupInfo()">
                <div class="brand-avatar">
                    <div class="avatar-box">CM</div>
                    <div class="pulse-indicator"></div>
                </div>
                <div class="brand-info">
                    <h1 id="groupName">Elite Community</h1>
                    <div class="status-container">
                        <span class="dot"></span>
                        <small id="connectionStatus">Online</small>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <button class="nav-icon" onclick="toggleSearch()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button class="nav-icon" onclick="togglePanel('stickerPanel')">
                    <i class="fa-solid fa-face-smile"></i>
                </button>
                <button class="nav-icon" onclick="togglePanel('settingsPanel')">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="chat-viewport" id="chatBox">
        <div class="initial-loader">
            <div class="spinner-pro"></div>
            <p>Syncing encrypted messages...</p>
        </div>
    </main>

    <footer class="input-panel">
        <div class="input-container-v2">
            <button class="media-btn" onclick="openMedia()">
                <i class="fa-solid fa-plus"></i>
            </button>
            
            <div class="input-field-wrapper">
                <input type="text" id="msgInp" placeholder="Type a message..." autocomplete="off">
            </div>

            <div class="action-group">
                <button class="voice-trigger" id="voiceBtn" onclick="startVoiceRecord()">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button class="send-trigger" id="sendBtn" onclick="sendMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </footer>

    <div id="stickerPanel" class="bottom-sheet-pro"></div>
    <div id="settingsPanel" class="bottom-sheet-pro"></div>

    <script src="script.js"></script>
</body>
</html>
