<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Wallet | CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --primary: #1A237E;
            --accent: #FFD600;
            --bg: #F4F7FE;
            --white: #ffffff;
            --success: #4caf50;
            --danger: #f44336;
            --grad: linear-gradient(135deg, #1A237E 0%, #3949AB 100%);
        }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: var(--bg); color: #333; padding-bottom: 30px;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- Header --- */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-greet b { font-size: 18px; display: block; }
        .user-greet span { font-size: 12px; color: #888; }

        /* --- Main Wallet Card --- */
        .wallet-card {
            margin: 0 20px; padding: 25px; border-radius: 30px;
            background: var(--grad); color: white;
            box-shadow: 0 15px 35px rgba(26, 35, 126, 0.3);
            position: relative; overflow: hidden;
        }

        .balance-label { font-size: 13px; opacity: 0.8; }
        .balance-amount { font-size: 32px; font-weight: 800; margin: 5px 0 20px; display: flex; align-items: center; gap: 10px; }
        
        .wallet-actions { display: flex; gap: 15px; }
        .action-btn {
            background: rgba(255,255,255,0.2); border: none; padding: 12px 20px;
            border-radius: 15px; color: white; font-weight: 600; font-size: 12px;
            backdrop-filter: blur(10px); cursor: pointer; display: flex; align-items: center; gap: 8px; flex: 1;
        }

        /* --- VTU Services Grid --- */
        .services-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 15px; padding: 0 20px; margin-top: 25px;
        }
        .service-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon-circle {
            width: 55px; height: 55px; background: var(--white);
            border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 20px; color: var(--primary);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        .service-item span { font-size: 11px; font-weight: 600; color: #555; }

        /* --- Transactions Section --- */
        .recent-box { margin: 30px 20px 0; }
        .recent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .transaction {
            background: var(--white); padding: 15px; border-radius: 20px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .trans-info { flex: 1; }
        .trans-info b { font-size: 14px; display: block; }
        .trans-amt { font-weight: 800; font-size: 14px; }

        /* --- FUNDING MODAL (Professional Overlay) --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: flex-end;
        }
        .modal-content {
            background: var(--bg); width: 100%; border-radius: 40px 40px 0 0;
            padding: 30px 20px; box-sizing: border-box; max-height: 85vh; overflow-y: auto;
        }
        .bank-box {
            background: var(--grad); color: white; padding: 20px;
            border-radius: 25px; margin: 20px 0;
        }
        .input-group input {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            margin-bottom: 15px; background: white; font-weight: bold;
        }
        .btn-pay {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: var(--primary); color: white; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="user-greet">
            <span>Welcome back,</span>
            <b id="walletUser">User Name</b>
        </div>
        <div class="icon-circle" style="width:40px; height:40px; cursor:pointer" onclick="location.href='index.html'"><i class="fas fa-home"></i></div>
    </header>

    <div class="wallet-card animate__animated animate__fadeInDown">
        <div class="balance-label">Available Balance</div>
        <div class="balance-amount">₦<span id="balance">0.00</span></div>
        <div class="wallet-actions">
            <button class="action-btn" onclick="openFund()"><i class="fas fa-plus-circle"></i> Add Money</button>
            <button class="action-btn" onclick="openHistory()"><i class="fas fa-history"></i> History</button>
        </div>
    </div>

    <div class="services-grid">
        <div class="service-item" onclick="location.href='Buy-Service.html'">
            <div class="icon-circle"><i class="fas fa-wifi"></i></div>
            <span>Data</span>
        </div>
        <div class="service-item" onclick="location.href='Buy-Service.html'">
            <div class="icon-circle"><i class="fas fa-phone"></i></div>
            <span>Airtime</span>
        </div>
        <div class="service-item" onclick="location.href='Buy-Service.html'">
            <div class="icon-circle"><i class="fas fa-tv"></i></div>
            <span>Cable TV</span>
        </div>
        <div class="service-item" onclick="location.href='Security-Pin.html'">
            <div class="icon-circle"><i class="fas fa-shield-alt"></i></div>
            <span>Security</span>
        </div>
    </div>

    <div class="recent-box">
        <div class="recent-header"><b>Recent Activity</b></div>
        <div id="miniHistory"></div>
    </div>

    <div id="fundOverlay" class="overlay">
        <div class="modal-content animate__animated animate__slideInUp">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Fund Your Wallet</h3>
                <i class="fas fa-times-circle" style="font-size:24px; color:#999;" onclick="closeFund()"></i>
            </div>
            <div class="bank-box">
                <small>Bank Transfer (Automatic)</small>
                <div style="font-size:22px; font-weight:800; margin:10px 0;">9034567812</div>
                <small>Wema Bank / Monnify</small>
            </div>
            <div class="input-group">
                <p style="font-size:12px; font-weight:bold; color:#666;">PAY WITH CARD / USSD</p>
                <input type="number" id="fundAmt" placeholder="Enter Amount (₦)">
                <button class="btn-pay" onclick="processPayment()">PAY SECURELY NOW</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Guest";
        document.getElementById('walletUser').innerText = myName;

        // 1. Live Balance
        db.ref('users/' + myName + '/wallet').on('value', snap => {
            const val = snap.val() || 0;
            document.getElementById('balance').innerText = parseFloat(val).toLocaleString();
        });

        // 2. Load Mini History
        db.ref('transactions/' + myName).limitToLast(3).on('value', snap => {
            const list = document.getElementById('miniHistory');
            list.innerHTML = "";
            snap.forEach(child => {
                const t = child.val();
                const isDebit = t.type === 'debit';
                list.innerHTML += `
                    <div class="transaction">
                        <div style="width:40px; height:40px; border-radius:10px; background:${isDebit ? '#ffebee' : '#e8f5e9'}; color:${isDebit ? 'red' : 'green'}; display:flex; align-items:center; justify-content:center; margin-right:15px;">
                            <i class="fas ${isDebit ? 'fa-arrow-up' : 'fa-arrow-down'}"></i>
                        </div>
                        <div class="trans-info">
                            <b>${t.service}</b>
                            <small>${new Date(t.time).toLocaleDateString()}</small>
                        </div>
                        <div class="trans-amt" style="color:${isDebit ? 'red' : 'green'}">${isDebit ? '-' : '+'}₦${t.amount}</div>
                    </div>
                `;
            });
        });

        // Overlay Controllers
        window.openFund = () => document.getElementById('fundOverlay').style.display = 'flex';
        window.closeFund = () => document.getElementById('fundOverlay').style.display = 'none';
        window.openHistory = () => location.href = 'Transaction-History.html';

        function processPayment() {
            const amt = document.getElementById('fundAmt').value;
            if(amt < 100) return alert("Minimum ₦100");
            
            // Logic don kara kudi a Firebase
            db.ref('users/' + myName + '/wallet').once('value', s => {
                let current = s.val() || 0;
                db.ref('users/' + myName + '/wallet').set(parseFloat(current) + parseFloat(amt));
                db.ref('transactions/' + myName).push({
                    type: 'credit', service: 'Wallet Funding', amount: amt, time: Date.now()
                });
                alert("Payment Successful!");
                closeFund();
            });
        }
    </script>
</body>
</html>
