<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Wallet | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #1A237E; --accent: #FFD600; --bg: #F4F7FE;
            --white: #ffffff; --success: #2ed573; --danger: #ff4757;
            --grad: linear-gradient(135deg, #1A237E 0%, #3949AB 100%);
        }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: #2d3436; padding-bottom: 100px; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }

        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-greet span { font-size: 12px; color: #8e8e93; font-weight: 600; }
        .user-greet b { font-size: 18px; display: block; color: var(--primary); }

        /* Wallet Card */
        .wallet-card { 
            margin: 0 20px; padding: 25px; border-radius: 35px; 
            background: var(--grad); color: white; 
            box-shadow: 0 20px 40px rgba(26, 35, 126, 0.25); 
            position: relative; overflow: hidden;
        }
        .wallet-card::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px; background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .balance-label { font-size: 12px; font-weight: 600; opacity: 0.8; letter-spacing: 1px; }
        .balance-amount { font-size: 34px; font-weight: 800; margin: 8px 0 25px; display: flex; align-items: center; gap: 8px; }
        
        .wallet-actions { display: flex; gap: 15px; }
        .action-btn { 
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); 
            padding: 14px; border-radius: 20px; color: white; font-weight: 700; 
            font-size: 12px; backdrop-filter: blur(10px); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 8px; flex: 1; 
        }

        /* Services Grid */
        .services-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 30px 20px; }
        .service-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon-box { 
            width: 60px; height: 60px; background: var(--white); border-radius: 22px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; color: var(--primary); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.04); transition: 0.3s;
        }
        .service-item:active .icon-box { transform: scale(0.9); background: var(--primary); color: white; }
        .service-item span { font-size: 11px; font-weight: 700; color: #636e72; }

        /* Transactions */
        .recent-box { padding: 0 20px; }
        .recent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .transaction { 
            background: var(--white); padding: 16px; border-radius: 24px; 
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
        }
        .trans-icon { width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .trans-info { flex: 1; }
        .trans-info b { font-size: 14px; display: block; color: #2d3436; }
        .trans-info small { font-size: 11px; color: #b2bec3; font-weight: 600; }
        .trans-amt { font-weight: 800; font-size: 14px; }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--white); 
            display: flex; justify-content: space-around; padding: 15px 0 30px; 
            border-top-left-radius: 40px; border-top-right-radius: 40px; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; 
        }
        .nav-item { color: #d1d8e0; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }

        /* Modal Overlay */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); 
            z-index: 2000; display: none; align-items: flex-end; 
        }
        .modal-content { 
            background: var(--bg); width: 100%; border-radius: 45px 45px 0 0; 
            padding: 35px 25px; box-sizing: border-box; 
        }
        .bank-box { 
            background: var(--grad); color: white; padding: 25px; 
            border-radius: 28px; margin: 20px 0; text-align: center;
        }
        .input-group input { 
            width: 100%; padding: 20px; border-radius: 20px; border: 2px solid #eee; 
            margin-bottom: 20px; font-size: 18px; font-weight: 800; text-align: center; outline: none;
        }
        .btn-pay { 
            width: 100%; padding: 20px; border: none; border-radius: 20px; 
            background: var(--primary); color: white; font-weight: 800; font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <div class="user-greet">
            <span>Elite Member</span>
            <b id="walletUser">User Name</b>
        </div>
        <div class="icon-box" style="width:45px; height:45px; border-radius:15px; font-size:18px;" onclick="location.reload()">
            <i class="fas fa-redo-alt"></i>
        </div>
    </header>

    <div class="wallet-card animate__animated animate__fadeInDown">
        <div class="balance-label">TOTAL BALANCE</div>
        <div class="balance-amount">₦<span id="balance">0.00</span></div>
        <div class="wallet-actions">
            <button class="action-btn" onclick="openFund()"><i class="fas fa-wallet"></i> Fund</button>
            <button class="action-btn" onclick="location.href='History.html'"><i class="fas fa-receipt"></i> History</button>
        </div>
    </div>

    <div class="services-grid">
        <div class="service-item" onclick="location.href='VTU.html'">
            <div class="icon-box"><i class="fas fa-signal"></i></div>
            <span>Data</span>
        </div>
        <div class="service-item" onclick="location.href='VTU.html'">
            <div class="icon-box"><i class="fas fa-mobile-alt"></i></div>
            <span>Airtime</span>
        </div>
        <div class="service-item" onclick="location.href='TV.html'">
            <div class="icon-box"><i class="fas fa-tv"></i></div>
            <span>Cable</span>
        </div>
        <div class="service-item" onclick="location.href='Security.html'">
            <div class="icon-box"><i class="fas fa-fingerprint"></i></div>
            <span>PIN</span>
        </div>
    </div>

    <div class="recent-box">
        <div class="recent-header"><b style="font-size: 16px;">Recent Activity</b></div>
        <div id="miniHistory">
            </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="history.back()"><i class="fas fa-home"></i></div>
        <div class="nav-item"><i class="fas fa-users"></i></div>
        <div class="nav-item"><i class="fas fa-store"></i></div>
        <div class="nav-item active"><i class="fas fa-wallet"></i></div>
    </div>

    <div id="fundOverlay" class="overlay">
        <div class="modal-content animate__animated animate__slideInUp">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <b style="font-size: 20px;">Add Funds</b>
                <i class="fas fa-times-circle" style="font-size:26px; color:#ccc;" onclick="closeFund()"></i>
            </div>
            
            <div class="bank-box">
                <p style="font-size: 11px; font-weight: 700; opacity: 0.8; margin-bottom: 10px;">AUTOMATED BANK TRANSFER</p>
                <div style="font-size:26px; font-weight:800; letter-spacing: 1px;">9034567812</div>
                <p style="font-size:12px; font-weight:600; margin-top: 5px;">Wema Bank / Monnify</p>
            </div>

            <div class="input-group">
                <label style="font-size:11px; font-weight:800; color:#999; margin-bottom:10px; display:block; text-align:center;">OR PAY WITH CARD</label>
                <input type="number" id="fundAmt" placeholder="0.00">
                <button class="btn-pay" onclick="processPayment()">FUND WALLET NOW</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";
        document.getElementById('walletUser').innerText = myName;

        // 1. Live Balance Sync (Formatted)
        db.ref('users/' + myName + '/wallet').on('value', snap => {
            const bal = snap.val() || 0;
            document.getElementById('balance').innerText = Number(bal).toLocaleString('en-NG', {
                minimumFractionDigits: 2, maximumFractionDigits: 2
            });
        });

        // 2. Load Mini History
        db.ref('transactions/' + myName).limitToLast(4).on('value', snap => {
            const list = document.getElementById('miniHistory');
            list.innerHTML = "";
            
            if(!snap.exists()) {
                list.innerHTML = "<p style='text-align:center; padding:20px; font-size:12px; color:#999;'>No recent transactions found.</p>";
                return;
            }

            let html = "";
            snap.forEach(child => {
                const t = child.val();
                const isDebit = t.type === 'debit';
                const color = isDebit ? 'var(--danger)' : 'var(--success)';
                const bg = isDebit ? 'rgba(255,71,87,0.1)' : 'rgba(46,213,115,0.1)';
                
                html = `
                    <div class="transaction animate__animated animate__fadeInUp">
                        <div class="trans-icon" style="background:${bg}; color:${color}">
                            <i class="fas ${isDebit ? 'fa-minus' : 'fa-plus'}"></i>
                        </div>
                        <div class="trans-info">
                            <b>${t.service}</b>
                            <small>${new Date(t.time).toLocaleDateString()} • ${new Date(t.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
                        </div>
                        <div class="trans-amt" style="color:${color}">${isDebit ? '-' : '+'}₦${Number(t.amount).toLocaleString()}</div>
                    </div>
                ` + html;
            });
            list.innerHTML = html;
        });

        function openFund() { document.getElementById('fundOverlay').style.display = 'flex'; }
        function closeFund() { document.getElementById('fundOverlay').style.display = 'none'; }

        function processPayment() {
            const amt = parseFloat(document.getElementById('fundAmt').value);
            if(!amt || amt < 100) return Swal.fire('Error', 'Minimum amount is ₦100', 'error');

            Swal.fire({
                title: 'Processing...',
                didOpen: () => { Swal.showLoading(); }
            });

            setTimeout(() => {
                db.ref('users/' + myName + '/wallet').once('value', s => {
                    const current = parseFloat(s.val()) || 0;
                    db.ref('users/' + myName + '/wallet').set(current + amt).then(() => {
                        db.ref('transactions/' + myName).push({
                            type: 'credit', service: 'Wallet Top-up', amount: amt, time: Date.now()
                        });
                        Swal.fire('Success', `₦${amt.toLocaleString()} added successfully!`, 'success');
                        closeFund();
                        document.getElementById('fundAmt').value = "";
                    });
                });
            }, 1200);
        }
    </script>
</body>
</html>
