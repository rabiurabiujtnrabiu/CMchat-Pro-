<div id="sidebarOverlay" onclick="toggleSidebar()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1001;"></div>

<div id="sidebar" class="sidebar-panel">
    <div class="sidebar-header">
        <div class="user-avatar">
            <i class="fas fa-user"></i>
        </div>
        <b style="font-size: 16px;">Abubakar Sadiq</b><br>
        <small style="opacity: 0.8;">Kano, Nigeria</small>
    </div>

    <div class="sidebar-links">
        <div class="side-item" onclick="location.href='settings.html'">
            <i class="fas fa-user-circle"></i> Edit Profile
        </div>
        <div class="side-item" onclick="location.href='wallet.html'">
            <i class="fas fa-wallet"></i> My Wallet
        </div>
        
        <div class="side-item" onclick="toggleDarkMode()">
            <i class="fas fa-moon" id="darkIcon"></i> 
            <span id="darkText">Dark Mode</span>
            <div style="margin-left: auto;">
                <label class="switch-mini">
                    <input type="checkbox" id="darkToggle">
                    <span class="slider-mini"></span>
                </label>
            </div>
        </div>

        <div class="side-item">
            <i class="fas fa-share-nodes"></i> Invite Friends
        </div>
        <div class="side-item" style="border-top: 1px solid #eee; margin-top: 10px; color: #d32f2f;">
            <i class="fas fa-power-off"></i> Logout
        </div>
    </div>

    <div class="sidebar-footer">
        <i class="fas fa-shield-halved"></i> All data auto-deleted in 7 days.
    </div>
</div>

<style>
    /* CSS na Sidebar */
    .sidebar-panel {
        position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
        background: white; z-index: 1002; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
    }
    .sidebar-header { background: #1A237E; color: white; padding: 40px 20px 20px; text-align: center; }
    .user-avatar { 
        width: 65px; height: 65px; border-radius: 50%; background: #f0f0f0; 
        margin: 0 auto 10px; border: 2px solid white; display: flex; 
        align-items: center; justify-content: center; overflow: hidden;
    }
    .user-avatar i { font-size: 35px; color: #1A237E; }
    .sidebar-links { padding: 15px; flex: 1; }
    .side-item {
        display: flex; align-items: center; gap: 15px; padding: 12px 15px;
        font-size: 14px; font-weight: 600; color: #333; cursor: pointer;
        border-radius: 10px; transition: 0.2s;
    }
    .side-item:hover { background: #f0f2f5; }
    .side-item i { width: 20px; color: #1A237E; font-size: 18px; }
    .sidebar-footer { padding: 20px; font-size: 10px; color: #999; text-align: center; }

    /* Dark Mode Global Styles */
    body.dark-mode { background-color: #121212 !important; color: #e0e0e0 !important; }
    body.dark-mode .sidebar-panel, body.dark-mode .grid-item, body.dark-mode .wallet-stat { 
        background-color: #1e1e1e !important; color: white !important; 
    }
    body.dark-mode .side-item { color: #e0e0e0 !important; }
    body.dark-mode .side-item:hover { background: #333 !important; }
    body.dark-mode .side-item i { color: #bb86fc !important; }

    /* Mini Switch CSS */
    .switch-mini { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch-mini input { opacity: 0; width: 0; height: 0; }
    .slider-mini {
        position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #ccc; transition: .4s; border-radius: 20px;
    }
    .slider-mini:before {
        position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
        background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider-mini { background-color: #bb86fc; }
    input:checked + .slider-mini:before { transform: translateX(14px); }
</style>

<script>
    // Bude da rufe Sidebar
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const isOpen = sidebar.style.left === '0px';
        
        sidebar.style.left = isOpen ? '-280px' : '0px';
        overlay.style.display = isOpen ? 'none' : 'block';
    }

    // Dark Mode Logic
    function toggleDarkMode() {
        const body = document.body;
        const toggle = document.getElementById('darkToggle');
        const text = document.getElementById('darkText');
        const icon = document.getElementById('darkIcon');

        body.classList.toggle('dark-mode');
        const isDark = body.classList.contains('dark-mode');
        
        toggle.checked = isDark;
        text.innerText = isDark ? "Light Mode" : "Dark Mode";
        icon.className = isDark ? "fas fa-sun" : "fas fa-moon";
        
        // Ajiye ajiya a waya (LocalStorage)
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Duba yanayin da aka bari akai idan an sake bude app
    window.onload = () => {
        if(localStorage.getItem('theme') === 'dark') {
            toggleDarkMode();
        }
    };
</script>
