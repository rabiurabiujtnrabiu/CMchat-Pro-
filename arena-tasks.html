<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Arena | Royal Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #0A192F; --card: #112240; --gold: #FFD600; --cyan: #64FFDA; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: white; text-align: center; overflow: hidden; }

        /* QUIZ HEADER */
        .quiz-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .timer-circle { width: 60px; height: 60px; border: 4px solid var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; box-shadow: 0 0 15px var(--cyan); }

        /* ROYAL STREAK AREA */
        .streak-container { margin: 20px 0; height: 50px; position: relative; }
        .crown-icon { font-size: 40px; color: var(--gold); display: none; filter: drop-shadow(0 0 10px var(--gold)); }
        .active-streak .crown-icon { display: block; animation: bounceIn 0.5s; }

        /* QUESTION CARD */
        .question-card { background: var(--card); margin: 0 20px; padding: 30px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; line-height: 1.4; }

        /* OPTIONS */
        .options-grid { padding: 25px 20px; display: grid; gap: 15px; }
        .option-btn { background: #1d2d44; padding: 18px; border-radius: 20px; border: 2px solid transparent; color: #ccd6f6; font-weight: 600; text-align: left; transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .option-btn:active { transform: scale(0.95); }
        .option-btn.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .option-btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        /* LIFELINES */
        .lifelines { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .life-item { width: 50px; height: 50px; background: rgba(255,255,255,0.05); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1px solid rgba(255,255,255,0.1); }

        @keyframes bounceIn { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="quiz-header">
        <i class="fas fa-times" onclick="history.back()" style="font-size: 20px;"></i>
        <div class="timer-circle" id="timer">15</div>
        <div style="text-align: right;">
            <div style="font-size: 10px; opacity: 0.6;">Score</div>
            <b id="score" style="font-size: 18px; color: var(--gold);">00</b>
        </div>
    </div>

    <div class="streak-container" id="streakBox">
        <i class="fas fa-crown crown-icon"></i>
        <div style="font-size: 11px; font-weight: 800; color: var(--gold); margin-top: 5px;" id="streakTxt"></div>
    </div>

    <div class="question-card" id="questionTxt">
        Loading the first challenge for the future King...
    </div>

    <div class="options-grid" id="optionsGrid">
        </div>

    <div class="lifelines">
        <div class="life-item" title="50/50"><i class="fas fa-magic" style="color: var(--cyan);"></i></div>
        <div class="life-item" title="Freeze"><i class="fas fa-snowflake" style="color: #60a5fa;"></i></div>
        <div class="life-item" title="Skip"><i class="fas fa-forward" style="color: #94a3b8;"></i></div>
    </div>

    <script>
        let streak = 0;
        let score = 0;

        function handleAnswer(isCorrect, element) {
            if(isCorrect) {
                element.classList.add('correct');
                streak++;
                score += (streak >= 5) ? 20 : 10; // Double points for royalty
                
                if(streak >= 5) {
                    document.getElementById('streakBox').classList.add('active-streak');
                    document.getElementById('streakTxt').innerText = "ROYAL STREAK X2";
                }
            } else {
                element.classList.add('wrong');
                streak = 0;
                document.getElementById('streakBox').classList.remove('active-streak');
                document.getElementById('streakTxt').innerText = "";
            }
            
            document.getElementById('score').innerText = score.toString().padStart(2, '0');
            // Muje tambaya ta gaba bayan sakan 1
        }
    </script>
</body>
</html>
