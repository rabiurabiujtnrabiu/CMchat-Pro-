<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Academy | Audio Space Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #0062ff; 
            --dark: #0a0f18; 
            --card: #151c27; 
            --accent: #FFD600; 
            --danger: #ff4757;
            --success: #00E676;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- MODERN HEADER --- */
        header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between; 
            background: rgba(10, 15, 24, 0.8); backdrop-filter: blur(20px); 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .live-indicator { 
            background: rgba(0, 98, 255, 0.1); color: var(--primary); 
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; 
            display: flex; align-items: center; gap: 6px; border: 1px solid rgba(0, 98, 255, 0.2);
        }
        .live-indicator span { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }

        /* --- CONTENT AREA --- */
        #spaces-container { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .section-label { color: #64748b; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }
        .users-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        
        .user-slot { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .avatar-wrapper { position: relative; width: 75px; height: 75px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 28px; background: var(--card); 
            display: flex; align-items: center; justify-content: center; 
            border: 2px solid rgba(255,255,255,0.05); transition: 0.4s; overflow: hidden;
        }
        .avatar.speaking { 
            border-color: var(--primary); 
            box-shadow: 0 0 25px rgba(0, 98, 255, 0.3);
            animation: speakerPulse 2s infinite;
        }
        .avatar i { font-size: 32px; color: #334155; }

        .mic-badge { 
            position: absolute; bottom: -5px; right: -5px; width: 26px; height: 26px; 
            background: white; color: black; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; border: 3px solid var(--dark); 
        }
        .mic-badge.muted { color: var(--danger); background: #222; }

        .name { font-size: 12px; font-weight: 700; color: #f1f5f9; width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .role-pill { font-size: 9px; padding: 2px 8px; border-radius: 5px; font-weight: 800; }
        .role-host { background: var(--accent); color: var(--dark); }
        .role-speaker { background: rgba(0, 98, 255, 0.2); color: var(--primary); }

        /* --- MODERN BOTTOM DOCK --- */
        .bottom-dock { 
            background: rgba(21, 28, 39, 0.95); backdrop-filter: blur(30px); 
            padding: 20px 25px; display: flex; align-items: center; justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .request-btn { 
            background: var(--primary); color: white; padding: 12px 25px; 
            border-radius: 18px; font-weight: 800; font-size: 13px; border: none; 
            display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(0, 98, 255, 0.3);
        }
        
        .dock-tools { display: flex; gap: 15px; }
        .tool-btn { 
            width: 48px; height: 48px; border-radius: 16px; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; font-size: 18px; 
            color: white; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s;
        }
        .tool-btn:active { transform: scale(0.9); }
        .tool-btn.danger { color: var(--danger); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes speakerPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fas fa-chevron-left" onclick="leaveSpace()" style="cursor:pointer; color:#64748b;"></i>
            <b style="font-size:18px;">Elite Audio Space</b>
        </div>
        <div class="live-indicator"><span></span> LIVE SESSION</div>
    </header>

    <div id="spaces-container">
        <div class="section-label">Host</div>
        <div class="users-grid" id="host-grid">
            <div class="user-slot">
                <div class="avatar-wrapper">
                    <div class="avatar speaking"><i class="fas fa-user-shield"></i></div>
                    <div class="mic-badge"><i class="fas fa-microphone"></i></div>
                </div>
                <span class="name" id="hostName">Senior Mentor</span>
                <span class="role-pill role-host">ORGANIZER</span>
            </div>
        </div>

        <div class="section-label">Speakers</div>
        <div class="users-grid" id="speaker-list">
            </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div class="section-label" style="margin:0;">Listeners</div>
            <span id="lCount" style="font-size:11px; font-weight:800; color:var(--primary);">0 ACTIVE</span>
        </div>
        <div class="users-grid" id="listener-list">
            </div>
    </div>

    <div class="bottom-dock">
        <button class="request-btn" id="reqBtn" onclick="requestToSpeak()">
            <i class="fas fa-hand-sparkles"></i> Raise Hand
        </button>
        
        <div class="dock-tools">
            <div class="tool-btn" id="micToggle" onclick="toggleLocalMic()"><i class="fas fa-microphone-slash"></i></div>
            <div class="tool-btn" onclick="viewRequests()" id="adminBtn" style="display:none;"><i class="fas fa-headset"></i></div>
            <div class="tool-btn danger" onclick="leaveSpace()"><i class="fas fa-arrow-right-from-bracket"></i></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const myUid = localStorage.getItem('user_uid') || "UID_" + Math.random().toString(36).substr(2, 9);
        const myName = localStorage.getItem('username') || "Elite Learner";
        const roomID = "main_academy_space";

        let isSpeaker = false;
        let isMuted = true;
        let isAdmin = (myName === "Commander CM"); // Misali: In kaine Commander zai baka Admin tools

        // Set Identity
        const myRef = db.ref(`audio_spaces/${roomID}/members/${myUid}`);
        myRef.set({ name: myName, role: 'listener', muted: true, active: true });
        myRef.onDisconnect().remove();

        // Admin Visibility
        if(isAdmin) { document.getElementById('adminBtn').style.display = 'flex'; }

        // REAL-TIME SYNC
        db.ref(`audio_spaces/${roomID}`).on('value', snap => {
            const data = snap.val() || {};
            const members = data.members || {};
            
            const sList = document.getElementById('speaker-list');
            const lList = document.getElementById('listener-list');
            sList.innerHTML = ""; lList.innerHTML = "";
            
            let listeners = 0;
            Object.keys(members).forEach(id => {
                const m = members[id];
                const isMe = (id === myUid);
                if(isMe) { isSpeaker = (m.role === 'speaker'); updateUI(); }

                const html = `
                    <div class="user-slot" onclick="showProfile('${id}', '${m.name}', '${m.role}')">
                        <div class="avatar-wrapper">
                            <div class="avatar ${!m.muted ? 'speaking' : ''}">
                                <i class="fas fa-user${m.role === 'speaker' ? '-graduate' : ''}"></i>
                            </div>
                            ${m.role === 'speaker' ? `<div class="mic-badge ${m.muted ? 'muted' : ''}"><i class="fas fa-microphone${m.muted ? '-slash' : ''}"></i></div>` : ''}
                        </div>
                        <span class="name">${m.name}${isMe ? ' (You)' : ''}</span>
                        ${m.role === 'speaker' ? '<span class="role-pill role-speaker">SPEAKER</span>' : ''}
                    </div>`;

                if(m.role === 'speaker') { sList.innerHTML += html; } 
                else { listeners++; lList.innerHTML += html; }
            });
            document.getElementById('lCount').innerText = listeners + " ACTIVE";
        });

            document.getElementById('reqBtn').style.display = isSpeaker ? 'none' : 'flex';
            const micBtn = document.getElementById('micToggle');
            micBtn.style.background = isSpeaker ? (isMuted ? 'rgba(255,71,87,0.1)' : 'rgba(0,230,118,0.1)') : 'rgba(255,255,255,0.05)';
