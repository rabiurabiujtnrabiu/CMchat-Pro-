<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Academy | Audio Spaces</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1A237E; --twitter-blue: #1DA1F2; --dark: #15202B; --card: #192734; --accent: #FBC02D; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; height: 100vh; display: flex; flex-direction: column; }

        header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(21, 32, 43, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #38444d; }
        .ads-mini { background: var(--card); padding: 8px; text-align: center; font-size: 11px; color: #8899a6; border-bottom: 1px solid #38444d; }

        #spaces-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 30px; }
        .section-label { color: #8899a6; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .users-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; justify-items: center; margin-top:15px; }
        
        .user-slot { text-align: center; position: relative; width: 80px; transition: 0.3s; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; background: #2f3336; display: flex; align-items: center; justify-content: center; border: 3px solid transparent; position: relative; overflow: hidden; }
        .avatar.speaking { border-color: var(--twitter-blue); box-shadow: 0 0 15px var(--twitter-blue); }
        .avatar i { font-size: 30px; color: #8899a6; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .name { font-size: 12px; margin-top: 8px; font-weight: 500; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .role-tag { font-size: 9px; color: var(--twitter-blue); font-weight: bold; }

        .mic-status { position: absolute; bottom: 5px; right: 5px; background: #fff; color: #000; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid var(--dark); }
        .mic-status.muted { color: #ff3d00; }

        .bottom-dock { background: var(--dark); border-top: 1px solid #38444d; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .request-btn { background: var(--twitter-blue); color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 14px; border: none; cursor: pointer; }
        
        .admin-tools { display: flex; gap: 15px; }
        .tool-icon { width: 45px; height: 45px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1px solid #38444d; cursor: pointer; }
        .tool-icon.end-btn { color: #ff3d00; }

        .swal2-popup { background: var(--card) !important; color: white !important; border-radius: 20px !important; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="leaveSpace()" style="cursor:pointer"></i>
            <span style="font-weight:bold; font-size:18px;">Voice Space</span>
        </div>
        <div id="liveStatus" class="live-tag" style="background:rgba(29, 161, 242, 0.1); color:var(--twitter-blue); padding:4px 12px; border-radius:15px; font-size:12px; font-weight:bold;">
            <i class="fas fa-satellite-dish"></i> LIVE
        </div>
    </header>

    <div class="ads-mini">
        <i class="fas fa-ad"></i> AD: Promote your business to 5,000+ Students!
    </div>

    <div id="spaces-container">
        <div>
            <div class="section-label">Host</div>
            <div class="users-grid" id="host-grid">
                <div class="user-slot">
                    <div class="avatar speaking"><i class="fas fa-user-tie"></i><div class="mic-status"><i class="fas fa-microphone"></i></div></div>
                    <span class="name" id="hostName">Loading...</span>
                    <span class="role-tag">Admin</span>
                </div>
            </div>
        </div>

        <div>
            <div class="section-label">Speakers</div>
            <div class="users-grid" id="speaker-list">
                </div>
        </div>

        <div>
            <div class="section-label">Listeners (<span id="lCount">0</span>)</div>
            <div class="users-grid" id="listener-list">
                </div>
        </div>
    </div>

    <div class="bottom-dock">
        <button class="request-btn" id="reqBtn" onclick="requestToSpeak()">
            <i class="fas fa-hand-paper"></i> Request to Speak
        </button>
        
        <div class="admin-tools">
            <div class="tool-icon" id="micToggle" onclick="toggleLocalMic()"><i class="fas fa-microphone-slash"></i></div>
            <div class="tool-icon" onclick="viewRequests()"><i class="fas fa-users-cog"></i></div>
            <div class="tool-icon end-btn" onclick="leaveSpace()"><i class="fas fa-times"></i></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            databaseURL: "https://cmchat-pro-default-rtdb.firebaseio.com",
            projectId: "cmchat-pro"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const myUid = localStorage.getItem('user_uid') || "USER_" + Date.now();
        const myName = localStorage.getItem('username') || "Dalibi";
        const roomID = "main_academy_space";

        let isSpeaker = false;
        let isMuted = true;

        // Join Room & Set Attendance
        const myRef = db.ref(`audio_spaces/${roomID}/members/${myUid}`);
        myRef.set({ name: myName, role: 'listener', muted: true, active: true });
        myRef.onDisconnect().remove();

        // Sync Space Data
        db.ref(`audio_spaces/${roomID}`).on('value', snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            const members = data.members || {};
            
            document.getElementById('hostName').innerText = data.host || "Instructor";
            
            const speakerDiv = document.getElementById('speaker-list');
            const listenerDiv = document.getElementById('listener-list');
            speakerDiv.innerHTML = "";
            listenerDiv.innerHTML = "";
            
            let lCount = 0;
            Object.keys(members).forEach(id => {
                const m = members[id];
                const html = `
                    <div class="user-slot" onclick="userAction('${id}', '${m.name}', '${m.role}')">
                        <div class="avatar ${!m.muted ? 'speaking' : ''}">
                            <i class="fas fa-user"></i>
                            ${m.role === 'speaker' ? `<div class="mic-status ${m.muted ? 'muted' : ''}"><i class="fas fa-microphone${m.muted ? '-slash' : ''}"></i></div>` : ''}
                        </div>
                        <span class="name">${m.name}</span>
                    </div>`;
                
                if(m.role === 'speaker') {
                    speakerDiv.innerHTML += html;
                } else {
                    lCount++;
                    listenerDiv.innerHTML += html;
                }

                // Check if I was promoted
                if(id === myUid) {
                    isSpeaker = (m.role === 'speaker');
                    updateControls();
                }
            });
            document.getElementById('lCount').innerText = lCount;
        });

        function updateControls() {
            const btn = document.getElementById('reqBtn');
            const mic = document.getElementById('micToggle');
            if(isSpeaker) {
                btn.style.display = "none";
                mic.style.color = isMuted ? "#ff3d00" : "#1DA1F2";
                mic.innerHTML = `<i class="fas fa-microphone${isMuted ? '-slash' : ''}"></i>`;
            } else {
                btn.style.display = "block";
            }
        }

        function requestToSpeak() {
            db.ref(`audio_spaces/${roomID}/requests/${myUid}`).set({ name: myName, time: Date.now() });
            Swal.fire({ title: 'Request Sent', text: 'Wait for Admin approval.', icon: 'success', timer: 2000, showConfirmButton: false });
        }

        function toggleLocalMic() {
            if(!isSpeaker) {
                Swal.fire({ title: 'Access Denied', text: 'You need speaker permission to unmute.', icon: 'info' });
                return;
            }
            isMuted = !isMuted;
            myRef.update({ muted: isMuted });
        }

        function viewRequests() {
            db.ref(`audio_spaces/${roomID}/requests`).once('value', snap => {
                let html = '<div style="text-align:left;">';
                if(!snap.exists()) html += '<p style="text-align:center">No pending requests.</p>';
                snap.forEach(child => {
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#2f3336; padding:10px; border-radius:12px; margin-bottom:8px;">
                            <span>${child.val().name}</span>
                            <button onclick="approveSpeaker('${child.key}', '${child.val().name}')" style="background:var(--twitter-blue); border:none; color:white; padding:6px 12px; border-radius:8px;">Allow</button>
                        </div>`;
                });
                html += '</div>';
                Swal.fire({ title: 'Speaker Requests', html: html, showConfirmButton: false });
            });
        }

        function approveSpeaker(id, name) {
            db.ref(`audio_spaces/${roomID}/members/${id}`).update({ role: 'speaker', muted: true });
            db.ref(`audio_spaces/${roomID}/requests/${id}`).remove();
            Swal.close();
        }

        function userAction(id, name, role) {
            if(myUid === id) return;
            Swal.fire({
                title: name,
                html: `
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        ${role === 'speaker' ? `<button onclick="demoteUser('${id}')" style="padding:12px; background:#ff3d00; color:white; border:none; border-radius:10px;">Mute & Remove Speaker</button>` : ''}
                        <button onclick="Swal.close()" style="padding:12px; background:#2f3336; color:white; border:none; border-radius:10px;">Close View</button>
                    </div>`,
                showConfirmButton: false
            });
        }

        function demoteUser(id) {
            db.ref(`audio_spaces/${roomID}/members/${id}`).update({ role: 'listener', muted: true });
            Swal.close();
        }

        function leaveSpace() {
            myRef.remove().then(() => { history.back(); });
        }
    </script>
</body>
</html>
