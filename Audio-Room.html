<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Academy | Audio Spaces</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1A237E; --twitter-blue: #1DA1F2; --dark: #15202B; --card: #192734; --accent: #FBC02D; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(21, 32, 43, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #38444d; }
        
        .ads-mini { background: var(--card); padding: 8px; text-align: center; font-size: 11px; color: #8899a6; border-bottom: 1px solid #38444d; }

        /* Audio Grid */
        #spaces-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 30px; }
        
        .section-label { color: #8899a6; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .users-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; justify-items: center; }
        
        .user-slot { text-align: center; position: relative; width: 80px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; background: #2f3336; display: flex; align-items: center; justify-content: center; border: 3px solid transparent; transition: 0.3s; position: relative; }
        .avatar.speaking { border-color: var(--twitter-blue); box-shadow: 0 0 15px var(--twitter-blue); }
        .avatar i { font-size: 30px; color: #555; }
        
        .name { font-size: 12px; margin-top: 8px; font-weight: 500; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .role-tag { font-size: 9px; color: var(--twitter-blue); font-weight: bold; }

        .mic-status { position: absolute; bottom: 5px; right: 5px; background: #fff; color: #000; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid var(--dark); }
        .mic-status.muted { color: #ff3d00; }

        /* Control Dock */
        .bottom-dock { background: var(--dark); border-top: 1px solid #38444d; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .request-btn { background: var(--twitter-blue); color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 14px; border: none; cursor: pointer; }
        
        .admin-tools { display: flex; gap: 15px; }
        .tool-icon { width: 45px; height: 45px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1px solid #38444d; cursor: pointer; }
        .tool-icon.end-btn { color: #ff3d00; }

        /* SweetAlert Dark Theme Fix */
        .swal2-popup { background: var(--card) !important; color: white !important; border-radius: 20px !important; }
        .swal2-title { color: white !important; }
        .swal2-html-container { color: #8899a6 !important; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="history.back()" style="cursor:pointer"></i>
            <span style="font-weight:bold; font-size:18px;">Voice Space</span>
        </div>
        <div class="live-tag" style="background:rgba(29, 161, 242, 0.1); color:var(--twitter-blue); padding:4px 12px; border-radius:15px; font-size:12px; font-weight:bold;">
            <i class="fas fa-satellite-dish"></i> LIVE
        </div>
    </header>

    <div class="ads-mini">
        <i class="fas fa-ad"></i> AD: Join CM Academy Pro for exclusive voice lessons!
    </div>

    <div id="spaces-container">
        <div>
            <div class="section-label">Host</div>
            <div class="users-grid" style="margin-top:15px;">
                <div class="user-slot" onclick="adminControl('Hamza Rabiu')">
                    <div class="avatar speaking">
                        <i class="fas fa-user-tie"></i>
                        <div class="mic-status"><i class="fas fa-microphone"></i></div>
                    </div>
                    <span class="name">Hamza Rabiu</span>
                    <span class="role-tag">Admin</span>
                </div>
            </div>
        </div>

        <div>
            <div class="section-label">Speakers</div>
            <div class="users-grid" id="speaker-list" style="margin-top:15px;">
                <div class="user-slot">
                    <div class="avatar">
                        <i class="fas fa-user"></i>
                        <div class="mic-status muted"><i class="fas fa-microphone-slash"></i></div>
                    </div>
                    <span class="name">Student A</span>
                </div>
            </div>
        </div>

        <div>
            <div class="section-label">Listeners</div>
            <div class="users-grid" style="margin-top:15px;">
                <div class="user-slot"><div class="avatar"><i class="fas fa-user"></i></div><span class="name">Dalibi 1</span></div>
                <div class="user-slot"><div class="avatar"><i class="fas fa-user"></i></div><span class="name">Dalibi 2</span></div>
                <div class="user-slot"><div class="avatar"><i class="fas fa-user"></i></div><span class="name">Dalibi 3</span></div>
            </div>
        </div>
    </div>

    <div class="bottom-dock">
        <button class="request-btn" onclick="requestToSpeak()">
            <i class="fas fa-hand-paper"></i> Request to Speak
        </button>
        
        <div class="admin-tools">
            <div class="tool-icon" title="Mute All" onclick="muteAll()"><i class="fas fa-volume-mute"></i></div>
            <div class="tool-icon" title="Settings" onclick="Swal.fire('Settings', 'Audio settings coming soon...', 'info')"><i class="fas fa-cog"></i></div>
            <div class="tool-icon end-btn" title="End Space" onclick="endSpace()"><i class="fas fa-times"></i></div>
        </div>
    </div>

    <script>
        function requestToSpeak() {
            Swal.fire({
                title: 'Request Sent',
                text: 'Your request has been sent to the Teacher. Please wait for approval.',
                icon: 'success',
                confirmButtonColor: '#1DA1F2',
                background: '#192734'
            });
        }

        function muteAll() {
            Swal.fire({
                title: 'Mute Everyone?',
                text: "Do you want to mute all speakers in this space?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff3d00',
                cancelButtonColor: '#38444d',
                confirmButtonText: 'Yes, Mute All'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Muted!',
                        text: 'All speakers have been muted by Admin.',
                        icon: 'success',
                        confirmButtonColor: '#1DA1F2'
                    });
                }
            });
        }

        function endSpace() {
            Swal.fire({
                title: 'End Voice Space?',
                text: "Are you sure you want to close this session permanently?",
                icon: 'error',
                showCancelButton: true,
                confirmButtonColor: '#ff3d00',
                cancelButtonColor: '#38444d',
                confirmButtonText: 'End Session'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "school.html";
                }
            });
        }

        function adminControl(user) {
            Swal.fire({
                title: `Management: ${user}`,
                html: `
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button onclick="Swal.close()" style="padding:12px; background:#2f3336; color:white; border:none; border-radius:10px;">1. Mute Speaker</button>
                        <button onclick="Swal.close()" style="padding:12px; background:#ff3d00; color:white; border:none; border-radius:10px;">2. Remove from Space</button>
                        <button onclick="Swal.close()" style="padding:12px; background:#1DA1F2; color:white; border:none; border-radius:10px;">3. View Profile</button>
                    </div>
                `,
                showConfirmButton: false,
                showCloseButton: true,
                background: '#192734'
            });
        }
    </script>
</body>
</html>
