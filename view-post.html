<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Dashboard | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #0062ff; 
            --primary-gradient: linear-gradient(135deg, #0062ff, #00d2ff);
            --bg: #f8fafc; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #1e293b; padding-bottom: 80px; }

        /* --- MODERN HEADER --- */
        .main-header {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        /* --- FEED --- */
        #feedContainer { max-width: 600px; margin: 0 auto; padding: 12px; }

        .post-card {
            background: white; border-radius: 24px; padding: 16px;
            margin-bottom: 18px; border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .user-meta { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 48px; height: 48px; border-radius: 16px; 
            background: var(--primary-gradient); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 20px; box-shadow: 0 4px 10px rgba(0,98,255,0.2);
        }
        .user-details b { font-size: 15px; color: #1e293b; letter-spacing: -0.2px; }
        .user-details small { font-size: 12px; color: #94a3b8; display: block; margin-top: 1px; }

        .post-text { font-size: 15px; line-height: 1.6; color: #334155; margin-bottom: 12px; white-space: pre-wrap; }

        /* --- MEDIA DISPLAY (1-1-1 Layout) --- */
        .media-stack { display: flex; flex-direction: column; gap: 12px; }
        .media-container { width: 100%; border-radius: 18px; overflow: hidden; background: #f1f5f9; border: 1px solid #f1f5f9; }
        .post-img { width: 100%; height: auto; display: block; object-fit: cover; max-height: 550px; }
        .post-video { width: 100%; border-radius: 18px; background: #000; outline: none; display: block; }

        /* --- ACTIONS --- */
        .post-footer {
            display: flex; justify-content: space-between;
            padding-top: 16px; margin-top: 12px; border-top: 1px solid #f8fafc;
        }
        .action-btn { 
            display: flex; align-items: center; gap: 8px; 
            color: #64748b; font-size: 14px; font-weight: 700; cursor: pointer;
            transition: 0.2s; padding: 8px 12px; border-radius: 12px;
        }
        .action-btn:active { background: #f1f5f9; transform: scale(0.95); }
        .action-btn i { font-size: 18px; }
        .like-active { color: #ef4444; }

        .delete-icon { color: #cbd5e1; cursor: pointer; padding: 8px; transition: 0.2s; border-radius: 50%; }
        .delete-icon:hover { color: #ef4444; background: #fef2f2; }

        /* --- FLOATING ADD BUTTON --- */
        .fab {
            position: fixed; bottom: 30px; right: 25px;
            width: 60px; height: 60px; border-radius: 20px;
            background: var(--primary-gradient); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 10px 25px rgba(0, 98, 255, 0.4);
            cursor: pointer; z-index: 100; transition: 0.3s;
        }
        .fab:active { transform: rotate(90deg) scale(0.9); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">CMchat <span style="color:#1e293b">PRO</span></div>
        <div style="font-size: 20px; color: #64748b;"><i class="fas fa-search"></i></div>
    </header>

    <div id="feedContainer">
        </div>

    <div class="fab" onclick="window.location.href='upload.html'">
        <i class="fas fa-plus"></i>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            projectId: "cmchat-pro"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Live Feed Listener (Babban Sirrin Live Update)
        db.collection('posts').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const container = document.getElementById('feedContainer');
            
            if (snapshot.empty) {
                container.innerHTML = `<div style="text-align:center; margin-top:100px; color:#94a3b8;">
                    <i class="fas fa-stream" style="font-size:40px; margin-bottom:10px;"></i>
                    <p>No elite posts yet, Commander.</p>
                </div>`;
                return;
            }

            container.innerHTML = '';
            snapshot.forEach(doc => {
                renderPost(doc.id, doc.data());
            });
        }, error => {
            console.error("Snapshot error:", error);
        });

        // 2. Render Post Function
        function renderPost(id, data) {
            const container = document.getElementById('feedContainer');
            
            // GYARA: Handle Base64 Media Rendering
            let mediaHtml = '';
            if (data.media && data.media.length > 0) {
                mediaHtml = '<div class="media-stack">';
                data.media.forEach(m => {
                    // Muna amfani da m.data domin karanta asalin hoton daga Firestore
                    const source = m.url || m.data; 
                    if (m.type === 'image') {
                        mediaHtml += `<div class="media-container"><img src="${source}" class="post-img" loading="lazy"></div>`;
                    } else if (m.type === 'video') {
                        mediaHtml += `<div class="media-container"><video controls class="post-video"><source src="${source}"></video></div>`;
                    }
                });
                mediaHtml += '</div>';
            }

            const postCard = `
                <div class="post-card" id="post-${id}">
                    <div class="post-header">
                        <div class="user-meta">
                            <div class="avatar">${(data.username || 'C')[0]}</div>
                            <div class="user-details">
                                <b>${data.username || 'Commander CM'}</b>
                                <small>${data.timestamp ? timeSince(data.timestamp.toDate()) : 'publishing...'}</small>
                            </div>
                        </div>
                        <i class="fas fa-trash-alt delete-icon" onclick="deletePost('${id}')"></i>
                    </div>

                    <div class="post-text">${data.text || ''}</div>
                    ${mediaHtml}

                    <div class="post-footer">
                        <div class="action-btn" onclick="handleLike('${id}', ${data.likes || 0})">
                            <i class="far fa-heart"></i> <span>${data.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="Swal.fire('Coming Soon', 'Comments feature is under development.', 'info')">
                            <i class="far fa-comment"></i> <span>${data.comments || 0}</span>
                        </div>
                        <div class="action-btn" onclick="sharePost('${data.text}', '${id}')">
                            <i class="far fa-paper-plane"></i>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += postCard;
        }

        // 3. Live Actions
        async function handleLike(id, currentLikes) {
            try {
                // Update Firestore live
                await db.collection('posts').doc(id).update({
                    likes: (currentLikes || 0) + 1
                });
            } catch (e) { console.error("Like failed", e); }
        }

        async function deletePost(id) {
            const result = await Swal.fire({
                title: 'Delete Elite Post?',
                text: "Commander, this action cannot be undone!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Yes, Delete',
                cancelButtonText: 'Cancel'
            });

            if (result.isConfirmed) {
                try {
                    await db.collection('posts').doc(id).delete();
                    Swal.fire({ icon: 'success', title: 'Deleted', timer: 1000, showConfirmButton: false });
                } catch (err) {
                    Swal.fire('Error', 'Failed to delete post.', 'error');
                }
            }
        }

        function sharePost(text, id) {
            const shareData = {
                title: 'CMchat Pro',
                text: text || 'Check out this post on CMchat Pro!',
                url: window.location.href + '#post-' + id
            };
            if (navigator.share) {
                navigator.share(shareData);
            } else {
                Swal.fire('Link Copied', 'Post link copied to clipboard!', 'success');
            }
        }

        function timeSince(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "m ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "min ago";
            return "just now";
        }
    </script>
</body>
</html>
