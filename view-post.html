<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Dashboard | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0062ff; --bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: #ffffff; overflow-x: hidden; }

        /* --- HEADER --- */
        .main-header {
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000;
            border-bottom: 0.5px solid #1e293b;
        }
        .header-actions { display: flex; gap: 20px; align-items: center; }
        .upload-icon { color: var(--primary); font-size: 22px; cursor: pointer; }

        #feedContainer { width: 100%; max-width: 600px; margin: 0 auto; }

        /* --- POST CARD --- */
        .post-card {
            background: #000; width: 100% !important;
            margin-bottom: 15px !important; border: none !important;
        }

        .post-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
        .user-details b { font-size: 14px; color: #fff; }
        .user-details small { font-size: 11px; color: #64748b; display: block; }

        .post-text { font-size: 15px; padding: 0 15px 12px 15px; color: #f8fafc; line-height: 1.4; }

        /* --- MEDIA GYARARRE (NO PLAY ICON) --- */
        .media-stack { width: 100% !important; }
        .media-container { width: 100% !important; background: #000 !important; position: relative; margin: 0 !important; padding: 0 !important; }
        .post-img, .post-video { 
            width: 100% !important; 
            display: block !important; 
            border-radius: 0 !important; 
            border: none !important;
            max-height: 85vh; 
            object-fit: contain;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* CIRE PLAY BUTTON NA TSAKIYA A BROWSER */
        video::-webkit-media-controls-start-playback-button { display: none !important; -webkit-appearance: none; }
        video::-webkit-media-controls-panel { background-image: none !important; }

        .post-footer { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 0.5px solid #1e293b; }
        .action-btn { color: #94a3b8; font-size: 13px; display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .action-btn i { font-size: 20px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div style="font-weight: 800; font-size: 22px; color: var(--primary); letter-spacing: -1px;">CMchat <span style="color:#fff">PRO</span></div>
        <div class="header-actions">
            <i class="fas fa-plus-square upload-icon" onclick="window.location.href='upload.html'"></i>
            <i class="fas fa-search" style="color:#64748b; font-size: 20px;"></i>
        </div>
    </header>

    <div id="feedContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- AUTO-STOP LOGIC (INTERSECTION OBSERVER) ---
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                // Idan videon ya fita daga screen da kashi 50%
                if (!entry.isIntersecting || entry.intersectionRatio < 0.5) {
                    const video = entry.target;
                    if (video.tagName === 'VIDEO' && !video.paused) {
                        video.pause();
                        video.controls = false; // Boye controls idan ya tsaya
                    }
                }
            });
        }, { threshold: [0, 0.5] });

        function observeVideos() {
            document.querySelectorAll('.post-video').forEach(v => videoObserver.observe(v));
        }

        db.collection('posts').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';
            snapshot.forEach(doc => renderPost(doc.id, doc.data()));
            observeVideos(); // Kunna observer bayan lodi
        });

        function renderPost(id, data) {
            const container = document.getElementById('feedContainer');
            let mediaHtml = '';

            if (data.media && data.media.length > 0) {
                mediaHtml = '<div class="media-stack">';
                data.media.forEach(m => {
                    const source = m.url;
                    if (m.type === 'image') {
                        mediaHtml += `<div class="media-container"><img src="${source}" class="post-img"></div>`;
                    } else if (m.type === 'video') {
                        const posterUrl = source.replace(/\.[^/.]+$/, ".jpg");
                        // SMART CLICK: Play/Pause ba tare da middle icon ba
                        mediaHtml += `
                            <div class="media-container">
                                <video class="post-video" 
                                       poster="${posterUrl}" 
                                       preload="metadata"
                                       onclick="this.paused ? (this.play(), this.controls=true) : (this.pause(), this.controls=false)">
                                    <source src="${source}" type="video/mp4">
                                </video>
                            </div>`;
                    }
                });
                mediaHtml += '</div>';
            }

            container.innerHTML += `
                <div class="post-card">
                    <div class="post-header">
                        <div class="user-meta">
                            <div class="avatar">${(data.username || 'C')[0]}</div>
                            <div class="user-details">
                                <b>${data.username || 'Commander CM'}</b>
                                <small>${data.timestamp ? timeSince(data.timestamp.toDate()) : 'now'}</small>
                            </div>
                        </div>
                        <i class="fas fa-ellipsis-v" style="color:#475569; font-size: 14px;"></i>
                    </div>
                    ${data.text ? `<div class="post-text">${data.text}</div>` : ''}
                    ${mediaHtml}
                    <div class="post-footer">
                        <div class="action-btn"><i class="far fa-heart"></i> ${data.likes || 0}</div>
                        <div class="action-btn"><i class="far fa-comment"></i> ${data.comments || 0}</div>
                        <div class="action-btn"><i class="far fa-paper-plane"></i></div>
                    </div>
                </div>`;
        }

        function timeSince(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "just now";
            if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
            if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
            return Math.floor(seconds/86400) + "d ago";
        }
    </script>
</body>
</html>
