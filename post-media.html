<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Elite Post | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #0062ff; --bg: #0f172a; --card: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; transition: opacity 0.3s ease; }

        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .post-btn { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 98, 255, 0.3); }
        .post-btn:disabled { opacity: 0.3; transform: scale(0.95); }

        .content { padding: 20px; overflow-y: auto; height: calc(100vh - 140px); }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 18px; outline: none; resize: none; min-height: 120px; line-height: 1.6; font-weight: 400; }

        #mediaPreview { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .preview-item { width: 100%; border-radius: 18px; overflow: hidden; background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .preview-item img, .preview-item video { width: 100%; display: block; max-height: 400px; object-fit: cover; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); padding: 15px 10px 25px; border-radius: 30px 30px 0 0; display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .tool { text-align: center; color: #94a3b8; font-size: 11px; cursor: pointer; font-weight: 600; }
        .tool i { display: block; font-size: 22px; margin-bottom: 5px; color: #38bdf8; }

        /* Animation don Instant Exit */
        .fade-out { opacity: 0; transform: scale(0.98); pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-times" style="font-size: 20px; color: #94a3b8;" onclick="history.back()"></i>
        <b style="font-size: 17px; font-weight: 800; letter-spacing: -0.5px;">Create Elite Post</b>
        <button class="post-btn" id="submitBtn" disabled onclick="uploadPost()">Share</button>
    </div>

    <div class="content" id="mainContent">
        <textarea id="postText" placeholder="What's on your elite mind, Commander?" oninput="checkInput()"></textarea>
        <div id="mediaPreview"></div>
    </div>

    <div class="bottom-nav">
        <label class="tool">
            <i class="fas fa-image"></i>Photo
            <input type="file" id="imageInput" hidden accept="image/*" multiple onchange="handleFiles(this, 'image')">
        </label>
        <label class="tool">
            <i class="fas fa-play-circle"></i>Video
            <input type="file" id="videoInput" hidden accept="video/*" onchange="handleFiles(this, 'video')">
        </label>
        <div class="tool"><i class="fas fa-at"></i>Tag</div>
        <div class="tool" onclick="history.back()"><i class="fas fa-times-circle" style="color: #64748b;"></i>Cancel</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const CLOUD_NAME = "dyfyhzp3o"; 
        const UPLOAD_PRESET = "cmchat_pro"; 

        let selectedFiles = [];

        function checkInput() {
            const text = document.getElementById('postText').value.trim();
            document.getElementById('submitBtn').disabled = !(text || selectedFiles.length > 0);
        }

        function handleFiles(input, type) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const fileId = Math.random().toString(36).substr(2, 9);
                selectedFiles.push({ id: fileId, file: file, type: type });
                const reader = new FileReader();
                reader.onload = (e) => renderPreview(fileId, e.target.result, type);
                reader.readAsDataURL(file);
            });
            checkInput();
            input.value = '';
        }

        function renderPreview(id, src, type) {
            const container = document.getElementById('mediaPreview');
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = type === 'image' ? `<img src="${src}">` : `<video src="${src}" muted></video>`;
            container.appendChild(div);
        }

        async function uploadPost() {
            const text = document.getElementById('postText').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            // --- INSTANT ACTION ---
            // Maimakon jira, shafin zai bace yanzu ya nuna Dashboard
            document.body.classList.add('fade-out');
            
            // Wannan zai sa mutum ya koma Dashboard nan take ba tare da jiran upload ba
            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 300);

            // Aikin Upload zai ci gaba a Background (Asynchronous)
            try {
                const uploadedUrls = [];
                for (let item of selectedFiles) {
                    const formData = new FormData();
                    formData.append('file', item.file);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    
                    // SIRRIN RAGE DATA: Muna gayawa Cloudinary ya yi auto-compression
                    formData.append('folder', 'elite_posts');
                    formData.append('quality', 'auto:eco'); 
                    formData.append('fetch_format', 'auto');

                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (data.secure_url) {
                        uploadedUrls.push({ url: data.secure_url, type: item.type });
                    }
                }

                await db.collection('posts').add({
                    text: text,
                    media: uploadedUrls,
                    username: localStorage.getItem('username') || "Commander CM",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    comments: 0
                });
            } catch (err) {
                console.error("Background Upload Failed:", err);
            }
        }
    </script>
</body>
</html>
