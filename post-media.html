<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Post Engine | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #007AFF; 
            --accent: #30D5C8;
            --bg: #0b0f1a; 
            --card: #161b2a; 
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            padding: 18px 24px; 
            align-items: center; 
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }

        .close-icon { font-size: 22px; color: var(--text-dim); cursor: pointer; }

        .post-btn { 
            background: linear-gradient(135deg, var(--primary), #0051ff);
            color: white; border: none; padding: 10px 24px; border-radius: 100px; 
            font-weight: 700; font-size: 15px; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .post-btn:disabled { 
            background: #2e3648; color: #64748b; box-shadow: none; opacity: 0.5; 
        }

        .content { flex: 1; padding: 24px; overflow-y: auto; scrollbar-width: none; }

        .user-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar-placeholder { 
            width: 42px; height: 42px; border-radius: 50%; 
            background: linear-gradient(45deg, var(--primary), var(--accent)); 
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; 
        }

        textarea { 
            width: 100%; background: transparent; border: none; color: var(--text-main); 
            font-size: 20px; font-weight: 500; outline: none; resize: none; min-height: 120px; line-height: 1.5; 
        }

        #mediaPreview { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-top: 20px; 
        }

        .preview-item { 
            position: relative; border-radius: 16px; overflow: hidden; aspect-ratio: 1/1;
            border: 1px solid rgba(255,255,255,0.1);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }

        .bottom-tools { 
            background: rgba(22, 27, 42, 0.9);
            backdrop-filter: blur(15px);
            padding: 12px 24px; display: flex; gap: 25px; 
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .tool-btn {
            display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; border-radius: 14px;
            background: rgba(255,255,255,0.03); color: var(--primary); font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-xmark close-icon" onclick="window.parent.closePostEngine()"></i>
        <b style="font-size: 18px; letter-spacing: -0.5px;">Elite Post</b>
        <button class="post-btn" id="submitBtn" disabled onclick="processUpload()">Post</button>
    </div>

    <div class="content">
        <div class="user-meta">
            <div class="avatar-placeholder" id="userInitial">C</div>
            <span style="font-weight: 600; font-size: 15px; color: var(--text-dim);">Everyone can reply</span>
        </div>
        
        <textarea id="postText" placeholder="What's happening, Commander?" oninput="checkInput()"></textarea>
        
        <div id="mediaPreview"></div>
    </div>

    <div class="bottom-tools">
        <label class="tool-btn"><i class="fa-regular fa-image"></i><input type="file" hidden accept="image/*" multiple onchange="handleFiles(this, 'image')"></label>
        <label class="tool-btn"><i class="fa-regular fa-circle-play" style="color: #10b981;"></i><input type="file" hidden accept="video/*" onchange="handleFiles(this, 'video')"></label>
        <div class="tool-btn"><i class="fa-solid fa-location-dot" style="color: #ef4444;"></i></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const CLOUD_NAME = "dyfyhzp3o"; 
        const UPLOAD_PRESET = "cmchat_pro"; 
        let selectedFiles = [];

        function checkInput() {
            const text = document.getElementById('postText').value.trim();
            document.getElementById('submitBtn').disabled = !(text || selectedFiles.length > 0);
        }

        function handleFiles(input, type) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const objectUrl = URL.createObjectURL(file);
                selectedFiles.push({ file: file, type: type });
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = type === 'image' ? `<img src="${objectUrl}">` : `<video src="${objectUrl}" muted autoplay loop></video>`;
                document.getElementById('mediaPreview').appendChild(div);
            });
            checkInput();
        }

        async function processUpload() {
            const text = document.getElementById('postText').value.trim();
            const username = localStorage.getItem('username') || "Commander CM";
            if(window.parent && window.parent.closePostEngine) window.parent.closePostEngine();
            if(window.parent.showUploadProgress) window.parent.showUploadProgress(5);
            runBackgroundUpload(text, username, [...selectedFiles]);
        }

        function runBackgroundUpload(text, username, filesToUpload) {
            const uploadedMedia = [];
            let currentFileIndex = 0;

            const uploadNext = async () => {
                if (currentFileIndex >= filesToUpload.length) {
                    saveToFirebase(text, username, uploadedMedia);
                    return;
                }

                const item = filesToUpload[currentFileIndex];
                
                if (item.type === 'video') {
                    // Chunked Video Upload (Domin kar ya yanke)
                    uploadVideoInChunks(item.file, (url) => {
                        uploadedMedia.push({ url: url, type: 'video' });
                        currentFileIndex++;
                        uploadNext();
                    });
                } else {
                    // Standard Image Upload
                    const formData = new FormData();
                    formData.append('file', item.file);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, true);
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            if(window.parent.updateUploadProgress) window.parent.updateUploadProgress(percent);
                        }
                    };
                    xhr.onload = () => {
                        const data = JSON.parse(xhr.responseText);
                        if (data.secure_url) {
                            uploadedMedia.push({ url: data.secure_url, type: 'image' });
                            currentFileIndex++;
                            uploadNext();
                        }
                    };
                    xhr.send(formData);
                }
            };
            uploadNext();
        }

        function uploadVideoInChunks(file, callback) {
            const chunkSize = 6000000; // 6MB guntu-guntu
            const totalChunks = Math.ceil(file.size / chunkSize);
            const uniqueUploadId = 'uk_' + Date.now();
            let currentChunk = 0;

            const uploadChunk = () => {
                const start = currentChunk * chunkSize;
                const end = Math.min(start + chunkSize, file.size);
                const chunk = file.slice(start, end);
                const formData = new FormData();
                formData.append('file', chunk);
                formData.append('upload_preset', UPLOAD_PRESET);
                
                const contentRange = `bytes ${start}-${end - 1}/${file.size}`;
                const xhr = new XMLHttpRequest();
                xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, true);
                xhr.setRequestHeader('X-Unique-Upload-Id', uniqueUploadId);
                xhr.setRequestHeader('Content-Range', contentRange);

                xhr.upload.onprogress = (e) => {
                    const overallPercent = Math.round(((start + e.loaded) / file.size) * 100);
                    if(window.parent.updateUploadProgress) window.parent.updateUploadProgress(overallPercent);
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        currentChunk++;
                        if (currentChunk < totalChunks) {
                            uploadChunk();
                        } else {
                            const data = JSON.parse(xhr.responseText);
                            callback(data.secure_url);
                        }
                    } else {
                        alert("Video upload failed. Check connection.");
                    }
                };
                xhr.send(formData);
            };
            uploadChunk();
        }

        async function saveToFirebase(text, username, media) {
            await db.collection('posts').add({
                text: text,
                username: username,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0,
                comments: 0,
                media: media
            });
            if(window.parent.hideUploadProgress) window.parent.hideUploadProgress();
            if(window.parent) window.parent.location.reload();
        }
    </script>
</body>
</html>
