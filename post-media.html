<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Elite Post | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #0062ff; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid #1e293b; }
        .post-btn { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .post-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .content { padding: 20px; overflow-y: auto; height: calc(100vh - 150px); }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 18px; outline: none; resize: none; min-height: 100px; }

        #mediaPreview { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; padding-bottom: 100px; }
        .preview-item { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 1px solid #334155; background: #1e293b; }
        .preview-item img, .preview-item video { width: 100%; display: block; max-height: 400px; object-fit: cover; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: rgba(239, 68, 68, 0.9); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; padding: 20px; border-radius: 25px 25px 0 0; display: flex; justify-content: space-around; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        .tool { text-align: center; color: #94a3b8; font-size: 12px; cursor: pointer; }
        .tool i { display: block; font-size: 22px; margin-bottom: 5px; color: #38bdf8; }

        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="overlay" id="loadingOverlay">
        <div class="loader"></div>
        <p id="uploadStatus" style="margin-top: 15px; font-weight: 600; letter-spacing: 1px;">PREPARING FILES...</p>
    </div>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <b style="font-size: 18px;">Create Post</b>
        <button class="post-btn" id="submitBtn" disabled onclick="uploadPost()">Share</button>
    </div>

    <div class="content">
        <textarea id="postText" placeholder="What's on your elite mind, Commander?" oninput="checkInput()"></textarea>
        <div id="mediaPreview"></div>
    </div>

    <div class="bottom-nav">
        <label class="tool">
            <i class="fas fa-camera"></i>Photo
            <input type="file" id="imageInput" hidden accept="image/*" multiple onchange="handleFiles(this, 'image')">
        </label>
        <label class="tool">
            <i class="fas fa-video"></i>Video
            <input type="file" id="videoInput" hidden accept="video/*" onchange="handleFiles(this, 'video')">
        </label>
        <div class="tool"><i class="fas fa-user-tag"></i>Tag</div>
        <div class="tool"><i class="fas fa-map-marker-alt"></i>Check-in</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <script>
        // ANA BUKATAR KA SAKA STORAGE BUCKET A NAN
        const firebaseConfig = { 
            apiKey: "AIzaSy...", 
            projectId: "cmchat-pro",
            storageBucket: "cmchat-pro.appspot.com" // KOPIYA DAGA FIREBASE CONSOLE
        }; 
        firebase.initializeApp(firebaseConfig);
        
        const db = firebase.firestore();
        const storage = firebase.storage();

        let selectedFiles = []; // Wannan zai dauki asalin File objects din

        function checkInput() {
            const text = document.getElementById('postText').value.trim();
            document.getElementById('submitBtn').disabled = !(text || selectedFiles.length > 0);
        }

        function handleFiles(input, type) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const fileId = Math.random().toString(36).substr(2, 9);
                
                // Muna adana File din kansa don upload, ba rubutu ba
                selectedFiles.push({ id: fileId, file: file, type: type });

                // Preview kawai muke yi da FileReader
                const reader = new FileReader();
                reader.onload = (e) => {
                    renderPreview(fileId, e.target.result, type);
                };
                reader.readAsDataURL(file);
            });
            checkInput();
            input.value = ''; // Reset input
        }

        function renderPreview(id, src, type) {
            const container = document.getElementById('mediaPreview');
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.id = `preview-${id}`;
            div.innerHTML = `
                <div class="remove-btn" onclick="removeMedia('${id}')"><i class="fas fa-times"></i></div>
                ${type === 'image' ? `<img src="${src}">` : `<video src="${src}" controls></video>`}
            `;
            container.appendChild(div);
        }

        function removeMedia(id) {
            selectedFiles = selectedFiles.filter(m => m.id !== id);
            document.getElementById(`preview-${id}`).remove();
            checkInput();
        }

        async function uploadPost() {
            const text = document.getElementById('postText').value.trim();
            const overlay = document.getElementById('loadingOverlay');
            const statusText = document.getElementById('uploadStatus');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            overlay.style.display = 'flex';
            
            const uploadedUrls = [];

            try {
                // STAGE 1: Tura Media zuwa Storage
                for (let i = 0; i < selectedFiles.length; i++) {
                    const item = selectedFiles[i];
                    statusText.innerText = `UPLOADING MEDIA ${i+1}/${selectedFiles.length}...`;
                    
                    const storageRef = storage.ref(`posts/${Date.now()}_${item.file.name}`);
                    const uploadTask = await storageRef.put(item.file);
                    const downloadUrl = await uploadTask.ref.getDownloadURL();
                    
                    uploadedUrls.push({ url: downloadUrl, type: item.type });
                }

                // STAGE 2: Tura Bayanan zuwa Firestore
                statusText.innerText = "FINALIZING POST...";
                await db.collection('posts').add({
                    text: text,
                    media: uploadedUrls, // Yanzu URLs ne, ba Base64 ba
                    username: "Commander CM",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    comments: 0
                });

                Swal.fire({
                    icon: 'success',
                    title: 'Posted!',
                    showConfirmButton: false,
                    timer: 1500
                });

                setTimeout(() => {
                    window.location.href = 'Dashboard.html';
                }, 1600);

            } catch (err) {
                overlay.style.display = 'none';
                submitBtn.disabled = false;
                console.error(err);
                Swal.fire('Error', 'An samu matsala wajen tura aikin nan.', 'error');
            }
        }
    </script>
</body>
</html>
