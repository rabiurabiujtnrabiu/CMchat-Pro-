<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Elite Post | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #0062ff; --bg: #0f172a; --card: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; transition: opacity 0.4s ease; }

        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid #1e293b; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .post-btn { background: var(--primary); color: white; border: none; padding: 8px 22px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .post-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .content { padding: 20px; overflow-y: auto; height: calc(100vh - 140px); padding-bottom: 100px; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 19px; outline: none; resize: none; min-height: 150px; line-height: 1.5; }

        /* PREVIEW GYARARRE: An cire jan cancel button */
        #mediaPreview { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .preview-item { position: relative; width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid #334155; background: var(--card); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .preview-item img, .preview-item video { width: 100%; display: block; max-height: 450px; object-fit: cover; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 18px; border-radius: 30px 30px 0 0; display: flex; justify-content: space-around; box-shadow: 0 -10px 30px rgba(0,0,0,0.4); z-index: 100; }
        .tool { text-align: center; color: #94a3b8; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .tool i { display: block; font-size: 24px; margin-bottom: 6px; color: #38bdf8; }

        .upload-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--primary); width: 0%; transition: 0.3s; z-index: 1000; }
        
        /* Boye shafin bayan danna Share */
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="upload-bar" id="progressBar"></div>

    <div class="header">
        <i class="fas fa-times" style="font-size: 20px;" onclick="history.back()"></i>
        <b style="font-size: 18px; letter-spacing: -0.5px;">New Elite Post</b>
        <button class="post-btn" id="submitBtn" disabled onclick="uploadPost()">Share</button>
    </div>

    <div class="content" id="mainContent">
        <textarea id="postText" placeholder="What's on your elite mind, Commander?" oninput="checkInput()"></textarea>
        <div id="mediaPreview"></div>
    </div>

    <div class="bottom-nav">
        <label class="tool">
            <i class="fas fa-image"></i>Photo
            <input type="file" id="imageInput" hidden accept="image/*" multiple onchange="handleFiles(this, 'image')">
        </label>
        <label class="tool">
            <i class="fas fa-play-circle"></i>Video
            <input type="file" id="videoInput" hidden accept="video/*" onchange="handleFiles(this, 'video')">
        </label>
        <div class="tool"><i class="fas fa-at"></i>Tag</div>
        <div class="tool"><i class="fas fa-location-arrow"></i>Place</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const CLOUD_NAME = "dyfyhzp3o"; 
        const UPLOAD_PRESET = "cmchat_pro"; 

        let selectedFiles = [];

        function checkInput() {
            const text = document.getElementById('postText').value.trim();
            document.getElementById('submitBtn').disabled = !(text || selectedFiles.length > 0);
        }

        function handleFiles(input, type) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const fileId = Math.random().toString(36).substr(2, 9);
                selectedFiles.push({ id: fileId, file: file, type: type });
                const reader = new FileReader();
                reader.onload = (e) => renderPreview(fileId, e.target.result, type);
                reader.readAsDataURL(file);
            });
            checkInput();
            input.value = '';
        }

        function renderPreview(id, src, type) {
            const container = document.getElementById('mediaPreview');
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.id = `preview-${id}`;
            // An cire autoplay da muted don cire sakon "Use mobile data"
            div.innerHTML = type === 'image' ? `<img src="${src}">` : `<video src="${src}"></video>`;
            container.appendChild(div);
        }

        async function uploadPost() {
            const text = document.getElementById('postText').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const progressBar = document.getElementById('progressBar');

            // GYARA 3: Instant Redirect Feel
            document.body.classList.add('fade-out'); // Shafin zai bace nan take
            
            const uploadedUrls = [];

            try {
                for (let i = 0; i < selectedFiles.length; i++) {
                    const item = selectedFiles[i];
                    const formData = new FormData();
                    formData.append('file', item.file);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    formData.append('quality', 'auto:eco');

                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (data.secure_url) {
                        uploadedUrls.push({ url: data.secure_url, type: item.type });
                    }
                }

                await db.collection('posts').add({
                    text: text,
                    media: uploadedUrls,
                    username: "Commander CM",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    comments: 0
                });

                // Bayan komai ya gama, sai a wuce Dashboard
                window.location.href = 'Dashboard.html';

            } catch (err) {
                document.body.classList.remove('fade-out');
                submitBtn.disabled = false;
                Swal.fire('Error', 'Check your connection.', 'error');
            }
        }
    </script>
</body>
</html>
