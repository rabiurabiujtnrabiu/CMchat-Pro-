<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Post Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007AFF; --bg: #0b0f1a; --card: #161b2a; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .post-btn { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .post-btn:disabled { opacity: 0.4; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 18px; outline: none; resize: none; min-height: 80px; }
        #mediaPreview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .preview-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; background: #1c2237; border: 1px solid rgba(255,255,255,0.1); }
        .preview-item img, .preview-item video { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; }
        .remove-media { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; z-index: 20; }
        .bottom-tools { background: var(--card); padding: 15px 20px; display: flex; gap: 20px; padding-bottom: env(safe-area-inset-bottom, 20px); }
        .tool-btn { font-size: 24px; color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-times" onclick="window.parent.closePostEngine()"></i>
        <b>Elite Post</b>
        <button class="post-btn" id="submitBtn" disabled onclick="processUpload()">Post</button>
    </div>
    <div class="content">
        <textarea id="postText" placeholder="Me kake tunani?"></textarea>
        <div id="mediaPreview"></div>
    </div>
    <div class="bottom-tools">
        <label class="tool-btn">
            <i class="fa-regular fa-image"></i>
            <input type="file" id="imageInput" hidden accept="image/*" multiple onchange="handleFiles(this, 'image')">
        </label>
        <label class="tool-btn">
            <i class="fa-regular fa-circle-play" style="color: #10b981;"></i>
            <input type="file" id="videoInput" hidden accept="video/*" onchange="handleFiles(this, 'video')">
        </label>
    </div>
    <script>
        let selectedFiles = [];
        function checkInput() {
            const text = document.getElementById('postText').value.trim();
            document.getElementById('submitBtn').disabled = !(text || selectedFiles.length > 0);
        }
        function handleFiles(input, type) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const fileId = Math.random().toString(36).substr(2, 9);
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataUrl = e.target.result;
                    selectedFiles.push({ id: fileId, file: file, type: type });
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.id = `media-${fileId}`;
                    div.innerHTML = type === 'image' 
                        ? `<div class="remove-media" onclick="removeMedia('${fileId}')">✕</div><img src="${dataUrl}">`
                        : `<div class="remove-media" onclick="removeMedia('${fileId}')">✕</div><video src="${dataUrl}" muted autoplay loop playsinline></video>`;
                    document.getElementById('mediaPreview').appendChild(div);
                    checkInput();
                };
                reader.readAsDataURL(file);
            });
            input.value = ''; 
        }
        function removeMedia(id) {
            selectedFiles = selectedFiles.filter(f => f.id !== id);
            const el = document.getElementById(`media-${id}`);
            if(el) el.remove();
            checkInput();
        }
        function processUpload() {
            const text = document.getElementById('postText').value.trim();
            const username = localStorage.getItem('username') || "User";
            if (window.parent && window.parent.startGlobalUpload) {
                window.parent.startGlobalUpload(text, username, selectedFiles);
                window.parent.closePostEngine();
            }
        }
        document.getElementById('postText').addEventListener('input', checkInput);
    </script>
</body>
</html>
