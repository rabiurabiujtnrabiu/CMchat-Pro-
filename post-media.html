<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Post Engine | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #0062ff; --bg: #0f172a; --card: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow-y: auto; padding-bottom: 80px; }

        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .post-btn { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .post-btn:disabled { opacity: 0.3; }

        .content { padding: 20px; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 18px; outline: none; resize: none; min-height: 150px; line-height: 1.6; }

        #mediaPreview { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .preview-item { width: 100%; border-radius: 18px; overflow: hidden; background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .preview-item img, .preview-item video { width: 100%; display: block; max-height: 350px; object-fit: cover; }

        .bottom-tools { position: fixed; bottom: 0; width: 100%; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); padding: 15px; display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .tool-icon { font-size: 24px; color: #38bdf8; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-times" style="font-size: 20px; color: #94a3b8;" onclick="window.parent.closePostEngine()"></i>
        <b style="font-size: 17px; font-weight: 800;">Create Elite Post</b>
        <button class="post-btn" id="submitBtn" disabled onclick="processUpload()">Share</button>
    </div>

    <div class="content">
        <textarea id="postText" placeholder="What's on your elite mind, Commander?" oninput="checkInput()"></textarea>
        <div id="mediaPreview"></div>
    </div>

    <div class="bottom-tools">
        <label><i class="fas fa-image tool-icon"></i><input type="file" hidden accept="image/*" multiple onchange="handleFiles(this, 'image')"></label>
        <label><i class="fas fa-play-circle tool-icon" style="color: #10b981;"></i><input type="file" hidden accept="video/*" onchange="handleFiles(this, 'video')"></label>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY", projectId: "cmchat-pro" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const CLOUD_NAME = "dyfyhzp3o"; 
        const UPLOAD_PRESET = "cmchat_pro"; 
        let selectedFiles = [];

        function checkInput() {
            const text = document.getElementById('postText').value.trim();
            document.getElementById('submitBtn').disabled = !(text || selectedFiles.length > 0);
        }

        function handleFiles(input, type) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const objectUrl = URL.createObjectURL(file);
                selectedFiles.push({ file: file, type: type, previewUrl: objectUrl });
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = type === 'image' ? `<img src="${objectUrl}">` : `<video src="${objectUrl}" muted autoplay loop></video>`;
                document.getElementById('mediaPreview').appendChild(div);
            });
            checkInput();
        }

        async function processUpload() {
            const text = document.getElementById('postText').value.trim();
            
            Swal.fire({
                title: 'Syncing Elite Post',
                text: 'Please wait while we optimize your media...',
                allowOutsideClick: false,
                showConfirmButton: false,
                willOpen: () => { Swal.showLoading(); }
            });

            try {
                const uploadedMedia = [];
                for (let item of selectedFiles) {
                    const formData = new FormData();
                    formData.append('file', item.file);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    formData.append('quality', '60'); // High speed compression
                    formData.append('fetch_format', 'auto');

                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (data.secure_url) uploadedMedia.push({ url: data.secure_url, type: item.type });
                }

                await db.collection('posts').add({
                    text: text,
                    username: localStorage.getItem('username') || "Commander CM",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    comments: 0,
                    media: uploadedMedia
                });

                // --- SUCCESS INTERACTION ---
                // 1. Gaya wa Dashboard ya rufe modal din
                window.parent.closePostEngine();
                
                // 2. Refresh Dashboard domin ganin sabon post
                window.parent.location.reload();

            } catch (err) {
                Swal.fire('Error', 'Upload failed. Check connection.', 'error');
            }
        }
    </script>
</body>
</html>
