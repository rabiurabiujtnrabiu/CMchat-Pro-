<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - CMchat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #1c1e21; }

        .post-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; border-bottom: 1px solid #ddd;
            position: sticky; top: 0; background: white; z-Dashboard: 100;
        }
        .header-title { font-size: 18px; font-weight: 700; }
        .post-button {
            background: var(--primary); color: white; border: none;
            padding: 8px 22px; border-radius: 8px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .post-button:disabled { background: #e4e6eb; color: #bcc0c4; }

        .user-section { display: flex; align-items: center; gap: 12px; padding: 15px 20px; background: white; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #1a73e8; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-avatar i { font-size: 24px; color: #fff; }
        
        .content-area { padding: 10px 20px; background: white; }
        textarea {
            width: 100%; border: none; outline: none; font-size: 18px;
            min-height: 150px; resize: none; font-family: inherit;
        }

        .media-preview {
            margin: 10px 20px; border-radius: 12px; overflow: hidden;
            position: relative; display: none; background: #000;
        }
        .media-preview img, .media-preview video { width: 100%; display: block; max-height: 300px; object-fit: contain; }
        
        .close-preview { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .bottom-tools {
            position: fixed; bottom: 0; width: 100%;
            background: white; border-top: 1px solid #ddd;
            padding: 15px 0; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        .tool-grid { display: flex; justify-content: space-around; }
        .tool-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; }
        .tool-item i { font-size: 22px; }

        .progress-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-Dashboard: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="progress-overlay" id="loadingOverlay">
        <div class="loader"></div>
        <p style="margin-top: 15px; font-weight: bold;" id="statusText">OPTIMIZING & UPLOADING...</p>
    </div>

    <div class="post-header">
        <i class="fas fa-arrow-left" style="cursor:pointer" onclick="history.back()"></i>
        <div class="header-title">Create Post</div>
        <button class="post-button" id="submitPost" disabled onclick="handleUpload()">Post</button>
    </div>

    <div class="user-section">
        <div class="user-avatar" id="currentAvatar"><i class="fas fa-user"></i></div>
        <div class="user-details">
            <b id="currentName">Commander CM</b>
            <div style="font-size: 12px; color: #606770;"><i class="fas fa-globe-africa"></i> Public</div>
        </div>
    </div>

    <div class="content-area">
        <textarea id="postInput" placeholder="What's on your mind, CM...?" oninput="validate()"></textarea>
    </div>

    <div id="mediaPreview" class="media-preview">
        <div class="close-preview" onclick="removeMedia()">&times;</div>
        <div id="previewContainer"></div>
    </div>

    <div class="bottom-tools">
        <div class="tool-grid">
            <label class="tool-item">
                <i class="fas fa-images" style="color: #45bd62;"></i>
                <span>Photo</span>
                <input type="file" id="imageInput" hidden accept="image/*" onchange="previewFile(this, 'image')">
            </label>
            <label class="tool-item">
                <i class="fas fa-video" style="color: #f02849;"></i>
                <span>Video</span>
                <input type="file" id="videoInput" hidden accept="video/*" onchange="previewFile(this, 'video')">
            </label>
            <div class="tool-item"><i class="fas fa-user-tag" style="color: #1877f2;"></i><span>Tag</span></div>
            <div class="tool-item"><i class="fas fa-location-dot" style="color: #f5533d;"></i><span>Location</span></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            projectId: "cmchat-pro",
            storageBucket: "cmchat-pro.appspot.com"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const storage = firebase.storage();

        let selectedFile = null;
        let selectedType = '';

        function validate() {
            const btn = document.getElementById('submitPost');
            const text = document.getElementById('postInput').value.trim();
            btn.disabled = !(text || selectedFile);
        }

        function previewFile(input, type) {
            const file = input.files[0];
            if (file) {
                selectedFile = file;
                selectedType = type;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('mediaPreview').style.display = 'block';
                    document.getElementById('previewContainer').innerHTML = type === 'image' 
                        ? `<img src="${e.target.result}">` 
                        : `<video src="${e.target.result}" controls></video>`;
                    validate();
                };
                reader.readAsDataURL(file);
            }
        }

        function removeMedia() {
            selectedFile = null;
            selectedType = '';
            document.getElementById('mediaPreview').style.display = 'none';
            document.getElementById('previewContainer').innerHTML = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('videoInput').value = '';
            validate();
        }

        async function handleUpload() {
            const btn = document.getElementById('submitPost');
            const text = document.getElementById('postInput').value.trim();
            const overlay = document.getElementById('loadingOverlay');
            
            btn.disabled = true;
            overlay.style.display = 'flex';

            try {
                let fileUrl = "";
                if (selectedFile) {
                    // GYARA: Tura hoto zuwa Storage maimakon Firestore kai-tsaye don magance Error
                    const storageRef = storage.ref(`posts/${Date.now()}_${selectedFile.name}`);
                    const uploadTask = await storageRef.put(selectedFile);
                    fileUrl = await uploadTask.ref.getDownloadURL();
                }

                await db.collection('posts').add({
                    text: text,
                    postImg: fileUrl, // Muna amfani da postImg don yayi dai-dai da Dashboard dinka
                    type: selectedType || 'text',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    username: "Commander CM"
                });

                overlay.style.display = 'none';
                Swal.fire({ icon: 'success', title: 'Success!', text: 'Post shared successfully!', timer: 2000, showConfirmButton: false });
                setTimeout(() => location.href = 'Dashboard.html', 2000);

            } catch (err) {
                overlay.style.display = 'none';
                // GYARA: Cire dogon sakon error din nan
                let cleanMsg = "Akwai matsalar yanar gizo ko ta izini. Ka sake gwadawa.";
                if(err.message.includes("permission")) cleanMsg = "Ba ka da izinin yin wannan aikin. Duba Firebase Rules.";
                
                Swal.fire({ icon: 'error', title: 'Upload Failed', text: cleanMsg });
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
