<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Elite Post | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #0062ff; 
            --primary-gradient: linear-gradient(135deg, #0062ff, #00d2ff);
            --bg: #f8fafc; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #ffffff; color: #1e293b; height: 100vh; overflow: hidden; }

        /* --- MODERN HEADER --- */
        .post-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: white; border-bottom: 1px solid #f1f5f9;
            position: sticky; top: 0; z-index: 100;
        }
        .header-title { font-size: 17px; font-weight: 800; color: #1e293b; }
        .post-button {
            background: var(--primary-gradient); color: white; border: none;
            padding: 10px 25px; border-radius: 12px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(0, 98, 255, 0.2); transition: 0.3s;
        }
        .post-button:disabled { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

        /* --- USER INFO --- */
        .user-section { display: flex; align-items: center; gap: 12px; padding: 20px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 14px; background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px; }
        .user-details b { font-size: 15px; font-weight: 700; color: #1e293b; }
        .privacy-badge { font-size: 11px; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 6px; margin-top: 2px; display: inline-block; }

        /* --- CONTENT AREA --- */
        .content-area { padding: 10px 20px; overflow-y: auto; height: calc(100vh - 220px); }
        textarea {
            width: 100%; border: none; outline: none; font-size: 18px;
            min-height: 80px; resize: none; color: #334155; line-height: 1.6;
        }

        /* --- GRID PREVIEW --- */
        #mediaPreview {
            margin-top: 15px; display: grid; 
            grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .media-item-box {
            position: relative; aspect-ratio: 1/1; border-radius: 12px;
            overflow: hidden; background: #f1f5f9; border: 2px solid #e2e8f0;
        }
        .media-item-box img, .media-item-box video { width: 100%; height: 100%; object-fit: cover; }
        .remove-specific { position: absolute; top: 5px; left: 5px; color: #ef4444; background: white; border-radius: 50%; padding: 2px; cursor: pointer; z-index: 10; font-size: 14px; }

        /* --- BOTTOM TOOLS --- */
        .bottom-tools {
            position: fixed; bottom: 0; width: 100%;
            background: white; border-top: 1px solid #f1f5f9;
            padding: 15px 20px 30px; border-radius: 25px 25px 0 0;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
        }
        .tool-grid { display: flex; justify-content: space-around; align-items: center; }
        .tool-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .tool-icon { width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #f8fafc; transition: 0.3s; }
        .tool-item span { font-size: 11px; font-weight: 700; color: #64748b; }

        /* --- OVERLAY --- */
        .progress-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .loader { border: 4px solid #f1f5f9; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="progress-overlay" id="loadingOverlay">
        <div class="loader"></div>
        <p style="margin-top: 15px; font-weight: 800; color: #1e293b;">PUBLISHING POST...</p>
    </div>

    <div class="post-header">
        <i class="fas fa-chevron-left" style="font-size: 20px; color: #64748b; cursor:pointer" onclick="window.location.href='Dashboard.html'"></i>
        <div class="header-title">Create Post</div>
        <button class="post-button" id="submitPost" disabled onclick="handleUpload()">Share</button>
    </div>

    <div class="user-section">
        <div class="user-avatar">C</div>
        <div class="user-details">
            <b>Commander CM</b><br>
            <div class="privacy-badge"><i class="fas fa-globe-americas"></i> Public</div>
        </div>
    </div>

    <div class="content-area">
        <textarea id="postInput" placeholder="What's on your elite mind, Commander?" oninput="validate()"></textarea>
        <div id="mediaPreview"></div>
    </div>

    <div class="bottom-tools">
        <div class="tool-grid">
            <label class="tool-item">
                <div class="tool-icon" style="color: #45bd62;"><i class="fas fa-images"></i></div>
                <span>Photo</span>
                <input type="file" id="imageInput" hidden accept="image/*" multiple onchange="processMedia(this, 'image')">
            </label>
            <label class="tool-item">
                <div class="tool-icon" style="color: #f02849;"><i class="fas fa-video"></i></div>
                <span>Video</span>
                <input type="file" id="videoInput" hidden accept="video/*" multiple onchange="processMedia(this, 'video')">
            </label>
            <div class="tool-item"><div class="tool-icon" style="color: #f59e0b;"><i class="fas fa-tags"></i></div><span>Tag</span></div>
            <div class="tool-item"><div class="tool-icon" style="color: #1877f2;"><i class="fas fa-location-dot"></i></div><span>Check-in</span></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnhd2Wo5KCeE33A50WPMbVBxkoqEzkwvY",
            projectId: "cmchat-pro"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selectedMediaFiles = [];

        function validate() {
            const btn = document.getElementById('submitPost');
            const text = document.getElementById('postInput').value.trim();
            btn.disabled = !(text || selectedMediaFiles.length > 0);
        }

        function processMedia(input, type) {
            const files = Array.from(input.files);
            const preview = document.getElementById('mediaPreview');

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64Data = e.target.result;
                    selectedMediaFiles.push({ data: base64Data, type: type });

                    const box = document.createElement('div');
                    box.className = 'media-item-box';
                    box.innerHTML = `
                        <i class="fas fa-times-circle remove-specific" onclick="removeMediaItem(this, '${base64Data}')"></i>
                        ${type === 'image' ? `<img src="${base64Data}">` : `<video src="${base64Data}#t=0.1" muted></video>`}
                    `;
                    preview.appendChild(box);
                    validate();
                };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        function removeMediaItem(btn, base64) {
            const box = btn.parentElement;
            selectedMediaFiles = selectedMediaFiles.filter(item => item.data !== base64);
            box.remove();
            validate();
        }

        async function handleUpload() {
            const btn = document.getElementById('submitPost');
            const text = document.getElementById('postInput').value.trim();
            const overlay = document.getElementById('loadingOverlay');
            
            btn.disabled = true;
            overlay.style.display = 'flex';

            try {
                // Ajiye a Firestore kai tsaye (Baya bukatar Storage)
                await db.collection('posts').add({
                    text: text,
                    media: selectedMediaFiles, // Wannan yana dauke da Base64 data
                    postImg: selectedMediaFiles.length > 0 ? selectedMediaFiles[0].data : "",
                    type: selectedMediaFiles.length > 0 ? selectedMediaFiles[0].type : "text",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    username: "Commander CM",
                    likes: 0
                });

                overlay.style.display = 'none';
                await Swal.fire({ icon: 'success', title: 'Elite Published!', timer: 1500, showConfirmButton: false });
                window.location.href = 'Dashboard.html';

            } catch (err) {
                overlay.style.display = 'none';
                btn.disabled = false;
                console.error(err);
                Swal.fire({ icon: 'error', title: 'Upload Failed', text: 'Check Firestore Rules.' });
            }
        }
    </script>
</body>
</html>
