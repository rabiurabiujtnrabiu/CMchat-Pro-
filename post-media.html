<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Elite Post | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #0062ff; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid #1e293b; }
        .post-btn { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .post-btn:disabled { opacity: 0.5; }

        .content { padding: 20px; overflow-y: auto; height: calc(100vh - 150px); }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 18px; outline: none; resize: none; min-height: 100px; }

        /* --- GYARA: Rarraba Hotuna 1-1-1 --- */
        #mediaPreview { 
            display: flex; 
            flex-direction: column; /* Wannan zai sa su fito daya a kasan daya */
            gap: 15px; 
            margin-top: 15px; 
        }
        .preview-item { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
        .preview-item img, .preview-item video { width: 100%; display: block; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; padding: 5px; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; padding: 15px; border-radius: 20px 20px 0 0; display: flex; justify-content: space-around; }
        .tool { text-align: center; color: #94a3b8; font-size: 12px; }
        .tool i { display: block; font-size: 20px; margin-bottom: 5px; color: #38bdf8; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .loader { border: 4px solid #334155; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="overlay" id="loadingOverlay">
        <div class="loader"></div>
        <p style="margin-top: 15px;">Uploading Elite Content...</p>
    </div>

    <div class="header">
        <i class="fas fa-times" onclick="history.back()"></i>
        <b>Create Post</b>
        <button class="post-btn" id="submitBtn" disabled onclick="uploadPost()">Share</button>
    </div>

    <div class="content">
        <textarea id="postText" placeholder="What's on your elite mind, Commander?" oninput="checkInput()"></textarea>
        <div id="mediaPreview"></div>
    </div>

    <div class="bottom-nav">
        <label class="tool">
            <i class="fas fa-image"></i>Photo
            <input type="file" hidden accept="image/*" multiple onchange="handleFiles(this, 'image')">
        </label>
        <label class="tool">
            <i class="fas fa-video"></i>Video
            <input type="file" hidden accept="video/*" onchange="handleFiles(this, 'video')">
        </label>
        <div class="tool"><i class="fas fa-tags"></i>Tag</div>
        <div class="tool"><i class="fas fa-location-arrow"></i>Check-in</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { projectId: "cmchat-pro" }; // Use your full config
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let mediaFiles = [];

        function checkInput() {
            const text = document.getElementById('postText').value.trim();
            document.getElementById('submitBtn').disabled = !(text || mediaFiles.length > 0);
        }

        function handleFiles(input, type) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = e.target.result;
                    mediaFiles.push({ data, type });
                    renderPreview(data, type);
                    checkInput();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPreview(data, type) {
            const container = document.getElementById('mediaPreview');
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `
                <i class="fas fa-times remove-btn" onclick="removeMedia(this, '${data}')"></i>
                ${type === 'image' ? `<img src="${data}">` : `<video src="${data}" muted></video>`}
            `;
            container.appendChild(div);
        }

        function removeMedia(btn, data) {
            mediaFiles = mediaFiles.filter(m => m.data !== data);
            btn.parentElement.remove();
            checkInput();
        }

        async function uploadPost() {
            const text = document.getElementById('postText').value.trim();
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';

            try {
                await db.collection('posts').add({
                    text: text,
                    media: mediaFiles,
                    username: "Commander CM",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0
                });
                window.location.href = 'Dashboard.html';
            } catch (err) {
                overlay.style.display = 'none';
                Swal.fire('Upload Failed', 'Limit exceeded. Try smaller video or check Firestore rules.', 'error');
            }
        }
    </script>
</body>
</html>
